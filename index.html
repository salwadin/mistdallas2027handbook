<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIST Dallas Portal</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #020617;
      --card: rgba(17, 24, 39, 0.82);
      --border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #94a3b8;
      --input: rgba(30, 41, 59, 0.85);
      --purple: #7c3aed;
      --pink: #d946ef;
      --blue: #0ea5e9;
      --blue2: #2563eb;
      --green: #10b981;
      --gold: #f59e0b;
      --red: #f43f5e;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(147, 51, 234, 0.18), transparent 35%),
        var(--bg);
    }

    #app {
      min-height: 100vh;
      width: 100%;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 28px;
    }

    .dashboard-shell {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .panel {
      padding: 22px;
      margin-bottom: 16px;
    }

    h1, h2, h3 { margin: 0; }
    h1 {
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 21px;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    h3 { font-size: 16px; line-height: 1.25; }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.55;
    }

    input::placeholder, textarea::placeholder { color: #94a3b8; }
    input:disabled { opacity: 0.8; cursor: not-allowed; }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      font-family: inherit;
    }

    button:hover { transform: translateY(-1px); opacity: 0.96; }
    .full { width: 100%; }
    .primary { background: linear-gradient(90deg, var(--purple), var(--pink)); }
    .secondary { background: linear-gradient(90deg, var(--blue), var(--blue2)); }
    .ghost {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      width: auto;
      min-width: 130px;
    }

    .subtext { margin-top: 8px; font-size: 13px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }

    .stat-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .actions button { min-width: 170px; }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 18px 0 24px;
    }

    .tab-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      color: var(--text);
      min-width: 130px;
    }

    .tab-btn.active {
      background: linear-gradient(90deg, rgba(124,58,237,.9), rgba(217,70,239,.9));
      border-color: transparent;
    }

    .check-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      margin-bottom: 10px;
      cursor: pointer;
    }

    .check-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--purple);
      flex-shrink: 0;
      padding: 0;
      border-radius: 4px;
      appearance: auto;
      -webkit-appearance: checkbox;
      cursor: pointer;
    }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .phase-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .muted { color: var(--muted); }

    .list-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
    }

    .list-table th, .list-table td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
    }

    .save-status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .phase-progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .phase-mini {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
    }

    .phase-mini strong {
      display: block;
      margin-bottom: 4px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .nav-card {
      min-height: 150px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      text-align: left;
      border-top: 3px solid var(--blue);
    }

    .nav-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .nav-card span {
      display: block;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.45;
    }

    .directory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .person-card {
      min-height: 150px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      border-top: 3px solid var(--team-color, var(--blue));
    }

    .person-card.unclaimed {
      border-style: dashed;
      background: rgba(255,255,255,.02);
    }

    .person-card h3 {
      margin-bottom: 8px;
      word-break: break-word;
    }

    .role-meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .task-list {
      margin: 12px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    .task-list li {
      margin-bottom: 6px;
    }

    .team-board {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .team-board-section {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--team-color, var(--blue)) 10%, transparent), rgba(255,255,255,.018));
      border-top: 3px solid var(--team-color, var(--blue));
    }

    .team-board-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .timeline {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      border-left: 4px solid var(--phase-color, var(--blue));
    }

    .timeline-date {
      color: #bfdbfe;
      font-weight: 800;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .onboarding-roles {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .deadline-card {
      border: 1px solid var(--border);
      border-top: 4px solid var(--phase-color, var(--blue));
      border-radius: 16px;
      padding: 16px;
      background: rgba(255,255,255,.035);
    }

    .deadline-date {
      color: #e0f2fe;
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .admin-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .admin-form textarea {
      min-height: 78px;
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .inline-actions button {
      width: auto;
      min-width: 120px;
    }

    .danger {
      background: linear-gradient(90deg, #e11d48, #f97316);
    }

    @media (max-width: 640px) {
      #app { padding: 16px; }
      .card, .panel { padding: 20px; }
      h1 { font-size: 24px; }
      h2 { font-size: 19px; }
      .topbar { flex-direction: column; }
      .actions { flex-direction: column; }
      .actions button, .ghost, .tab-btn { width: 100%; }
      .timeline-item { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="workbook-data.js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      window.APP_CONFIG.SUPABASE_URL,
      window.APP_CONFIG.SUPABASE_ANON_KEY
    );

    const SOURCE_DATA = window.MIST_DATA || window.WORKBOOK_DATA;
    const PHASES = buildPhaseLookup(SOURCE_DATA);
    const ROLE_OPTIONS = buildRoleOptions(SOURCE_DATA);
    const WORKBOOKS = buildWorkbookLookup(SOURCE_DATA);
    const TIMELINE = buildTimeline(SOURCE_DATA);
    const TEAM_COLORS = buildTeamColors(SOURCE_DATA);
    const PHASE_COLORS = {
      foundations: "#a78bfa",
      build: "#38bdf8",
      stabilization: "#f59e0b",
      execution: "#10b981"
    };
    const CALENDAR_DEADLINES = buildCalendarDeadlines();

    let APP_STATE = {
      view: "dashboard",
      activePhase: "foundations",
      progress: {},
      saveTimers: {}
    };

    const PUBLIC_VIEWS = new Set(["dashboard", "progress", "directory", "timeline", "calendar", "login"]);

    function buildPhaseLookup(data) {
      if (data.PHASE_META) {
        return Object.fromEntries(Object.entries(data.PHASE_META).map(([id, phase]) => [
          id,
          {
            label: phase.shortLabel || phase.label,
            title: phase.label,
            dates: phase.dates,
            icon: phase.icon || ""
          }
        ]));
      }

      return data.phases || {};
    }

    function buildRoleOptions(data) {
      if (data.ROLES) {
        return data.ROLES.map(role => ({
          id: role.id,
          title: role.title,
          team: data.TEAMS?.[role.team]?.label || role.team
        }));
      }

      return data.roleOptions || [];
    }

    function buildTeamColors(data) {
      if (data.TEAMS) {
        return Object.fromEntries(Object.values(data.TEAMS).map(team => [team.label, team.color]));
      }

      return {
        Executive: "#a78bfa",
        Registration: "#f472b6",
        Sports: "#fb923c",
        Operations: "#60a5fa",
        Competitions: "#34d399",
        "Dream Team": "#facc15",
        PR: "#f87171",
        Programs: "#c084fc",
        Finance: "#4ade80"
      };
    }

    function buildWorkbookLookup(data) {
      if (data.ROLES) {
        const workbooks = Object.fromEntries(data.ROLES.map(role => [
          role.id,
          {
            ...role,
            title: `${role.title} Workbook`,
            roleTitle: role.title,
            team: data.TEAMS?.[role.team]?.label || role.team,
            description: role.description || (role.reportsTo
              ? `Reports to ${role.reportsTo}. ${role.manages?.length ? `Manages ${role.manages.join(", ")}.` : ""}`
              : "Role-specific organizer workbook.")
          }
        ]));

        workbooks.default = {
          title: "Organizer Workbook",
          roleTitle: "Organizer",
          team: "General",
          description: "Role-specific content will expand from here.",
          phases: {
            foundations: {
              focus: "Clarify your role, expectations, and early planning tasks.",
              deliverables: ["Review your role scope", "Meet with your direct supervisor", "Identify your top responsibilities", "Set your first planning priorities"]
            }
          }
        };

        return workbooks;
      }

      return data.workbooks || {};
    }

    function buildTimeline(data) {
      if (data.timeline) return data.timeline;

      return Object.values(PHASES).map(phase => ({
        date: phase.dates,
        phase: phase.label,
        title: phase.title,
        description: "Use this phase as a shared checkpoint for organizer planning and readiness.",
        owners: ["All Teams"]
      }));
    }

    function buildCalendarDeadlines() {
      return [
        { id: "foundations-core-roles", date: "Sep 15", due_date: "2026-09-15", phase: "foundations", title: "Core roles claimed", detail: "RD, ADs, directors, and foundational leads are claimed in the portal." },
        { id: "foundations-checkin", date: "Sep 30", due_date: "2026-09-30", phase: "foundations", title: "Foundations check-in", detail: "Team structures, communication norms, and first planning priorities are drafted." },
        { id: "build-roles-onboarded", date: "Oct 15", due_date: "2026-10-15", phase: "build", title: "Build roles onboarded", detail: "Build-phase chairs and leads are claimed and briefed on first deliverables." },
        { id: "build-mid-review", date: "Nov 15", due_date: "2026-11-15", phase: "build", title: "Mid-build progress review", detail: "Venue, registration, competitions, PR, sponsorship, and DT progress are reviewed." },
        { id: "stabilization-roles", date: "Dec 1", due_date: "2026-12-01", phase: "stabilization", title: "Stabilization roles onboarded", detail: "December roles are claimed and readiness gaps are assigned owners." },
        { id: "stabilization-lock", date: "Dec 20", due_date: "2026-12-20", phase: "stabilization", title: "Schedules and rosters locked", detail: "Major schedules, rosters, brackets, and staffing plans are ready for execution prep." },
        { id: "execution-training", date: "Jan 10", due_date: "2027-01-10", phase: "execution", title: "Execution training complete", detail: "Dream Team and event-day operators complete walkthroughs and escalation training." },
        { id: "execution-run-show", date: "Event Week", due_date: "2027-01-20", phase: "execution", title: "Final run-of-show confirmed", detail: "Command Center, communications, and all team leads confirm event-week readiness." }
      ];
    }

    async function getUser() {
      const { data } = await supabaseClient.auth.getUser();
      return data.user;
    }

    async function getProfile(userId) {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .maybeSingle();
      if (error) {
        console.error("Profile fetch error:", error);
        return null;
      }
      return data;
    }

    async function getAllProfiles() {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id,full_name,email,role_id,team,updated_at")
        .order("role_id", { ascending: true });
      if (error) {
        console.warn("Profiles list unavailable:", error.message || error);
        return [];
      }
      return data || [];
    }

    async function getWorkbookProgress(userId) {
      const { data, error } = await supabaseClient
        .from("workbook_progress")
        .select("phase,data,percent_complete,updated_at")
        .eq("user_id", userId);

      if (error) {
        console.error("Workbook progress fetch error:", error);
        return {};
      }

      return rowsToProgressMap(data || []);
    }

    async function getAllWorkbookProgress() {
      const { data, error } = await supabaseClient
        .from("workbook_progress")
        .select("user_id,phase,data,percent_complete,updated_at");

      if (error) {
        console.warn("Workbook progress list unavailable:", error.message || error);
        return [];
      }

      return data || [];
    }

    async function getDeadlines() {
      const { data, error } = await supabaseClient
        .from("deadline_events")
        .select("id,title,detail,phase,due_date,date_label,send_reminders,created_at,updated_at")
        .order("due_date", { ascending: true });

      if (error) {
        console.warn("Deadline table unavailable; using built-in deadlines:", error.message || error);
        return CALENDAR_DEADLINES;
      }

      return (data || []).map(row => ({
        id: row.id,
        title: row.title,
        detail: row.detail,
        phase: row.phase,
        due_date: row.due_date,
        date: row.date_label || formatDeadlineDate(row.due_date),
        send_reminders: row.send_reminders
      }));
    }

    async function getReminderPreference(userId) {
      if (!userId) return null;

      const { data, error } = await supabaseClient
        .from("reminder_preferences")
        .select("*")
        .eq("user_id", userId)
        .maybeSingle();

      if (error) {
        console.warn("Reminder preferences unavailable:", error.message || error);
        return null;
      }

      return data;
    }

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Enter email and password.");
      const { error } = await supabaseClient.auth.signUp({ email, password });
      if (error) return alert(error.message);
      alert("Account created. Then log in.");
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Enter email and password.");
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) return alert(error.message);
      location.reload();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function saveProfile() {
      const user = await getUser();
      if (!user) return alert("No user found.");

      const fullName = document.getElementById("full-name").value.trim();
      const roleId = document.getElementById("role-id").value;
      if (!fullName || !roleId) return alert("Please fill out your name and choose your role.");

      const selectedRole = ROLE_OPTIONS.find(role => role.id === roleId);
      const { data: existingClaim, error: claimError } = await supabaseClient
        .from("profiles")
        .select("id,full_name,email")
        .eq("role_id", roleId)
        .neq("id", user.id)
        .maybeSingle();

      if (claimError) {
        console.error("Role claim check error:", claimError);
        return alert("Could not check that role. Try again.");
      }

      if (existingClaim) {
        return alert(`That role is already claimed by ${existingClaim.full_name || existingClaim.email || "another organizer"}.`);
      }

      const { error } = await supabaseClient
        .from("profiles")
        .upsert({
          id: user.id,
          full_name: fullName,
          email: user.email,
          role_id: roleId,
          team: selectedRole ? selectedRole.team : null,
          updated_at: new Date().toISOString()
        });

      if (error) {
        console.error("Profile save error:", error);
        return alert(error.message);
      }

      location.reload();
    }

    async function saveDeadlineFromForm(event) {
      event.preventDefault();
      const profile = await getProfile((await getUser()).id);
      if (!profile?.is_admin) return alert("Only admins can edit deadlines.");

      const id = document.getElementById("deadline-id").value.trim() || `deadline-${Date.now()}`;
      const payload = {
        id,
        title: document.getElementById("deadline-title").value.trim(),
        detail: document.getElementById("deadline-detail").value.trim(),
        phase: document.getElementById("deadline-phase").value,
        due_date: document.getElementById("deadline-date").value,
        date_label: document.getElementById("deadline-label").value.trim(),
        send_reminders: document.getElementById("deadline-reminders").checked,
        updated_at: new Date().toISOString()
      };

      if (!payload.title || !payload.phase || !payload.due_date) {
        return alert("Deadline title, phase, and due date are required.");
      }

      const { error } = await supabaseClient
        .from("deadline_events")
        .upsert(payload, { onConflict: "id" });

      if (error) {
        console.error("Deadline save error:", error);
        return alert(error.message);
      }

      alert("Deadline saved.");
      renderApp();
    }

    async function deleteDeadline(id) {
      const profile = await getProfile((await getUser()).id);
      if (!profile?.is_admin) return alert("Only admins can delete deadlines.");
      if (!confirm("Delete this deadline?")) return;

      const { error } = await supabaseClient
        .from("deadline_events")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("Deadline delete error:", error);
        return alert(error.message);
      }

      renderApp();
    }

    function rowsToProgressMap(rows) {
      return rows.reduce((map, row) => {
        map[row.phase] = {
          data: row.data || { checks: [], notes: "" },
          percent_complete: row.percent_complete || 0,
          updated_at: row.updated_at
        };
        return map;
      }, {});
    }

    function getPhaseProgress(phaseId) {
      return APP_STATE.progress[phaseId] || {
        data: { checks: [], notes: "" },
        percent_complete: 0,
        updated_at: null
      };
    }

    function calculatePhasePercent(workbook, phaseId, phaseData) {
      const checklist = getPhaseChecklist(workbook.phases[phaseId]);
      if (!checklist.length) return 0;
      const checks = phaseData.checks || [];
      const completed = checklist.filter((_, index) => checks[index]).length;
      return Math.round((completed / checklist.length) * 100);
    }

    function getPhaseChecklist(phase) {
      return phase?.checklist || phase?.deliverables || [];
    }

    function calculateOverallPercent(workbook, progressMap) {
      const phaseIds = Object.keys(workbook.phases);
      if (!phaseIds.length) return 0;

      const total = phaseIds.reduce((sum, phaseId) => {
        const stored = progressMap[phaseId] || { data: { checks: [] } };
        return sum + calculatePhasePercent(workbook, phaseId, stored.data || {});
      }, 0);

      return Math.round(total / phaseIds.length);
    }

    function setSaveStatus(message) {
      const status = document.getElementById("save-status");
      if (status) status.textContent = message;
    }

    async function saveWorkbookPhase(phaseId) {
      const user = await getUser();
      const profile = await getProfile(user.id);
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const phaseState = getPhaseProgress(phaseId);
      const percent = calculatePhasePercent(workbook, phaseId, phaseState.data);

      setSaveStatus("Saving...");

      const { error } = await supabaseClient
        .from("workbook_progress")
        .upsert({
          user_id: user.id,
          phase: phaseId,
          data: phaseState.data,
          percent_complete: percent,
          updated_at: new Date().toISOString()
        }, { onConflict: "user_id,phase" });

      if (error) {
        console.error("Progress save error:", error);
        setSaveStatus("Could not save. Check Supabase table setup.");
        return;
      }

      APP_STATE.progress[phaseId].percent_complete = percent;
      APP_STATE.progress[phaseId].updated_at = new Date().toISOString();
      updateVisibleProgress(workbook);
      setSaveStatus("Saved");
    }

    function queueSave(phaseId) {
      clearTimeout(APP_STATE.saveTimers[phaseId]);
      setSaveStatus("Saving...");
      APP_STATE.saveTimers[phaseId] = setTimeout(() => saveWorkbookPhase(phaseId), 650);
    }

    function updateChecklist(phaseId, index, checked) {
      const phaseState = getPhaseProgress(phaseId);
      const checks = [...(phaseState.data.checks || [])];
      checks[index] = checked;
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, checks }
      };
      queueSave(phaseId);
    }

    function updateNotes(phaseId, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, notes: value }
      };
      queueSave(phaseId);
    }

    function updateField(phaseId, key, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: {
          ...phaseState.data,
          fields: {
            ...(phaseState.data.fields || {}),
            [key]: value
          }
        }
      };
      queueSave(phaseId);
    }

    function savedField(phaseId, key) {
      return getPhaseProgress(phaseId).data.fields?.[key] || "";
    }

    function updateVisibleProgress(workbook) {
      const overall = calculateOverallPercent(workbook, APP_STATE.progress);
      const overallText = document.getElementById("overall-percent");
      const overallFill = document.getElementById("overall-fill");
      const phaseText = document.getElementById("phase-percent");
      const phaseFill = document.getElementById("phase-fill");
      const phaseState = getPhaseProgress(APP_STATE.activePhase);

      if (overallText) overallText.textContent = `${overall}% complete`;
      if (overallFill) overallFill.style.width = `${overall}%`;
      if (phaseText) phaseText.textContent = `${phaseState.percent_complete || 0}% complete`;
      if (phaseFill) phaseFill.style.width = `${phaseState.percent_complete || 0}%`;
    }

    function calculateTeamStats(rows, progressRows) {
      const progressByUser = groupProgressByUser(progressRows);
      const totalOrganizers = rows.length;
      const activeOrganizers = rows.filter(row => row.claimed).length;
      const teamCount = new Set(rows.map(row => row.team).filter(Boolean)).size;
      const averageProgress = totalOrganizers
        ? Math.round(rows.reduce((sum, row) => {
          const workbook = WORKBOOKS[row.role_id] || WORKBOOKS.default;
          return sum + calculateOverallPercent(workbook, rowsToProgressMap(progressByUser[row.profile_id] || []));
        }, 0) / totalOrganizers)
        : 0;

      return { totalOrganizers, activeOrganizers, teamCount, averageProgress };
    }

    function groupProgressByUser(progressRows) {
      return progressRows.reduce((map, row) => {
        if (!map[row.user_id]) map[row.user_id] = [];
        map[row.user_id].push(row);
        return map;
      }, {});
    }

    function buildRoleDirectoryRows(profiles = []) {
      const profilesByRole = profiles.reduce((map, profile) => {
        if (profile.role_id && !map[profile.role_id]) map[profile.role_id] = profile;
        return map;
      }, {});

      return ROLE_OPTIONS.map(role => {
        const claim = profilesByRole[role.id];
        const workbook = WORKBOOKS[role.id] || WORKBOOKS.default;
        return {
          id: claim?.id || `role-${role.id}`,
          profile_id: claim?.id || null,
          full_name: claim?.full_name || "",
          email: claim?.email || "",
          role_id: role.id,
          team: claim?.team || role.team,
          start_phase: workbook.startPhase || firstPhaseForRole(role.id),
          task_preview: getRoleTaskPreview(role.id),
          updated_at: claim?.updated_at || null,
          claimed: !!claim
        };
      });
    }

    function firstPhaseForRole(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      return Object.keys(workbook.phases || {})[0] || "foundations";
    }

    function getRoleTaskPreview(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      const startPhase = workbook.startPhase || firstPhaseForRole(roleId);
      const phase = workbook.phases?.[startPhase] || Object.values(workbook.phases || {})[0] || {};
      const tasks = phase.responsibilities || phase.deliverables || phase.checklist || [];
      return tasks.slice(0, 3);

              <p>Everyone can see the team structure, roles, and contact list.</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          ${Object.keys(grouped).sort().map(team => `
            <div class="panel" style="--team-color:${teamColor(team)}">
              <div class="phase-header">
                <div>
                <h2>${escapeHtml(team)}</h2>
                  <p>${grouped[team].length} planned role${grouped[team].length === 1 ? "" : "s"}</p>
                </div>
              </div>
              <div class="directory-grid">
                ${grouped[team].map(person => renderPersonCard(person, progressByUser[person.profile_id] || [])).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderPersonCard(person, progressRows = []) {
      const workbook = WORKBOOKS[person.role_id] || WORKBOOKS.default;
      const percent = calculateOverallPercent(workbook, rowsToProgressMap(progressRows));

      return `
        <div class="person-card ${person.claimed ? "" : "unclaimed"}" style="--team-color:${teamColor(person.team)}">
          <h3>${escapeHtml(person.full_name || "Open Role")}</h3>
          <p>${escapeHtml(formatRole(person.role_id))}</p>
          <p>${escapeHtml(person.team || "Unassigned")}</p>
          <div class="role-meta-row">
            <span class="phase-chip">Starts: ${escapeHtml(formatPhase(person.start_phase || firstPhaseForRole(person.role_id)))}</span>
            <span class="phase-chip">${person.claimed ? "Claimed" : "Open"}</span>
          </div>
          <p class="muted">${escapeHtml(person.email || "Not claimed yet")}</p>
          ${person.task_preview?.length ? `
            <ul class="task-list">
              ${person.task_preview.map(task => `<li>${escapeHtml(task)}</li>`).join("")}
            </ul>
          ` : ""}
          <div class="progress-track"><div class="progress-fill" style="width:${percent}%"></div></div>
          <div class="note">${person.claimed ? `${percent}% complete` : "Waiting for organizer claim"}</div>
        </div>
      `;
    }

    function renderTeamRoleBoard(rows) {
      const grouped = rows.reduce((map, row) => {
        const team = row.team || "Unassigned";
        if (!map[team]) map[team] = [];
        map[team].push(row);
        return map;
      }, {});

      return `
        <div class="team-board">
          ${Object.keys(grouped).sort().map(team => {
            const claimed = grouped[team].filter(row => row.claimed).length;
            return `
              <div class="team-board-section" style="--team-color:${teamColor(team)}">
                <div class="team-board-header">
                  <div>
                    <h3>${escapeHtml(team)}</h3>
                    <p>${claimed} of ${grouped[team].length} role${grouped[team].length === 1 ? "" : "s"} claimed</p>
                  </div>
                  <span class="phase-chip">${grouped[team].length - claimed} open</span>
                </div>
                <div class="directory-grid">
                  ${grouped[team].map(person => renderPersonCard(person)).join("")}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderTimeline() {
      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>Planning Timeline</h1>
              <p>Shared MIST Dallas season roadmap from onboarding through event execution.</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          <div class="panel">
            <h2>Season Roadmap</h2>
            <p>Use this as the common reference point for directors, chairs, leads, and ADs.</p>
            <div class="timeline">
              ${TIMELINE.map(item => renderTimelineItem(item)).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderCalendar(deadlines = CALENDAR_DEADLINES, user = null, profile = null, reminderPreference = null) {
      const grouped = deadlines.reduce((map, item) => {
        if (!map[item.phase]) map[item.phase] = [];
        map[item.phase].push(item);
        return map;
      }, {});
      const isAdmin = !!profile?.is_admin;

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>Calendar & Deadlines</h1>
              <p>Planning deadlines by phase. Reminder emails can connect to these deadlines after the email service is added.</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          ${Object.keys(PHASES).map(phaseId => `
            <div class="panel" style="--phase-color:${phaseColor(phaseId)}">
              <div class="phase-header">
                <div>
                  <h2>${escapeHtml(formatPhase(phaseId))}</h2>
                  <p>${escapeHtml(PHASES[phaseId].dates || "")}</p>
                </div>
                <span class="phase-chip">${(grouped[phaseId] || []).length} deadlines</span>
              </div>
              <div class="calendar-grid">
                ${(grouped[phaseId] || []).map(item => renderDeadlineCard(item)).join("")}
              </div>
            </div>
          `).join("")}

          ${user ? renderReminderPreferences(reminderPreference) : `
            <div class="panel">
              <h2>Email Reminders</h2>
              <p>Log in and claim a role to choose reminder preferences for deadline emails.</p>
              <div class="inline-actions">
                <button class="primary" onclick="openLogin()">Log In / Sign Up</button>
              </div>
            </div>
          `}

          ${isAdmin ? renderDeadlineAdmin(deadlines) : ""}

          <div class="panel">
            <h2>Reminder Integration Plan</h2>
            <p>Deadlines and user preferences are ready for Supabase. To send emails, deploy the included Edge Function and add an email provider API key in Supabase secrets.</p>
          </div>
        </div>
      `;
    }

    function renderDeadlineCard(item) {
      return `
        <div class="deadline-card" style="--phase-color:${phaseColor(item.phase)}">
          <div class="deadline-date">${escapeHtml(item.date)}</div>
          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(item.detail)}</p>
          <div class="pill-row">
            <span class="phase-chip">${escapeHtml(formatPhase(item.phase))}</span>
            <span class="phase-chip">${item.send_reminders === false ? "No reminder" : "Reminder eligible"}</span>
          </div>
        </div>
      `;
    }

    function renderReminderPreferences(preference) {
      const enabled = preference?.email_enabled !== false;
      const daysBefore = preference?.days_before || 7;

      return `
        <div class="panel">
          <h2>Email Reminder Preferences</h2>
          <p>Choose whether deadline reminder emails should be sent to your account email.</p>
          <div class="admin-form">
            <label class="check-row" style="margin:0;">
              <input id="reminder-email-enabled" type="checkbox" ${enabled ? "checked" : ""}>
              <span>Email me before deadlines</span>
            </label>
            <div>
              <div class="label">Days before deadline</div>
              <select id="reminder-days-before">
                ${[1,3,7,14].map(days => `<option value="${days}" ${Number(daysBefore) === days ? "selected" : ""}>${days} day${days === 1 ? "" : "s"} before</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="inline-actions">
            <button class="primary" onclick="saveReminderPreference()">Save Reminder Preferences</button>
          </div>
        </div>
      `;
    }

    function renderDeadlineAdmin(deadlines) {
      return `
        <div class="panel">
          <h2>Admin Deadline Manager</h2>
          <p>Add or edit calendar deadlines. These feed the public calendar and future email reminder function.</p>
          <form class="admin-form" onsubmit="saveDeadlineFromForm(event)">
            <input id="deadline-id" placeholder="Deadline ID (optional for new)" />
            <input id="deadline-title" placeholder="Title" />
            <select id="deadline-phase">
              ${Object.keys(PHASES).map(phaseId => `<option value="${phaseId}">${formatPhase(phaseId)}</option>`).join("")}
            </select>
            <input id="deadline-date" type="date" />
            <input id="deadline-label" placeholder="Display label, e.g. Sep 15" />
            <label class="check-row" style="margin:0;">
              <input id="deadline-reminders" type="checkbox" checked>
              <span>Send reminders</span>
            </label>
            <textarea id="deadline-detail" placeholder="Deadline details"></textarea>
            <button class="primary" type="submit">Save Deadline</button>
          </form>

          <div class="list-table-wrap">
            <table class="list-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Title</th>
                  <th>Phase</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${deadlines.map(item => `
                  <tr>
                    <td>${escapeHtml(item.date)}</td>
                    <td>${escapeHtml(item.title)}</td>
                    <td>${escapeHtml(formatPhase(item.phase))}</td>
                    <td><button class="danger" onclick="deleteDeadline('${escapeHtml(item.id)}')">Delete</button></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderTimelineItem(item) {
      const phaseId = phaseIdFromTimelineItem(item);
      const onboardingRoles = phaseId ? rolesStartingInPhase(phaseId) : [];

      return `
        <div class="timeline-item" style="--phase-color:${phaseColor(phaseId)}">
          <div>
            <div class="timeline-date">${escapeHtml(item.date)}</div>
            <div class="muted">${escapeHtml(item.phase)}</div>
          </div>
          <div>
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.description)}</p>
            <div class="pill-row">
              ${(item.owners || []).map(owner => `<span class="phase-chip">${escapeHtml(owner)}</span>`).join("")}
            </div>
            ${onboardingRoles.length ? `
              <div class="onboarding-roles">
                <div class="label">Roles onboarding in this phase</div>
                <div class="pill-row">
                  ${onboardingRoles.map(role => `<span class="phase-chip">${escapeHtml(role.title)} · ${escapeHtml(role.team)}</span>`).join("")}
                </div>
              </div>
            ` : ""}
          </div>
        </div>
      `;
    }

    function phaseIdFromTimelineItem(item) {
      const text = `${item.phase || ""} ${item.title || ""}`.toLowerCase();
      return Object.keys(PHASES).find(phaseId => {
        const phase = PHASES[phaseId];
        return text.includes(phaseId) || text.includes(String(phase.label || "").toLowerCase());
      }) || null;
    }

    function renderProgressRow(profile, progressRows) {
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const progressMap = rowsToProgressMap(progressRows);
      const overallPercent = calculateOverallPercent(workbook, progressMap);
      const latestSaved = progressRows
        .map(row => row.updated_at)
        .filter(Boolean)
        .sort()
        .pop();

      return `
        <tr>
          <td>${escapeHtml(profile.full_name || "")}</td>
          <td>${escapeHtml(formatRole(profile.role_id))}</td>
          <td>${escapeHtml(profile.team || "-")}</td>
          <td>
            <strong>${profile.claimed ? `${overallPercent}%` : "Open"}</strong>
            <div class="progress-track"><div class="progress-fill" style="width:${overallPercent}%"></div></div>
          </td>
          <td class="muted">${profile.claimed ? (latestSaved ? formatDate(latestSaved) : "Not started") : "Unclaimed"}</td>
        </tr>
      `;
    }

    function formatRole(roleId) {
      const role = ROLE_OPTIONS.find(r => r.id === roleId);
      return role ? role.title : (roleId || "Not set");
    }

    function formatPhase(phaseId) {
      return PHASES[phaseId]?.label || phaseId || "Not set";
    }

    function phaseColor(phaseId) {
      return PHASE_COLORS[phaseId] || "#38bdf8";
    }

    function teamColor(team) {
      return TEAM_COLORS[team] || "#38bdf8";
    }

    function formatDate(value) {
      return new Date(value).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDeadlineDate(value) {
      if (!value) return "";
      const date = new Date(`${value}T12:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function fieldKey(...parts) {
      return parts.join("-").replace(/[^a-zA-Z0-9_-]/g, "-");
    }

    async function renderApp() {
      const app = document.getElementById("app");
      const user = await getUser();
      const profiles = await getAllProfiles();
      const rows = buildRoleDirectoryRows(profiles);

      if (!user && APP_STATE.view === "login") {
        app.innerHTML = renderLogin();
        return;
      }

      if (!user && !PUBLIC_VIEWS.has(APP_STATE.view)) {
        APP_STATE.view = "dashboard";
      }

      if (!user) {
        if (APP_STATE.view === "progress") {
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderProgressBoard(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "directory") {
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderDirectory(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "timeline") {
          app.innerHTML = renderTimeline();
          return;
        }

        if (APP_STATE.view === "calendar") {
          const deadlines = await getDeadlines();
          app.innerHTML = renderCalendar(deadlines, null, null, null);
          return;
        }

        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderDashboard(null, null, rows, progressRows);
        return;
      }

      const profile = await getProfile(user.id);
      if (!profile || !profile.role_id) {
        app.innerHTML = renderRoleSetup(user, rows);
        return;
      }

      APP_STATE.progress = await getWorkbookProgress(user.id);

      if (APP_STATE.view === "workbook") {
        app.innerHTML = renderWorkbook(profile);
        return;
      }

      if (APP_STATE.view === "progress") {
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderProgressBoard(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "directory") {
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderDirectory(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "timeline") {
        app.innerHTML = renderTimeline();
        return;
      }

      if (APP_STATE.view === "calendar") {
        const deadlines = await getDeadlines();
        const reminderPreference = await getReminderPreference(user.id);
        app.innerHTML = renderCalendar(deadlines, user, profile, reminderPreference);
        return;
      }

      const progressRows = await getAllWorkbookProgress();
      app.innerHTML = renderDashboard(user, profile, rows, progressRows);
    }

    renderApp();
  </script>
</body>
</html>
