          entry.answer,
          (entry.keywords || []).join("|"),
          entry.version || PORTAL_RULEBOOK_VERSION,
          entry.updated_at || "",
          entry.page || ""
        ])
      ]);
    }

    function normalizeHeader(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_|_$/g, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJs(value) {
      return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function fieldKey(...parts) {
      return parts.join("-").replace(/[^a-zA-Z0-9_-]/g, "-");
    }

    async function renderApp() {
      const app = document.getElementById("app");

      try {
      const user = await getUser();
      const profiles = await getAllProfiles();
      const rows = buildRoleDirectoryRows(profiles);

      if (!user && APP_STATE.view === "login") {
        app.innerHTML = renderLogin();
        return;
      }

      if (!user && !PUBLIC_VIEWS.has(APP_STATE.view)) {
        APP_STATE.view = "dashboard";
      }

      if (!user) {
        if (APP_STATE.view === "apply") {
          app.innerHTML = renderRoleApplication(null, rows);
          return;
        }

        if (APP_STATE.view === "progress") {
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderProgressBoard(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "command") {
          const progressRows = await getAllWorkbookProgress();
          const deadlines = await getDeadlines();
          app.innerHTML = renderCommandCenter(rows, progressRows, deadlines, null, null, null);
          return;
        }

        if (APP_STATE.view === "integrations") {
          app.innerHTML = renderMyMistIntegration(APP_STATE.mymist, null, null);
          return;
        }

        if (APP_STATE.view === "tournament") {
          const deadlines = await getDeadlines();
          const tournamentData = await getTournamentData(false);
          APP_STATE.tournament = tournamentData;
          app.innerHTML = renderTournamentManager(rows, deadlines, tournamentData, null, null);
          return;
        }

        if (APP_STATE.view === "directory") {
          APP_STATE.currentDeadlines = await getDeadlines();
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderTeamPages(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "teams") {
          const progressRows = await getAllWorkbookProgress();
          APP_STATE.currentDeadlines = await getDeadlines();
          app.innerHTML = renderTeamPages(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "timeline") {
          app.innerHTML = renderTimeline();
          return;
        }

        if (APP_STATE.view === "meetings") {
          app.innerHTML = renderMeetingHub(null, null);
          return;
        }

        if (APP_STATE.view === "runbook") {
          app.innerHTML = renderRunbook();
          return;
        }

        if (APP_STATE.view === "knowledge") {
          app.innerHTML = renderKnowledgeBase();
          return;
        }

        if (APP_STATE.view === "feedback") {
          app.innerHTML = renderFeedbackAddressal(null, null);
          return;
        }

        if (APP_STATE.view === "onboarding") {
          app.innerHTML = renderOnboardingChecklist(null, null);
          return;
        }

        if (APP_STATE.view === "release") {
          app.innerHTML = renderReleaseChecklist(null, null);
          return;
        }

        if (APP_STATE.view === "calendar") {
          const progressRows = await getAllWorkbookProgress();
          const deadlines = await getDeadlines();
          app.innerHTML = renderCommandCenter(rows, progressRows, deadlines, null, null, null);
          return;
        }

        if (APP_STATE.view === "application-status") {
          app.innerHTML = renderApplicationStatus();
          return;
        }

        const progressRows = await getAllWorkbookProgress();
        const deadlines = await getDeadlines();
        APP_STATE.announcements = await getAnnouncements();
        app.innerHTML = renderDashboard(null, null, rows, progressRows, deadlines);
        return;
      }

      const profile = await getProfile(user.id);
      if (APP_STATE.view === "apply") {
        app.innerHTML = renderRoleApplication(user, rows);
        return;
      }

      if (!profile || !profile.role_id) {
        app.innerHTML = renderRoleSetup(user, rows);
        return;
      }

      APP_STATE.progress = await getWorkbookProgress(user.id);

      if (APP_STATE.view === "workbook") {
        app.innerHTML = renderWorkbook(profile);
        return;
      }

      if (APP_STATE.view === "progress") {
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderProgressBoard(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "command") {
        const progressRows = await getAllWorkbookProgress();
        const deadlines = await getDeadlines();
        const reminderPreference = await getReminderPreference(user.id);
        app.innerHTML = renderCommandCenter(rows, progressRows, deadlines, user, profile, reminderPreference);
        return;
      }

      if (APP_STATE.view === "integrations") {
        const mymist = await getMyMistData(!!profile?.is_admin);
        APP_STATE.mymist = mymist;
        app.innerHTML = renderMyMistIntegration(mymist, user, profile);
        return;
      }

      if (APP_STATE.view === "tournament") {
        const deadlines = await getDeadlines();
        const tournamentData = await getTournamentData(!!profile?.is_admin);
        APP_STATE.tournament = tournamentData;
        app.innerHTML = renderTournamentManager(rows, deadlines, tournamentData, user, profile);
        return;
      }

      if (APP_STATE.view === "directory") {
        APP_STATE.currentDeadlines = await getDeadlines();
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderTeamPages(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "teams") {
        const progressRows = await getAllWorkbookProgress();
        APP_STATE.currentDeadlines = await getDeadlines();
        app.innerHTML = renderTeamPages(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "timeline") {
        app.innerHTML = renderTimeline();
        return;
      }

      if (APP_STATE.view === "meetings") {
        app.innerHTML = renderMeetingHub(user, profile);
        return;
      }

      if (APP_STATE.view === "runbook") {
        app.innerHTML = renderRunbook();
        return;
      }

      if (APP_STATE.view === "knowledge") {
        app.innerHTML = renderKnowledgeBase();
        return;
      }

      if (APP_STATE.view === "feedback") {
        app.innerHTML = renderFeedbackAddressal(user, profile);
        return;
      }

      if (APP_STATE.view === "onboarding") {
        app.innerHTML = renderOnboardingChecklist(user, profile);
        return;
      }

      if (APP_STATE.view === "release") {
        app.innerHTML = renderReleaseChecklist(user, profile);
        return;
      }

      if (APP_STATE.view === "calendar") {
        const progressRows = await getAllWorkbookProgress();
        const deadlines = await getDeadlines();
        const reminderPreference = await getReminderPreference(user.id);
        app.innerHTML = renderCommandCenter(rows, progressRows, deadlines, user, profile, reminderPreference);
        return;
      }

      if (APP_STATE.view === "application-status") {
        app.innerHTML = renderApplicationStatus();
        return;
      }

      if (APP_STATE.view === "applications") {
        if (!profile?.is_admin) {
          APP_STATE.view = "dashboard";
          app.innerHTML = renderDashboard(user, profile, rows, await getAllWorkbookProgress(), await getDeadlines());
          return;
        }

        const applications = await getRoleApplications();
        app.innerHTML = renderApplicationsAdmin(applications, rows);
        return;
      }

      const progressRows = await getAllWorkbookProgress();
      const deadlines = await getDeadlines();
      APP_STATE.announcements = await getAnnouncements();
      app.innerHTML = renderDashboard(user, profile, rows, progressRows, deadlines);
      } catch (error) {
        console.error("Render error:", error);
        app.innerHTML = `
          <div class="card">
            <h2>Something Needs Attention</h2>
            <p>${escapeHtml(error?.message || "The portal hit an unexpected error while loading this page.")}</p>
            <div class="inline-actions">
              <button class="primary" onclick="goDashboard()">Back to Dashboard</button>
              <button class="ghost" onclick="renderApp()">Try Again</button>
            </div>
          </div>
        `;
      }
    }

    renderApp();
  </script>
