<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIST Dallas Portal</title>

  <style>
    :root {
      --bg: #020617;
      --card: rgba(17, 24, 39, 0.82);
      --border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #94a3b8;
      --input: rgba(30, 41, 59, 0.85);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(147, 51, 234, 0.18), transparent 35%),
        var(--bg);
    }

    #app {
      min-height: 100vh;
      width: 100%;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 440px;
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .dashboard-shell {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(14px);
    }

    h1, h2, h3 {
      margin: 0;
    }

    h1 {
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 26px;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 18px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .primary {
      background: linear-gradient(90deg, #7c3aed, #d946ef);
    }

    .secondary {
      background: linear-gradient(90deg, #0ea5e9, #2563eb);
    }

    .ghost {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      width: auto;
      min-width: 130px;
    }

    .subtext {
      margin-top: 8px;
      font-size: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }

    .stat-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .actions button {
      width: auto;
      min-width: 170px;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #cbd5e1;
    }

    @media (max-width: 640px) {
      #app {
        padding: 16px;
      }

      .card,
      .panel {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 22px;
      }

      .topbar {
        flex-direction: column;
      }

      .actions {
        flex-direction: column;
      }

      .actions button,
      .ghost {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      window.APP_CONFIG.SUPABASE_URL,
      window.APP_CONFIG.SUPABASE_ANON_KEY
    );

    const ROLE_OPTIONS = [
      { id: "rd", title: "Regional Director", team: "Executive" },
      { id: "internal-ad", title: "Internal Associate Director", team: "Executive" },
      { id: "external-ad", title: "External Associate Director", team: "Executive" },
      { id: "registration-dir", title: "Registration Director", team: "Registration" },
      { id: "sports-dir", title: "Sports Director", team: "Sports" },
      { id: "ops-dir-1", title: "Ops Director 1 — Command Center Lead", team: "Operations" },
      { id: "ops-dir-2", title: "Ops Director 2 — Communications Lead", team: "Operations" },
      { id: "comps-dir", title: "Competitions Director", team: "Competitions" },
      { id: "dt-dir", title: "Dream Team Director", team: "Dream Team" },
      { id: "pr-dir", title: "PR Director", team: "PR" },
      { id: "programs-dir", title: "Programs Director", team: "Programs" },
      { id: "finance-dir", title: "Finance Director", team: "Finance" },
      { id: "judges-chair", title: "Judges Chair", team: "Competitions" },
      { id: "graphics-chair", title: "Graphics Chair", team: "PR" },
      { id: "marketing-chair", title: "Marketing Chair", team: "PR" },
      { id: "awards-chair", title: "Awards & Ceremonies Chair", team: "Programs" },
      { id: "workshops-chair", title: "Workshops Chair", team: "Programs" },
      { id: "sponsorships-chair", title: "Sponsorships Chair", team: "Finance" },
      { id: "recruitment-lead", title: "Recruitment Lead", team: "Dream Team" },
      { id: "td-lead", title: "Training & Development Lead", team: "Dream Team" }
    ];

    async function getUser() {
      const { data } = await supabaseClient.auth.getUser();
      return data.user;
    }

    async function getProfile(userId) {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .maybeSingle();

      if (error) {
        console.error("Profile fetch error:", error);
        return null;
      }

      return data;
    }

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Enter email and password.");
        return;
      }

      const { error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      alert("Account created. Then log in.");
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Enter email and password.");
        return;
      }

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      location.reload();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function saveProfile() {
      const user = await getUser();
      if (!user) {
        alert("No user found.");
        return;
      }

      const fullName = document.getElementById("full-name").value.trim();
      const roleId = document.getElementById("role-id").value;

      if (!fullName || !roleId) {
        alert("Please fill out your name and choose your role.");
        return;
      }

      const selectedRole = ROLE_OPTIONS.find(role => role.id === roleId);

      const { error } = await supabaseClient
        .from("profiles")
        .upsert({
          id: user.id,
          full_name: fullName,
          email: user.email,
          role_id: roleId,
          team: selectedRole ? selectedRole.team : null,
          updated_at: new Date().toISOString()
        });

      if (error) {
        console.error("Profile save error:", error);
        alert(error.message);
        return;
      }

      location.reload();
    }

    function renderLogin() {
      return `
        <div class="card">
          <h1>MIST Dallas</h1>
          <p>Organizer portal access for 2027 planning.</p>

          <div class="stack">
            <input id="email" type="email" placeholder="Email" />
            <input id="password" type="password" placeholder="Password" />
            <button class="primary" onclick="login()">Log In</button>
            <button class="secondary" onclick="signUp()">Sign Up</button>
          </div>

          <p class="subtext">If you are new, create your account first, then log in.</p>
        </div>
      `;
    }

    function renderRoleSetup(user) {
      return `
        <div class="card">
          <h2>Complete your profile</h2>
          <p>Choose your organizer role before entering the portal.</p>

          <div class="stack">
            <div>
              <div class="label">Email</div>
              <input value="${user.email}" disabled />
            </div>

            <div>
              <div class="label">Full name</div>
              <input id="full-name" placeholder="Your full name" />
            </div>

            <div>
              <div class="label">Role</div>
              <select id="role-id">
                <option value="">Choose your role</option>
                ${ROLE_OPTIONS.map(role => `
                  <option value="${role.id}">${role.title} — ${role.team}</option>
                `).join("")}
              </select>
            </div>

            <button class="primary" onclick="saveProfile()">Save and Continue</button>
          </div>

          <div class="note">For now, each organizer selects their role once. We can make this admin-assigned later.</div>
        </div>
      `;
    }

    function renderDashboard(user, profile) {
      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>MIST Dallas Portal</h1>
              <p>Welcome back, ${profile.full_name || user.email}</p>
            </div>
            <button class="ghost" onclick="logout()">Log Out</button>
          </div>

          <div class="panel">
            <h2>Organizer Dashboard</h2>
            <p>Your portal is connected. Next we’ll wire this into the workbook and progress board.</p>

            <div class="grid">
              <div class="stat">
                <div class="stat-title">Email</div>
                <div class="stat-value">${user.email}</div>
              </div>

              <div class="stat">
                <div class="stat-title">Role</div>
                <div class="stat-value">${profile.role_id || "Not set"}</div>
              </div>

              <div class="stat">
                <div class="stat-title">Team</div>
                <div class="stat-value">${profile.team || "Not set"}</div>
              </div>

              <div class="stat">
                <div class="stat-title">Progress Status</div>
                <div class="stat-value">Coming next</div>
              </div>
            </div>

            <div class="actions">
              <button class="primary" onclick="alert('Next step: role-based workbook')">Open Workbook</button>
              <button class="secondary" onclick="alert('Next step: shared progress board')">Progress Board</button>
            </div>
          </div>
        </div>
      `;
    }

    async function init() {
      const app = document.getElementById("app");
      const user = await getUser();

      if (!user) {
        app.innerHTML = renderLogin();
        return;
      }

      const profile = await getProfile(user.id);

      if (!profile || !profile.role_id) {
        app.innerHTML = renderRoleSetup(user);
        return;
      }

      app.innerHTML = renderDashboard(user, profile);
    }

    init();
  </script>
</body>
</html>
