<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIST Dallas Portal</title>

  <style>
    :root {
      --bg: #020617;
      --card: rgba(17, 24, 39, 0.8);
      --border: rgba(148, 163, 184, 0.2);
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at top, rgba(59,130,246,.15), transparent 40%),
        radial-gradient(circle at bottom right, rgba(147,51,234,.15), transparent 40%),
        var(--bg);
      color: var(--text);
    }

    #app {
      min-height: 100vh;
      padding: 40px;
    }

    .center {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 420px;
      width: 100%;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: linear-gradient(90deg, #7c3aed, #d946ef);
    }

    .secondary {
      background: linear-gradient(90deg, #0ea5e9, #2563eb);
    }

    .ghost {
      background: rgba(255,255,255,.06);
    }

    .dashboard {
      max-width: 1000px;
      margin: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 16px;
    }

    .stat {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
    }

    h1 { margin: 0 0 10px; }
    p { color: var(--muted); }

  </style>
</head>

<body>
  <div id="app"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      window.APP_CONFIG.SUPABASE_URL,
      window.APP_CONFIG.SUPABASE_ANON_KEY
    );

    const ROLES = [
      { id:"rd", title:"Regional Director", team:"Executive" },
      { id:"registration-dir", title:"Registration Director", team:"Registration" },
      { id:"sports-dir", title:"Sports Director", team:"Sports" },
      { id:"ops-dir", title:"Operations Director", team:"Operations" }
    ];

    async function getUser(){
      const {data} = await supabaseClient.auth.getUser();
      return data.user;
    }

    async function getProfile(id){
      const {data} = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id",id)
        .maybeSingle();
      return data;
    }

    async function login(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const {error} = await supabaseClient.auth.signInWithPassword({email,password});
      if(error) return alert(error.message);

      location.reload();
    }

    async function signUp(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const {error} = await supabaseClient.auth.signUp({email,password});
      if(error) return alert(error.message);

      alert("Account created");
    }

    async function logout(){
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function saveProfile(){
      const user = await getUser();

      const name = document.getElementById("name").value;
      const role = document.getElementById("role").value;

      const selected = ROLES.find(r=>r.id===role);

      await supabaseClient.from("profiles").upsert({
        id:user.id,
        full_name:name,
        email:user.email,
        role_id:role,
        team:selected?.team
      });

      location.reload();
    }

    function loginUI(){
      return `
      <div class="center">
        <div class="card">
          <h1>MIST Dallas</h1>
          <input id="email" placeholder="Email">
          <input id="password" type="password" placeholder="Password">
          <button class="primary" onclick="login()">Login</button>
          <button class="secondary" onclick="signUp()">Sign Up</button>
        </div>
      </div>`;
    }

    function roleUI(user){
      return `
      <div class="center">
        <div class="card">
          <h1>Choose Role</h1>
          <input id="name" placeholder="Full Name">
          <select id="role">
            <option value="">Select Role</option>
            ${ROLES.map(r=>`<option value="${r.id}">${r.title}</option>`).join("")}
          </select>
          <button class="primary" onclick="saveProfile()">Continue</button>
        </div>
      </div>`;
    }

    function dashboard(user,profile){
      return `
      <div class="dashboard">
        <div class="topbar">
          <div>
            <h1>MIST Dallas Portal</h1>
            <p>Welcome back, ${profile.full_name}</p>
          </div>
          <button class="ghost" onclick="logout()">Log Out</button>
        </div>

        <div class="grid">
          <div class="stat">
            <p>Email</p>
            <h3>${user.email}</h3>
          </div>

          <div class="stat">
            <p>Role</p>
            <h3>${profile.role_id}</h3>
          </div>

          <div class="stat">
            <p>Team</p>
            <h3>${profile.team}</h3>
          </div>
        </div>

        <br>

        <button class="primary" onclick="alert('Next: Workbook')">
          Open Workbook
        </button>

        <button class="secondary" onclick="alert('Next: Progress Board')">
          Progress Board
        </button>

      </div>`;
    }

    async function init(){
      const app = document.getElementById("app");
      const user = await getUser();

      if(!user){
        app.innerHTML = loginUI();
        return;
      }

      const profile = await getProfile(user.id);

      if(!profile || !profile.role_id){
        app.innerHTML = roleUI(user);
        return;
      }

      app.innerHTML = dashboard(user,profile);
    }

    init();
  </script>
</body>
</html>
