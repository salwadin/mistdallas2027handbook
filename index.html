<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIST Dallas 2027 — Organizer Workbook</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b14;--bg2:#0f1020;--bg3:#151628;
  --text:#e8e9f8;--dim:#7b7d9e;--border:#1e2040;
  --fp:oklch(0.62 0.22 285);--bp:oklch(0.62 0.20 235);
  --sp:oklch(0.72 0.17 65);--ep:oklch(0.68 0.18 155);
  --head:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px}
canvas#stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.7}
#app{position:relative;z-index:1}

/* ── Selector ── */
.selector{max-width:1140px;margin:0 auto;padding:52px 24px}
.hero{text-align:center;margin-bottom:52px}
.hero-icon{font-size:52px;margin-bottom:16px}
.hero-title{font-family:var(--head);font-size:38px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.hero-sub-color{color:var(--fp);font-family:var(--head);font-size:16px;font-weight:500;margin-bottom:10px}
.hero-desc{color:var(--dim);font-size:14px;max-width:500px;margin:0 auto 22px;line-height:1.7}
.search{width:100%;max-width:320px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:10px 18px;color:var(--text);font-family:var(--body);font-size:14px;outline:none;display:block;margin:0 auto;text-align:center;transition:border-color .2s}
.search:focus{border-color:var(--fp)}
.phase-legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:44px}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--head);font-size:12px;color:var(--dim)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.team-section{margin-bottom:32px}
.team-label{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-left:2px;display:flex;align-items:center;gap:8px}
.team-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.role-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px 13px 18px;cursor:pointer;transition:all .18s;border-left-width:3px}
.role-card:hover{background:var(--bg3);transform:translateY(-1px)}
.role-card-title{font-family:var(--head);font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px}
.role-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{display:inline-block;font-size:8px;font-weight:700;letter-spacing:1.5px;padding:2px 6px;border-radius:3px;font-family:var(--head)}
.phase-pip{font-size:12px}

/* ── Workbook ── */
.workbook{max-width:920px;margin:0 auto;padding:32px 24px 80px}
.wb-topbar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--dim);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--head);font-weight:600;transition:all .15s;letter-spacing:.5px}
.back-btn:hover{border-color:var(--text);color:var(--text)}
.print-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--head);font-weight:600}
.print-btn:hover{border-color:var(--dim)}
.role-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.role-team-label{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.role-title{font-family:var(--head);font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.role-meta{color:var(--dim);font-size:13px;font-family:var(--head);display:flex;gap:18px;flex-wrap:wrap}
.role-meta strong{color:var(--text);font-weight:600}

/* Cover fields */
.cover-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px 28px;margin-bottom:24px}
.cover-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.cover-field label{display:block;font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.cover-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:var(--body);font-size:13px;outline:none;transition:border-color .2s}
.cover-field input:focus{border-color:var(--dim)}

/* Tabs */
.tab-nav{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:32px;flex-wrap:wrap;overflow-x:auto}
.tab-btn{font-family:var(--head);font-size:11px;font-weight:700;padding:9px 16px;border:none;background:none;color:var(--dim);cursor:pointer;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;flex-shrink:0}
.tab-btn.active{color:var(--fp);border-bottom-color:var(--fp)}
.tab-btn[data-tab="build"].active{color:var(--bp);border-bottom-color:var(--bp)}
.tab-btn[data-tab="stabilization"].active{color:var(--sp);border-bottom-color:var(--sp)}
.tab-btn[data-tab="execution"].active{color:var(--ep);border-bottom-color:var(--ep)}
.tab-btn[data-tab="org-chart"].active,.tab-btn[data-tab="timeline"].active,.tab-btn[data-tab="directory"].active{color:var(--dim);border-bottom-color:var(--dim)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Phase header */
.phase-header{display:flex;align-items:flex-start;gap:16px;border-radius:12px;padding:20px 24px;margin-bottom:26px;border-width:1px;border-style:solid}
.phase-icon{font-size:30px;line-height:1;flex-shrink:0}
.phase-name{font-family:var(--head);font-size:20px;font-weight:700;margin-bottom:2px}
.phase-dates{font-size:12px;color:var(--dim);font-family:var(--head);margin-bottom:4px}
.phase-tagline{font-size:13px;color:var(--dim);font-style:italic}

/* Sections */
.section{margin-bottom:28px}
.section-title{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.focus-text{font-size:15px;line-height:1.75;margin-bottom:4px}

/* Responsibilities */
.resp-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.resp-item{display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.55}
.resp-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}

/* Checklist */
.check-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.check-item input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:2px;cursor:pointer;border-radius:3px}
.check-item label{font-size:14px;line-height:1.5;cursor:pointer}

/* Tables */
.table-wrap{overflow-x:auto;margin-top:8px}
.fw-table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--body)}
.fw-table th{font-family:var(--head);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;border:1px solid var(--border);text-align:left;white-space:nowrap}
.fw-table td{padding:0;border:1px solid var(--border);vertical-align:top}
.fw-table td textarea{width:100%;min-height:32px;background:transparent;border:none;padding:6px 8px;color:var(--text);font-size:12px;font-family:var(--body);resize:none;outline:none;line-height:1.4}
.fw-table td textarea:focus{background:var(--bg3)}

/* Grid2 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.grid2-card{border-radius:10px;padding:16px 18px;border-width:1px;border-style:solid}
.grid2-label{font-family:var(--head);font-size:12px;font-weight:700;margin-bottom:12px}
.grid2-prompt{font-size:11px;color:var(--dim);font-family:var(--head);margin-bottom:5px;margin-top:8px}
.grid2-card textarea{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:5px;padding:7px 9px;color:var(--text);font-size:12px;font-family:var(--body);resize:vertical;min-height:40px;outline:none;margin-bottom:2px}

/* Weekly plan */
.week-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.week-label{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.week-default{font-size:12px;color:var(--dim);margin-bottom:7px;line-height:1.5}
.week-row textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:12px;font-family:var(--body);resize:vertical;min-height:44px;outline:none}

/* Reflections */
.reflection-item{margin-bottom:14px}
.reflection-q{font-size:13px;color:var(--dim);font-style:italic;margin-bottom:7px;padding-left:14px;border-left:2px solid var(--border);line-height:1.5}
.reflection-item textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:var(--body);resize:vertical;min-height:76px;outline:none;line-height:1.6}
.reflection-item textarea:focus{border-color:var(--dim)}

/* Risks */
.risk-item{display:flex;gap:10px;padding:9px 13px;background:rgba(200,80,50,.1);border:1px solid rgba(200,80,50,.25);border-radius:6px;margin-bottom:7px;font-size:13px;align-items:flex-start;line-height:1.5}
.risk-icon{flex-shrink:0;font-size:13px;margin-top:1px}
.risk-notes textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:13px;font-family:var(--body);resize:vertical;min-height:66px;outline:none;margin-top:10px}

/* Phase success check */
.success-card{border-radius:10px;padding:18px 20px;border-width:1px;border-style:solid;margin-top:10px}
.success-title{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.success-card textarea{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--body);resize:vertical;min-height:56px;outline:none;margin-top:10px}

/* Extras */
.extra-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px 32px}
.extra-title{font-family:var(--head);font-size:22px;font-weight:700;margin-bottom:6px}
.extra-sub{color:var(--dim);font-size:13px;margin-bottom:26px}
.org-top{text-align:center;margin-bottom:26px}
.org-top-card{display:inline-block;border-radius:10px;padding:12px 28px;border-width:2px;border-style:solid}
.org-top-name{font-family:var(--head);font-weight:700;font-size:16px;margin-bottom:2px}
.org-top-sub{font-size:11px;color:var(--dim)}
.org-ads{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:26px}
.org-ad-card{border-radius:8px;padding:10px 16px;text-align:center;border-width:1px;border-style:solid}
.org-teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.org-team-card{border-radius:10px;padding:14px 16px;border-width:1px;border-style:solid}
.org-team-label{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.org-team-director{font-family:var(--head);font-size:13px;font-weight:600;margin-bottom:6px}
.org-subs{padding-left:12px;border-left-width:2px;border-left-style:solid}
.org-sub-item{font-size:12px;color:var(--dim);margin-bottom:3px}
.escalation-flow{margin-top:26px;padding:16px 20px;background:var(--bg3);border-radius:10px}
.escalation-title{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.escalation-steps{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--head);font-size:12px}
.esc-step{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px}
.esc-arrow{color:var(--dim)}
.divider{height:1px;background:var(--border);margin:24px 0}
.timeline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:30px}
.timeline-card{border-radius:12px;padding:18px 18px;border-width:1px;border-style:solid}
.timeline-icon{font-size:26px;margin-bottom:6px}
.timeline-phase{font-family:var(--head);font-size:15px;font-weight:700;margin-bottom:2px}
.timeline-month{font-size:12px;color:var(--dim);font-family:var(--head);margin-bottom:2px}
.timeline-roles{font-size:11px;color:var(--dim);margin-bottom:10px}
.timeline-milestone{display:flex;gap:6px;margin-bottom:5px;font-size:11px;line-height:1.4;align-items:flex-start}
.milestone-dot{width:5px;height:5px;border-radius:50%;margin-top:4px;flex-shrink:0}
.onboard-table-wrap{overflow-x:auto}
.dir-section{margin-bottom:24px}
.dir-team-label{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.comms-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.comms-field label{display:block;font-size:12px;color:var(--dim);font-family:var(--head);margin-bottom:4px}
.comms-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-family:var(--body);font-size:13px;outline:none}

/* Print */
@media print{
  :root{--bg:#fff;--bg2:#f8f8fc;--bg3:#f0f0f8;--text:#111;--dim:#555;--border:#d0d0e0}
  canvas#stars,.back-btn,.print-btn,.cover-card,.tab-nav{display:none!important}
  .tab-pane{display:block!important}
  .workbook{padding:0}
  .phase-header,.risk-item,.section,.fw-table td textarea,.reflection-item textarea,.week-row textarea,.success-card textarea,.grid2-card textarea{background:#f8f8fc!important;color:#111!important;border-color:#d0d0e0!important}
  body{background:#fff}
}
@media(max-width:600px){
  .grid2{grid-template-columns:1fr}
  .org-ads{grid-template-columns:1fr}
  .hero-title{font-size:26px}
  .role-title{font-size:22px}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
// ════════════ DATA ════════════

// MIST Dallas 2027 — Workbook Data
// All roles, phases, responsibilities, frameworks, and prompts

const PHASE_META = {
  foundations: {
    id: 'foundations',
    label: 'Phase I: Foundations',
    shortLabel: 'Foundations',
    dates: 'September – October',
    tagline: 'Build it right before you build it big.',
    color: '#a78bfa',
    colorDark: '#7c3aed',
    colorBg: 'oklch(0.18 0.08 280)',
    icon: '🌌',
    badge: 'CORE',
  },

    id: 'build',
    label: 'Phase II: Build',
    shortLabel: 'Build',

  stabilization: {

    label: 'Phase III: Stabilization',
    shortLabel: 'Stabilization',
    dates: 'December',
    tagline: 'Lock it down. No gaps, no surprises.',

    colorDark: '#d97706',
    colorBg: 'oklch(0.20 0.08 65)',

    badge: 'STAB',
  },
  execution: {
    id: 'execution',
    label: 'Phase IV: Execution',
    shortLabel: 'Execution',
    dates: 'January → Event Weekend',
    tagline: 'Train. Assign. Execute. No hesitation.',

    colorDark: '#059669',
    colorBg: 'oklch(0.18 0.08 155)',
    icon: '🚀',
    badge: 'EXEC',
  },

const TEAMS = {
  exec: { label: 'Executive', color: '#a78bfa' },
  registration: { label: 'Registration', color: '#f472b6' },
  sports: { label: 'Sports', color: '#fb923c' },
  operations: { label: 'Operations', color: '#60a5fa' },
  competitions: { label: 'Competitions', color: '#34d399' },
  dreamteam: { label: 'Dream Team', color: '#facc15' },
  pr: { label: 'PR', color: '#f87171' },
  programs: { label: 'Programs', color: '#c084fc' },
  finance: { label: 'Finance', color: '#4ade80' },
};

const ROLES = [
  // ─── EXEC ──────────────────────────────────────────────────────────────
  {
    id: 'rd',
    title: 'Regional Director',
    team: 'exec',
    startPhase: 'foundations',
    badge: 'CORE',
    reportsTo: 'MIST Nationals',
    manages: ['Internal AD', 'External AD', 'All Directors'],
    phases: {
      foundations: {
        focus: 'Set the overall vision, build the leadership team, and establish the foundational structure of the entire event.',
        responsibilities: [
          'Define the overall vision, theme, and strategic direction for MIST Dallas 2027',
          'Recruit and onboard all Core Team Directors',
          'Establish reporting structures, communication norms, and accountability systems',
          'Coordinate with MIST Nationals on alignment and requirements',
          'Set the master calendar and phase milestones',
        ],
        deliverables: [
          'Core Team fully onboarded and roles confirmed',
          'Master event calendar and phase timeline created',
          'Communication channels established (group chats, docs, meeting cadence)',
          'Vision document or kickoff presentation delivered to team',
          'Initial outreach to venue contacts started',
        ],
        frameworks: [
          {
            type: 'table',
            title: 'Director Onboarding Tracker',
            columns: ['Director', 'Role', 'Onboarded?', 'First Check-in Date', 'Notes'],
            rows: 8,
          },
          {
            type: 'grid2',
            title: 'Vision vs. Constraints',
            left: { label: 'Our Vision for MIST Dallas 2027', prompts: ['What does success look like?', 'What experience do we want participants to have?', 'What does our team culture look like?'] },
            right: { label: 'Known Constraints', prompts: ['Budget ceiling?', 'Venue limitations?', 'Nationals requirements?'] },
          },
        ],
        weeklyPlan: [
          { week: 'Week 1–2', tasks: 'Finalize Core Team roster. Schedule kickoff meeting. Draft master calendar.' },
          { week: 'Week 3', tasks: 'Deliver vision document. Establish all communication channels. Begin venue conversations.' },
          { week: 'Week 4+', tasks: 'First check-ins with each director. Identify early risks. Confirm phase milestones.' },
        ],
        reflections: [
          'What does success look like when Phase II begins — what must be true by then?',
          'Which director or team area carries the most risk right now, and why?',
          'What is one decision you need to make early to unblock everyone else?',
        ],
        risks: ['Core team not fully committed or roles unclear', 'No master calendar = teams working without alignment', 'Nationals requirements missed early on'],
      },
      build: {
        focus: 'Ensure all teams are progressing within the established system, aligned on shared goals and deadlines.',
        responsibilities: [
          'Hold regular check-ins with all Directors (weekly or bi-weekly)',
          'Monitor cross-team dependencies and remove blockers',
          'Escalate or resolve any misalignments quickly',
          'Ensure venue and sponsor progress is on track',
          'Maintain the master calendar as the single source of truth',
        ],
        deliverables: [

          {

        ],
        risks: ['Teams drifting from the plan without check-ins', 'Venue falling through with no backup', 'Finance and sponsorship not aligned on budget'],
      },
      stabilization: {
        focus: 'Identify all remaining gaps, make final decisions, and ensure every team is fully ready to execute.',
        responsibilities: [

          'Make final calls on unresolved decisions (venues, schedules, budget)',

          'Review master schedule for completeness and conflicts',
          'Begin drafting weekend run-of-show with Ops Directors',
        ],
        deliverables: [

          'Budget finalized and approved',
        ],
        frameworks: [
          {
            type: 'table',
            title: 'Open Items Gap Tracker',
            columns: ['Item', 'Team', 'Owner', 'Status', 'Deadline'],

        ],
        weeklyPlan: [
          { week: 'Week 1', tasks: 'Run gap analysis with all directors. Capture every open item.' },

<script>
// ════════════ AUTH ════════════
const supabase = window.supabase.createClient(
  window.APP_CONFIG.SUPABASE_URL,
  window.APP_CONFIG.SUPABASE_ANON_KEY
);
window.supabaseClient = supabase;

async function getCurrentUser(){
  const { data, error } = await supabase.auth.getUser();
  if(error){
    console.error('Error getting user:', error);
    return null;
  }
  return data.user;
}

async function signUpWithEmail(email, password, fullName){
  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: { full_name: fullName }
    }
  });
  if(error){
    alert(error.message);
    return null;
  }
  return data;
}

async function signInWithEmail(email, password){
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){
    alert(error.message);
    return null;
  }
  return data;
}

async function signOutUser(){
  const { error } = await supabase.auth.signOut();
  if(error){
    alert(error.message);
    return;
  }
  localStorage.removeItem('mist-role');
  location.reload();
}

window.authHelpers = { getCurrentUser, signUpWithEmail, signInWithEmail, signOutUser };

function renderLoginScreen(){
  return `
    <div style="max-width:420px;margin:80px auto;padding:24px;background:#111827;border:1px solid #374151;border-radius:16px;color:white;font-family:Inter,sans-serif">
      <h1 style="font-size:28px;margin-bottom:10px">MIST Dallas Organizer Portal</h1>
      <p style="color:#9ca3af;margin-bottom:20px">Log in or create your account to access the workbook.</p>
      <div style="display:flex;flex-direction:column;gap:12px">
        <input id="full-name" type="text" placeholder="Full name (for sign up)" style="padding:12px;border-radius:10px;border:1px solid #374151;background:#1f2937;color:white;">
        <input id="email" type="email" placeholder="Email" style="padding:12px;border-radius:10px;border:1px solid #374151;background:#1f2937;color:white;">
        <input id="password" type="password" placeholder="Password" style="padding:12px;border-radius:10px;border:1px solid #374151;background:#1f2937;color:white;">
        <button id="signup-btn" style="padding:12px;border:none;border-radius:10px;background:#7c3aed;color:white;font-weight:600;cursor:pointer;">Sign Up</button>
        <button id="login-btn" style="padding:12px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:600;cursor:pointer;">Log In</button>
      </div>
      <p style="color:#6b7280;font-size:12px;margin-top:14px;line-height:1.5">Use the same email you want tied to your organizer account. We can connect role-based loading after this first login step works.</p>
    </div>
  `;
}

function attachLoginHandlers(){
  const signupBtn = document.getElementById('signup-btn');
  const loginBtn = document.getElementById('login-btn');

  if(signupBtn){
    signupBtn.addEventListener('click', async () => {
      const fullName = document.getElementById('full-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if(!fullName || !email || !password){
        alert('Please fill out full name, email, and password.');
        return;
      }
      const result = await window.authHelpers.signUpWithEmail(email, password, fullName);
      if(result){
        alert('Account created. If email confirmation is turned on in Supabase, confirm your email first.');
      }
    });
  }

  if(loginBtn){
    loginBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if(!email || !password){
        alert('Enter email and password.');
        return;
      }
      const result = await window.authHelpers.signInWithEmail(email, password);
      if(result){
        location.reload();
      }
    });
  }
}
</script>

<script>
// ════════════ APP ════════════

// --- Phase/Team helpers ---
const PHASE_ORDER = ['foundations','build','stabilization','execution'];
const PHASE_COLORS = {foundations:'var(--fp)',build:'var(--bp)',stabilization:'var(--sp)',execution:'var(--ep)'};
const BADGE_COLORS = {CORE:'var(--fp)',BUILD:'var(--bp)',STAB:'var(--sp)',EXEC:'var(--ep)'};

function phaseColor(id){ return PHASE_COLORS[id]||'#aaa'; }
function rolePhasesArr(role){ return PHASE_ORDER.filter(p=>role.phases[p]); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cid(){ return '_'+Math.random().toString(36).slice(2); }

// --- Star field ---
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();addEventListener('resize',resize);
  const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.2,o:Math.random(),do:(Math.random()-.5)*.008}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{s.o+=s.do;if(s.o<0||s.o>1)s.do*=-1;ctx.globalAlpha=Math.max(0,Math.min(1,s.o));ctx.fillStyle='#c8d0ff';ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;requestAnimationFrame(draw);
  }
  draw();
})();

// --- State ---
let state={view:'selector',roleId:localStorage.getItem('mist-role')||null,activeTab:null};

// --- HTML generators ---

function renderPhaseTab(phaseId, data, roleId){
  const meta = PHASE_META[phaseId];
  const col = phaseColor(phaseId);
  const hexAlpha = (a) => col.includes('oklch') ? col.replace(')',` / ${a})`) : col + a;
  
  let html = `
  <div class="phase-header" style="background:${col}18;border-color:${col}45">
    <div class="phase-icon">${meta.icon}</div>
    <div>
      <div class="phase-name" style="color:${col}">${esc(meta.label)}</div>
      <div class="phase-dates">${esc(meta.dates)}</div>
      <div class="phase-tagline">"${esc(meta.tagline)}"</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Phase Focus</div>
    <div class="focus-text">${esc(data.focus)}</div>
  </div>

  <div class="section">
    <div class="section-title">Key Responsibilities</div>
    <ul class="resp-list">${data.responsibilities.map(r=>`
      <li class="resp-item"><div class="resp-dot" style="background:${col}"></div><span>${esc(r)}</span></li>
    `).join('')}</ul>
  </div>

  <div class="section">
    <div class="section-title">Deliverables Checklist</div>
    ${data.deliverables.map((d,i)=>{const id=cid();return`
      <div class="check-item">
        <input type="checkbox" id="${id}" style="accent-color:${col}">
        <label for="${id}">${esc(d)}</label>
      </div>
    `;}).join('')}
  </div>
  `;

  // Frameworks
  if(data.frameworks){
    data.frameworks.forEach(fw=>{
      if(fw.type==='table'){
        html+=`<div class="section">
          <div class="section-title">${esc(fw.title)}</div>
          <div class="table-wrap"><table class="fw-table">
            <thead><tr>${fw.columns.map(c=>`<th style="background:${col}22;color:${col}">${esc(c)}</th>`).join('')}</tr></thead>
            <tbody>${Array.from({length:fw.rows},()=>`<tr>${fw.columns.map(()=>`<td><textarea rows="1"></textarea></td>`).join('')}</tr>`).join('')}</tbody>
          </table></div></div>`;
      } else if(fw.type==='grid2'){
        html+=`<div class="section">
          <div class="section-title">${esc(fw.title)}</div>
          <div class="grid2">
            ${[fw.left,fw.right].map(side=>`
              <div class="grid2-card" style="background:${col}0e;border-color:${col}35">
                <div class="grid2-label" style="color:${col}">${esc(side.label)}</div>
                ${side.prompts.map(p=>`<div class="grid2-prompt">${esc(p)}</div><textarea rows="2"></textarea>`).join('')}
              </div>
            `).join('')}
          </div></div>`;
      }
    });
  }

  // Weekly plan
  html+=`<div class="section">
    <div class="section-title">Weekly Planning Grid</div>
    ${data.weeklyPlan.map(w=>`
      <div class="week-row">
        <div class="week-label" style="color:${col}">${esc(w.week)}</div>
        <div class="week-default">${esc(w.tasks)}</div>
        <textarea rows="2" placeholder="Your specific actions this week..."></textarea>
      </div>
    `).join('')}
    <div class="week-row">
      <div class="week-label" style="color:${col}">Additional Planning</div>
      <textarea rows="2" placeholder="Any other notes..."></textarea>
    </div>
  </div>`;

  // Reflections
  html+=`<div class="section">
    <div class="section-title">Reflection Prompts</div>
    ${data.reflections.map(r=>`
      <div class="reflection-item">
        <div class="reflection-q">${esc(r)}</div>
        <textarea rows="3" placeholder="Your thoughts..."></textarea>
      </div>
    `).join('')}
  </div>`;

  // Risks
  html+=`<div class="section">
    <div class="section-title">Risk Awareness</div>
    ${data.risks.map(r=>`
      <div class="risk-item"><span class="risk-icon">⚠</span><span>${esc(r)}</span></div>
    `).join('')}
    <div class="risk-notes"><textarea rows="3" placeholder="My mitigation plan for these risks..."></textarea></div>
  </div>`;

  // Phase success check
  html+=`<div class="success-card" style="background:${col}0d;border-color:${col}35">
    <div class="success-title" style="color:${col}">Phase Success Check</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:12px">At the end of this phase, I can confirm:</div>
    ${['I understand my role and deliverables for this phase','My key deliverables are completed or on track','Relevant stakeholders and teammates are aligned','I have no unresolved blockers'].map((item,i)=>{const id=cid();return`
      <div class="check-item">
        <input type="checkbox" id="${id}" style="accent-color:${col}">
        <label for="${id}">${esc(item)}</label>
      </div>
    `;}).join('')}
    <textarea rows="2" placeholder="Additional phase notes..."></textarea>
  </div>`;

  return html;
}

        <div class="role-eyebrow">
          <span class="badge" style="background:${bc}28;color:${bc}">${esc(role.badge)}</span>
          <span class="role-team-label" style="color:${tc}">${esc(teamData.label)}</span>
        </div>
        <div class="role-title">${esc(role.title)}</div>
        <div class="role-meta">
          <span>↑ Reports to: <strong>${esc(role.reportsTo)}</strong></span>
          ${role.manages&&role.manages.length?`<span>↓ Manages: <strong>${esc(role.manages.join(', '))}</strong></span>`:''}
        </div>
      </div>
      <button class="print-btn" data-action="print">🖨 Print / PDF</button>
    </div>

    <div class="cover-card">
      <div style="font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:14px">Your Information</div>
      <div class="cover-grid">
        ${['Your Name','Event Year / Cycle','Team','Director / Supervisor'].map(f=>`
          <div class="cover-field"><label>${esc(f)}</label><input type="text" placeholder=""></div>
        `).join('')}
      </div>
    </div>

    <div class="tab-nav">
      ${allTabs.map(t=>`
        <button class="tab-btn${t===firstTab?' active':''}" data-action="switch-tab" data-tab="${t}">${tabLabels[t]||t}</button>
      `).join('')}
    </div>
  `;

  // Render all phase panes (hidden by default, shown by tab switching)
  phases.forEach(p=>{
    html+=`<div class="tab-pane${p===firstTab?' active':''}" id="tab-${p}">
      ${renderPhaseTab(p, role.phases[p], role.id)}
    </div>`;
  });

  // Extras
  html+=`<div class="tab-pane" id="tab-org-chart">${renderOrgChart()}</div>`;
  html+=`<div class="tab-pane" id="tab-timeline">${renderTimeline()}</div>`;
  html+=`<div class="tab-pane" id="tab-directory">${renderDirectory()}</div>`;

  html+=`</div>`; // .workbook
  return html;
}

function renderTimeline(){

    {id:'build',month:'Oct–Nov',roles:'+ 13 Build roles join',milestones:['Judges recruitment underway','Sports schedules drafted','DT applications open','PR content publishing','Sponsor outreach active','Zone Leads preparing materials']},
    {id:'stabilization',month:'December',roles:'+ 4 Stabilization roles join',milestones:['All schedules locked','Rosters finalized','Brackets created','Judges trained & assigned','Budget reconciled','All comms systems tested']},
    {id:'execution',month:'January → Event',roles:'Dream Team Members join',milestones:['DT training complete','Run-throughs done','Run-of-show distributed','Command Center ready','All teams: GO']},
  ];
  return `<div class="extra-panel">
    <div class="extra-title">Master Phase Timeline</div>
    <div class="extra-sub">MIST Dallas 2027 — September through Event Weekend</div>
    <div class="timeline-grid">
      ${phases.map(p=>{const meta=PHASE_META[p.id];const col=phaseColor(p.id);return`
        <div class="timeline-card" style="background:${col}10;border-color:${col}40">
          <div class="timeline-icon">${meta.icon}</div>
          <div class="timeline-phase" style="color:${col}">${esc(meta.shortLabel)}</div>
          <div class="timeline-month">${esc(p.month)}</div>
          <div class="timeline-roles">${esc(p.roles)}</div>
          ${p.milestones.map(m=>`
            <div class="timeline-milestone">
              <div class="milestone-dot" style="background:${col}"></div>

    <div class="divider"></div>

    <div class="onboard-table-wrap">
      <table class="fw-table" style="min-width:600px">
        <thead><tr>
          <th style="color:var(--dim)">Role</th>
          ${PHASE_ORDER.map(p=>`<th style="background:${phaseColor(p)}22;color:${phaseColor(p)};text-align:center">${PHASE_META[p].icon} ${PHASE_META[p].shortLabel}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${ROLES.map(role=>{
            const phases=rolePhasesArr(role);

}

function renderSelectorHTML(){
  const teamOrder=['exec','registration','sports','operations','competitions','dreamteam','pr','programs','finance'];
  const search = state.search||'';
  return `<div class="selector">
    <div class="hero">
      <div class="hero-icon">🌌</div>
      <div class="hero-title">MIST Dallas 2027</div>
      <div class="hero-sub-color">Organizer Workbook</div>
      <div class="hero-desc">Select your role to open your personalized planning workbook. Each workbook covers every phase you are active in — with frameworks, checklists, and reflection prompts.</div>
      <input class="search" id="role-search" type="text" placeholder="Search roles..." value="${esc(search)}">
    </div>
    <div class="phase-legend">
      ${PHASE_ORDER.map(p=>`
        <div class="legend-item">
          <div class="legend-dot" style="background:${phaseColor(p)}"></div>
          <span style="color:${phaseColor(p)};font-weight:600">${PHASE_META[p].shortLabel}</span>
          <span>${PHASE_META[p].dates}</span>
        </div>
      `).join('')}
    </div>
    ${teamOrder.map(teamId=>{
      const td=TEAMS[teamId];
      const roles=ROLES.filter(r=>r.team===teamId&&(!search||r.title.toLowerCase().includes(search.toLowerCase())));
      if(!roles.length)return'';
      return`<div class="team-section">
        <div class="team-label" style="color:${td.color}"><div class="team-dot" style="background:${td.color}"></div>${esc(td.label)} Team</div>
        <div class="role-grid">
          ${roles.map(role=>{
            const phases=rolePhasesArr(role);
            const bc=BADGE_COLORS[role.badge]||td.color;
            return`<div class="role-card" style="border-left-color:${td.color}" data-action="select-role" data-role-id="${role.id}">
              <div class="role-card-title">${esc(role.title)}</div>
              <div class="role-badges">
                <span class="badge" style="background:${bc}28;color:${bc}">${esc(role.badge)}</span>
                ${phases.map(p=>`<span class="phase-pip" title="${PHASE_META[p].shortLabel}">${PHASE_META[p].icon}</span>`).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// --- Render engine ---
function render(){
  const app=document.getElementById('app');
  if(state.view==='selector'){
    app.innerHTML=renderSelectorHTML();
    document.getElementById('role-search')?.addEventListener('input',e=>{state.search=e.target.value;render();});
  } else {
    const role=ROLES.find(r=>r.id===state.roleId);
    if(!role){state.view='selector';render();return;}
    app.innerHTML=renderWorkbookHTML(role);
  }
}

// --- Events ---
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const action=el.dataset.action;
  if(action==='select-role'){
    state.roleId=el.dataset.roleId;
    state.view='workbook';
    const role=ROLES.find(r=>r.id===state.roleId);
    state.activeTab=role?rolePhasesArr(role)[0]:null;
    localStorage.setItem('mist-role',state.roleId);
    window.scrollTo(0,0);
    render();
  } else if(action==='back'){
    state.view='selector';
    localStorage.removeItem('mist-role');
    window.scrollTo(0,0);
    render();
  } else if(action==='switch-tab'){
    const tab=el.dataset.tab;
    // Hide all panes
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    // Show selected
    const pane=document.getElementById('tab-'+tab);
    if(pane)pane.classList.add('active');
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.tab===tab);
    });
  } else if(action==='print'){
    window.print();
  }
});

// --- Init ---
async function initApp(){
  const app=document.getElementById('app');
  const user=await window.authHelpers.getCurrentUser();

  if(!user){
    app.innerHTML=renderLoginScreen();
    attachLoginHandlers();
    return;
  }

  if(state.roleId){
    state.view='workbook';
    const role=ROLES.find(r=>r.id===state.roleId);
    state.activeTab=role?rolePhasesArr(role)[0]:null;
  }

  render();

  const topBar=document.querySelector('.wb-topbar');
  if(topBar && !document.getElementById('logout-btn')){
    const logoutBtn=document.createElement('button');
    logoutBtn.id='logout-btn';
    logoutBtn.textContent='Log Out';
    logoutBtn.className='print-btn';
    logoutBtn.style.marginLeft='8px';
    logoutBtn.addEventListener('click', ()=>window.authHelpers.signOutUser());
    topBar.appendChild(logoutBtn);
  }
}

initApp();
</script>
