<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIST Dallas Portal</title>

  <style>
    :root {
      --bg: #020617;
      --card: rgba(17, 24, 39, 0.85);
      --border: rgba(148, 163, 184, 0.25);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #9333ea;
      --secondary: #0ea5e9;
      --input: rgba(30, 41, 59, 0.8);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(59,130,246,.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(147,51,234,.15), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1, h2 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(90deg, #7c3aed, #d946ef);
    }

    .secondary {
      background: linear-gradient(90deg, #0ea5e9, #2563eb);
    }

    .ghost {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 4px 0 6px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .dashboard {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .stat-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .actions button {
      width: auto;
      min-width: 160px;
    }

    .message {
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5e1;
    }

    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
      }

      h1, h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      window.APP_CONFIG.SUPABASE_URL,
      window.APP_CONFIG.SUPABASE_ANON_KEY
    );

    const ROLE_OPTIONS = [
      { id: "rd", title: "Regional Director", team: "Executive" },
      { id: "internal-ad", title: "Internal Associate Director", team: "Executive" },
      { id: "external-ad", title: "External Associate Director", team: "Executive" },
      { id: "registration-dir", title: "Registration Director", team: "Registration" },
      { id: "sports-dir", title: "Sports Director", team: "Sports" },
      { id: "ops-dir-1", title: "Ops Director 1 — Command Center Lead", team: "Operations" },
      { id: "ops-dir-2", title: "Ops Director 2 — Communications Lead", team: "Operations" },
      { id: "comps-dir", title: "Competitions Director", team: "Competitions" },
      { id: "dt-dir", title: "Dream Team Director", team: "Dream Team" },
      { id: "pr-dir", title: "PR Director", team: "PR" },
      { id: "programs-dir", title: "Programs Director", team: "Programs" },
      { id: "finance-dir", title: "Finance Director", team: "Finance" },
      { id: "judges-chair", title: "Judges Chair", team: "Competitions" },
      { id: "graphics-chair", title: "Graphics Chair", team: "PR" },
      { id: "marketing-chair", title: "Marketing Chair", team: "PR" },
      { id: "awards-chair", title: "Awards & Ceremonies Chair", team: "Programs" },
      { id: "workshops-chair", title: "Workshops Chair", team: "Programs" },
      { id: "sponsorships-chair", title: "Sponsorships Chair", team: "Finance" },
      { id: "recruitment-lead", title: "Recruitment Lead", team: "Dream Team" },
      { id: "td-lead", title: "Training & Development Lead", team: "Dream Team" }
    ];

    async function getUser() {
      const { data } = await supabaseClient.auth.getUser();
      return data.user;
    }

    async function getProfile(userId) {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .maybeSingle();

      if (error) {
        console.error("Profile fetch error:", error);
        return null;
      }

      return data;
    }

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const { error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) return alert(error.message);
      alert("Account created. Then log in.");
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) return alert(error.message);
      location.reload();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function saveProfile() {
      const user = await getUser();
      if (!user) return alert("No user found.");

      const fullName = document.getElementById("full-name").value.trim();
      const roleId = document.getElementById("role-id").value;

      if (!fullName || !roleId) {
        alert("Please fill out your name and choose a role.");
        return;
      }

      const selectedRole = ROLE_OPTIONS.find(r => r.id === roleId);

      const payload = {
        id: user.id,
        full_name: fullName,
        email: user.email,
        role_id: roleId,
        team: selectedRole ? selectedRole.team : null,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("profiles")
        .upsert(payload);

      if (error) {
        console.error(error);
        alert(error.message);
        return;
      }

      location.reload();
    }

    function renderLogin() {
      return `
        <div class="card">
          <h1>MIST Dallas Portal</h1>
          <p>Log in first. New organizers can create an account here.</p>

          <div class="stack">
            <input id="email" type="email" placeholder="Email" />
            <input id="password" type="password" placeholder="Password" />
            <button class="primary" onclick="login()">Log In</button>
            <button class="secondary" onclick="signUp()">Sign Up</button>
          </div>
        </div>
      `;
    }

    function renderRoleSetup(user) {
      return `
        <div class="card">
          <h2>Complete your profile</h2>
          <p>Before entering the portal, choose your organizer role.</p>

          <div class="stack">
            <div>
              <div class="label">Email</div>
              <input value="${user.email}" disabled />
            </div>

            <div>
              <div class="label">Full name</div>
              <input id="full-name" placeholder="Your full name" />
            </div>

            <div>
              <div class="label">Role</div>
              <select id="role-id">
                <option value="">Choose your role</option>
                ${ROLE_OPTIONS.map(role => `
                  <option value="${role.id}">
                    ${role.title} — ${role.team}
                  </option>
                `).join("")}
              </select>
            </div>

            <button class="primary" onclick="saveProfile()">Save and Continue</button>
            <div class="message">This can be made admin-assigned later. For now, each organizer chooses once.</div>
          </div>
        </div>
      `;
    }

    function renderDashboard(user, profile) {
      return `
        <div class="dashboard">
          <div class="topbar">
            <div>
              <h1>MIST Dallas Portal</h1>
              <p>You're in. Next we connect this to the workbook.</p>
            </div>
            <button class="ghost" onclick="logout()">Log Out</button>
          </div>

          <div class="panel">
            <h2>Welcome, ${profile.full_name || user.email}</h2>
            <p>This is your organizer dashboard shell. Next we will connect your assigned role to the workbook.</p>

            <div class="grid">
              <div class="stat">
                <div class="stat-title">Email</div>
                <div class="stat-value">${user.email}</div>
              </div>

              <div class="stat">
                <div class="stat-title">Role</div>
                <div class="stat-value">${profile.role_id || "Not set"}</div>
              </div>

              <div class="stat">
                <div class="stat-title">Team</div>
                <div class="stat-value">${profile.team || "Not set"}</div>
              </div>

              <div class="stat">
                <div class="stat-title">Tracking status</div>
                <div class="stat-value">Coming next</div>
              </div>
            </div>

            <div class="actions">
              <button class="primary" onclick="alert('Next step: connect workbook by role')">Open Workbook</button>
              <button class="secondary" onclick="alert('Next step: shared organizer progress board')">Progress Board</button>
            </div>
          </div>
        </div>
      `;
    }

    async function init() {
      const app = document.getElementById("app");
      const user = await getUser();

      if (!user) {
        app.innerHTML = renderLogin();
        return;
      }

      const profile = await getProfile(user.id);

      if (!profile || !profile.role_id) {
        app.innerHTML = renderRoleSetup(user);
        return;
      }

      app.innerHTML = renderDashboard(user, profile);
    }

    init();
  </script>
</body>
</html>
