<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIST Dallas Portal</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #020617;
      --card: rgba(17, 24, 39, 0.82);
      --border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #94a3b8;
      --input: rgba(30, 41, 59, 0.85);
      --purple: #7c3aed;
      --pink: #d946ef;
      --blue: #0ea5e9;
      --blue2: #2563eb;
      --green: #10b981;
      --gold: #f59e0b;
      --red: #f43f5e;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(147, 51, 234, 0.18), transparent 35%),
        var(--bg);
    }

    #app {
      min-height: 100vh;
      width: 100%;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 28px;
    }

    .dashboard-shell {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .panel {
      padding: 22px;
      margin-bottom: 16px;
    }

    h1, h2, h3 { margin: 0; }
    h1 {
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 21px;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    h3 { font-size: 16px; line-height: 1.25; }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.55;
    }

    input::placeholder, textarea::placeholder { color: #94a3b8; }
    input:disabled { opacity: 0.8; cursor: not-allowed; }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      font-family: inherit;
    }

    button:hover { transform: translateY(-1px); opacity: 0.96; }
    .full { width: 100%; }
    .primary { background: linear-gradient(90deg, var(--purple), var(--pink)); }
    .secondary { background: linear-gradient(90deg, var(--blue), var(--blue2)); }
    .ghost {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      width: auto;
      min-width: 130px;
    }

    .subtext { margin-top: 8px; font-size: 13px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }

    .stat-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .actions button { min-width: 170px; }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 18px 0 24px;
    }

    .tab-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid color-mix(in srgb, var(--phase-color, #94a3b8) 35%, var(--border));
      color: var(--text);
      min-width: 130px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .tab-btn.active {
      background: var(--phase-gradient, linear-gradient(90deg, rgba(124,58,237,.9), rgba(217,70,239,.9)));
      border-color: transparent;
      box-shadow:
        0 12px 26px color-mix(in srgb, var(--phase-color, #38bdf8) 25%, transparent),
        inset 0 0 0 1px rgba(255,255,255,.16);
    }

    .check-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      margin-bottom: 10px;
      cursor: pointer;
    }

    .check-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--phase-color, var(--purple));
      flex-shrink: 0;
      padding: 0;
      border-radius: 4px;
      appearance: auto;
      -webkit-appearance: checkbox;
      cursor: pointer;
    }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .phase-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--phase-color, #38bdf8) 16%, rgba(255,255,255,.055));
      border: 1px solid color-mix(in srgb, var(--phase-color, #38bdf8) 38%, var(--border));
      font-size: 12px;
      color: color-mix(in srgb, var(--phase-color, #38bdf8) 78%, #ffffff);
      font-weight: 700;
    }

    .phase-panel {
      position: relative;
      overflow: hidden;
      border-color: color-mix(in srgb, var(--phase-color, #38bdf8) 44%, var(--border));
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--phase-color, #38bdf8) 13%, transparent), rgba(255,255,255,.025)),
        var(--card);
    }

    .phase-panel::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--phase-gradient, var(--phase-color, #38bdf8));
    }

    .phase-panel > * {
      position: relative;
    }

    .muted { color: var(--muted); }

    .list-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
    }

    .list-table th, .list-table td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
    }

    .save-status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .phase-progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .phase-mini {
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--phase-color, #38bdf8) 35%, var(--border));
      border-radius: 14px;
      background: color-mix(in srgb, var(--phase-color, #38bdf8) 10%, rgba(255,255,255,.03));
    }

    .phase-mini strong {
      display: block;
      margin-bottom: 4px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .nav-card {
      min-height: 150px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      text-align: left;
      border-top: 3px solid var(--blue);
    }

    .nav-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .nav-card span {
      display: block;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.45;
    }

    .directory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .person-card {
      min-height: 150px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      border-top: 3px solid var(--team-color, var(--blue));
    }

    .person-card.unclaimed {
      border-style: dashed;
      background: rgba(255,255,255,.02);
    }

    .person-card h3 {
      margin-bottom: 8px;
      word-break: break-word;
    }

    .role-meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .task-list {
      margin: 12px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    .task-list li {
      margin-bottom: 6px;
    }

    .team-board {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .team-board-section {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--team-color, var(--blue)) 10%, transparent), rgba(255,255,255,.018));
      border-top: 3px solid var(--team-color, var(--blue));
    }

    .team-board-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .timeline {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--phase-color, var(--blue)) 12%, transparent), rgba(255,255,255,.028));
      border-left: 6px solid var(--phase-color, var(--blue));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--phase-color, var(--blue)) 10%, transparent);
    }

    .timeline-date {
      color: color-mix(in srgb, var(--phase-color, #bfdbfe) 78%, #ffffff);
      font-weight: 800;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .onboarding-roles {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .deadline-card {
      border: 1px solid color-mix(in srgb, var(--phase-color, var(--blue)) 36%, var(--border));
      border-top: 6px solid var(--phase-color, var(--blue));
      border-radius: 16px;
      padding: 16px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--phase-color, var(--blue)) 13%, transparent), rgba(255,255,255,.03));
    }

    .deadline-date {
      color: color-mix(in srgb, var(--phase-color, #e0f2fe) 76%, #ffffff);
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .deadline-card.overdue {
      border-color: color-mix(in srgb, var(--red) 55%, var(--border));
      border-top-color: var(--red);
    }

    .deadline-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .priority-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      text-transform: capitalize;
    }

    .priority-pill.high,
    .priority-pill.critical {
      border-color: color-mix(in srgb, var(--red) 55%, var(--border));
      color: #fecdd3;
    }

    .priority-pill.medium {
      border-color: color-mix(in srgb, var(--gold) 55%, var(--border));
      color: #fde68a;
    }

    .priority-pill.low {
      border-color: color-mix(in srgb, var(--green) 45%, var(--border));
      color: #bbf7d0;
    }

    .admin-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .admin-form textarea {
      min-height: 78px;
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .inline-actions button {
      width: auto;
      min-width: 120px;
    }

    .danger {
      background: linear-gradient(90deg, #e11d48, #f97316);
    }

    .success {
      background: linear-gradient(90deg, #059669, #34d399);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      text-transform: capitalize;
    }

    .status-pill.pending {
      border-color: color-mix(in srgb, var(--gold) 45%, var(--border));
      color: #fde68a;
    }

    .status-pill.approved {
      border-color: color-mix(in srgb, var(--green) 45%, var(--border));
      color: #bbf7d0;
    }

    .status-pill.declined {
      border-color: color-mix(in srgb, var(--red) 45%, var(--border));
      color: #fecdd3;
    }

    .application-question {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
    }

    .option-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .option-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.025);
      cursor: pointer;
    }

    .option-row input {
      width: 18px;
      height: 18px;
      padding: 0;
      margin-top: 1px;
      accent-color: var(--purple);
      appearance: auto;
      -webkit-appearance: auto;
      flex-shrink: 0;
    }

    .answer-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    @media (max-width: 640px) {
      #app { padding: 16px; }
      .card, .panel { padding: 20px; }
      h1 { font-size: 24px; }
      h2 { font-size: 19px; }
      .topbar { flex-direction: column; }
      .actions { flex-direction: column; }
      .actions button, .ghost, .tab-btn { width: 100%; }
      .timeline-item { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="workbook-data.js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      window.APP_CONFIG.SUPABASE_URL,
      window.APP_CONFIG.SUPABASE_ANON_KEY
    );

    const SOURCE_DATA = window.MIST_DATA || window.WORKBOOK_DATA;
    const PHASES = buildPhaseLookup(SOURCE_DATA);
    const ROLE_OPTIONS = buildRoleOptions(SOURCE_DATA);
    const WORKBOOKS = buildWorkbookLookup(SOURCE_DATA);
    const TIMELINE = buildTimeline(SOURCE_DATA);
    const TEAM_COLORS = buildTeamColors(SOURCE_DATA);
    const PHASE_COLORS = {
      foundations: "#f472b6",
      build: "#22d3ee",
      stabilization: "#facc15",
      execution: "#34d399"
    };
    const PHASE_GRADIENTS = {
      foundations: "linear-gradient(135deg, #7c3aed, #f472b6)",
      build: "linear-gradient(135deg, #0284c7, #22d3ee)",
      stabilization: "linear-gradient(135deg, #f59e0b, #facc15)",
      execution: "linear-gradient(135deg, #059669, #34d399)"
    };
    const APPLICATION_QUESTIONS = [
      { id: "understand_not_guarantee", section: "Commitments", type: "radio", label: "I understand that this is an application and not a guarantee.", options: ["Yes"], required: true },
      { id: "volunteering_time", section: "Commitments", type: "radio", label: "I understand that I am volunteering my time and efforts.", options: ["Yes"], required: true },
      { id: "sake_of_allah", section: "Commitments", type: "radio", label: "I am doing this for the sake of Allah swt and not for clout or bragging rights.", options: ["Yes alhamdulillah"], required: true },
      { id: "professionalism_ihsan", section: "Commitments", type: "radio", label: "I will leave outside drama at home and treat MIST with professionalism and ihsan.", options: ["Yes"], required: true },
      { id: "confidentiality", section: "Commitments", type: "checkbox", label: "I understand that MIST work is confidential and cannot be shared outside of our board circle.", options: ["Yes", "Not even with my parents", "Not even with my siblings", "Not even with my besties", "Not even with my cousin who basically lives under a rock", "Not even with past MIST board members"], required: true },
      { id: "required_meetings", section: "Commitments", type: "radio", label: "If selected, I will attend all required meetings.", options: ["Yes"], required: true },
      { id: "willing_to_drive", section: "Commitments", type: "radio", label: "If selected, I am willing to drive for meetings.", options: ["Yes"], required: true },
      { id: "name", section: "About You", type: "text", label: "My name is:", required: true },
      { id: "gender", section: "About You", type: "radio", label: "I am", options: ["A brother", "A sister"], required: true },
      { id: "still_in_school", section: "About You", type: "radio", label: "Are you still in school?", options: ["Yes", "No"], required: false },
      { id: "position_change", section: "About You", type: "radio", label: "Do you want to change your position or remain in your current position?", options: ["I like where I am!", "I want to explore other options"], required: true },
      { id: "time_commitment", section: "About You", type: "radio", label: "What are you expecting the time commitment to be?", options: ["1-5 hours a week", "6-10 hours a week", "11-15 hours a week", "This is actually my newest full time job, what are the employee benefits?"], required: true },
      { id: "team_change", section: "About You", type: "textarea", label: "What is ONE change you would implement in your team next year, and how would you execute it step-by-step", required: false },
      { id: "fell_short", section: "About You", type: "textarea", label: "Describe a time this year where you fell short in your role. What happened, and what would you do differently?", required: false },
      { id: "build_case", section: "The Real Stuff", type: "textarea", label: "Build your case: why do you want to remain in your position or why do you want to change your position? What qualifies you for the change in position?", required: true },
      { id: "i_am_traits", section: "The Real Stuff", type: "checkbox", label: "I am", options: ["Good at delegation", "Good at tasks", "Terrible with authority", "In need of direction", "In want of a smaller role", "In want of a bigger role"], required: true },
      { id: "stick_with_mist", section: "The Real Stuff", type: "radio", label: "I plan to stick with MIST for a few years.", options: ["Strongly disagree", "Disagree", "Neutral", "Agree", "Strongly agree"], required: false },
      { id: "delivered_well", section: "The Real Stuff", type: "textarea", label: "What have you consistently delivered well in MIST this past year? Give 2-3 specific examples", required: true },
      { id: "feedback", section: "The Real Stuff", type: "textarea", label: "What feedback have you received this year, and how have you acted on it or plan to?", required: true },
      { id: "weekly_commitments", section: "The Real Stuff", type: "textarea", label: "List your weekly commitments (school, work, MCAT, etc.) and realistically how many hours per week you can dedicate to MIST during each phase", required: false },
      { id: "peak_weeks", section: "The Real Stuff", type: "textarea", label: "During peak weeks (January), how will you prioritize MIST alongside your other responsibilities?", required: false },
      { id: "disagree_leadership", section: "The Real Stuff", type: "textarea", label: "How do you handle situations where you disagree with leadership decisions?", required: false },
      { id: "best_phase", section: "The Real Stuff", type: "textarea", label: "Which phase are you BEST suited for and why?", required: false },
      { id: "top_skills", section: "The Real Stuff", type: "textarea", label: "Rank your top 3 skills from the list below: Organization; Communication; Leadership; Problem-solving; Reliability; Creativity; Attention to detail", required: false },
      { id: "not_tolerated", section: "The Real Stuff", type: "textarea", label: "What behaviors do you think should NOT be tolerated on the MIST board?", required: false },
      { id: "interested_roles", section: "Positions", type: "checkbox", label: "Check off as many as you are interested in!", options: [], required: true },
      { id: "role_preference_order", section: "Positions", type: "textarea", label: "If multiple positions selected, list roles in order of preference below", required: false }
    ];
    const CALENDAR_DEADLINES = buildCalendarDeadlines();

    let APP_STATE = {
      view: "dashboard",
      activePhase: "foundations",
      applicationRoleId: null,
      currentDeadlines: [],
      progress: {},
      saveTimers: {}
    };

    async function updateApplicationStatus(applicationId, status) {
      const user = await getUser();
      const profile = user ? await getProfile(user.id) : null;
      if (!profile?.is_admin) return alert("Only admins can review applications.");

      const reviewNotes = document.getElementById(`review-notes-${applicationId}`)?.value.trim() || "";
      const { data: application, error: fetchError } = await supabaseClient
        .from("role_applications")
        .select("*")
        .eq("id", applicationId)
        .maybeSingle();

      if (fetchError || !application) {
        console.error("Application fetch error:", fetchError);
        return alert("Could not find that application.");
      }

      if (status === "approved") {
        const applicationEmail = String(application.email || "").trim();
        const { data: existingClaim, error: claimError } = await supabaseClient
          .from("profiles")
          .select("id,full_name,email")
          .eq("role_id", application.role_id)
          .maybeSingle();

        if (claimError) {
          console.error("Role claim check error:", claimError);
          return alert("Could not check whether that role is already claimed.");
        }

        if (existingClaim && normalizeEmail(existingClaim.email) !== normalizeEmail(applicationEmail)) {
          return alert(`This role is already claimed by ${existingClaim.full_name || existingClaim.email}.`);
        }

        const { data: applicantProfile, error: applicantError } = await supabaseClient
          .from("profiles")
          .select("*")
          .ilike("email", applicationEmail)
          .maybeSingle();

        if (applicantError) {
          console.error("Applicant profile lookup error:", applicantError);
          return alert("Could not look up the applicant profile.");
        }

        if (!applicantProfile) {
          return alert("Application approved, but this person has not created an account yet. Ask them to sign up with the same email first, then approve again to assign the role.");
        }

        const selectedRole = ROLE_OPTIONS.find(role => role.id === application.role_id);
        const { data: assignedProfile, error: assignError } = await supabaseClient
          .from("profiles")
          .update({
            full_name: applicantProfile.full_name || application.full_name,
            role_id: application.role_id,
            team: selectedRole ? selectedRole.team : null,
            updated_at: new Date().toISOString()
          })
          .eq("id", applicantProfile.id)
          .select("id,email,role_id,team")
          .maybeSingle();

        if (assignError) {
          console.error("Role assignment error:", assignError);
          return alert(assignError.message);
        }

        if (!assignedProfile || assignedProfile.role_id !== application.role_id) {
          return alert("The application was found, but the role was not assigned. Re-run the Supabase admin profile policy, then try Approve again.");
        }
      }

      const { error } = await supabaseClient
        .from("role_applications")
        .update({
          status,
          review_notes: reviewNotes,
          reviewed_by: user.id,
          reviewed_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq("id", applicationId);

      if (error) {
        console.error("Application review error:", error);
        return alert(error.message);
      }

      if (status === "approved") {
        alert("Application approved and role assigned.");
      }

      renderApp();
    }

      }

    function rowsToProgressMap(rows) {
      return rows.reduce((map, row) => {
        map[row.phase] = {
          data: row.data || { checks: [], notes: "" },
          percent_complete: row.percent_complete || 0,
          updated_at: row.updated_at
        };
        return map;
      }, {});
    }

    function getPhaseProgress(phaseId) {
      return APP_STATE.progress[phaseId] || {
        data: { checks: [], notes: "" },
        percent_complete: 0,
        updated_at: null
      };
    }

    function calculatePhasePercent(workbook, phaseId, phaseData) {
      const checklist = getPhaseChecklist(workbook.phases[phaseId]);
      if (!checklist.length) return 0;
      const checks = phaseData.checks || [];
      const completed = checklist.filter((_, index) => checks[index]).length;
      return Math.round((completed / checklist.length) * 100);
    }

    function getPhaseChecklist(phase) {
      return phase?.checklist || phase?.deliverables || [];
    }

    function calculateOverallPercent(workbook, progressMap) {
      const phaseIds = Object.keys(workbook.phases);
      if (!phaseIds.length) return 0;

      const total = phaseIds.reduce((sum, phaseId) => {
        const stored = progressMap[phaseId] || { data: { checks: [] } };
        return sum + calculatePhasePercent(workbook, phaseId, stored.data || {});
      }, 0);

      return Math.round(total / phaseIds.length);
    }

    function setSaveStatus(message) {
      const status = document.getElementById("save-status");
      if (status) status.textContent = message;
    }

    async function saveWorkbookPhase(phaseId) {
      const user = await getUser();
      const profile = await getProfile(user.id);
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const phaseState = getPhaseProgress(phaseId);
      const percent = calculatePhasePercent(workbook, phaseId, phaseState.data);

      setSaveStatus("Saving...");

      const { error } = await supabaseClient
        .from("workbook_progress")
        .upsert({
          user_id: user.id,
          phase: phaseId,
          data: phaseState.data,
          percent_complete: percent,
          updated_at: new Date().toISOString()
        }, { onConflict: "user_id,phase" });

      if (error) {
        console.error("Progress save error:", error);
        setSaveStatus("Could not save. Check Supabase table setup.");
        return;
      }

      APP_STATE.progress[phaseId].percent_complete = percent;
      APP_STATE.progress[phaseId].updated_at = new Date().toISOString();
      updateVisibleProgress(workbook);
      setSaveStatus("Saved");
    }

    function queueSave(phaseId) {
      clearTimeout(APP_STATE.saveTimers[phaseId]);
      setSaveStatus("Saving...");
      APP_STATE.saveTimers[phaseId] = setTimeout(() => saveWorkbookPhase(phaseId), 650);
    }

    function updateChecklist(phaseId, index, checked) {
      const phaseState = getPhaseProgress(phaseId);
      const checks = [...(phaseState.data.checks || [])];
      checks[index] = checked;
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, checks }
      };
      queueSave(phaseId);
    }

    function updateNotes(phaseId, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, notes: value }
      };
      queueSave(phaseId);
    }

    function updateField(phaseId, key, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: {
          ...phaseState.data,
          fields: {
            ...(phaseState.data.fields || {}),
            [key]: value
          }
        }
      };
      queueSave(phaseId);
    }

    function savedField(phaseId, key) {
      return getPhaseProgress(phaseId).data.fields?.[key] || "";
    }

    function updateVisibleProgress(workbook) {
      const overall = calculateOverallPercent(workbook, APP_STATE.progress);
      const overallText = document.getElementById("overall-percent");
      const overallFill = document.getElementById("overall-fill");
      const phaseText = document.getElementById("phase-percent");
      const phaseFill = document.getElementById("phase-fill");
      const phaseState = getPhaseProgress(APP_STATE.activePhase);

      if (overallText) overallText.textContent = `${overall}% complete`;
      if (overallFill) overallFill.style.width = `${overall}%`;
      if (phaseText) phaseText.textContent = `${phaseState.percent_complete || 0}% complete`;
      if (phaseFill) phaseFill.style.width = `${phaseState.percent_complete || 0}%`;
    }

      const selectedRoleId = APP_STATE.applicationRoleId || openRoles[0]?.role_id || "";
      const selectedRole = rows.find(row => row.role_id === selectedRoleId) || openRoles[0];
      const startPhase = selectedRole ? (selectedRole.start_phase || firstPhaseForRole(selectedRole.role_id)) : "foundations";
      const roleEmail = user?.email || "";
      const formQuestions = applicationQuestionsForRows(rows);

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>Apply for a Role</h1>
              <p>Submit interest for an open organizer role. Leadership can review applications from the admin board.</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          <div class="panel">
            <div class="phase-header">
              <div>
                <h2>${selectedRole ? escapeHtml(formatRole(selectedRole.role_id)) : "No open roles"}</h2>
                <p>${selectedRole ? `${escapeHtml(selectedRole.team)} Team - Starts in ${escapeHtml(formatPhase(startPhase))}` : "All roles are currently claimed."}</p>
              </div>
              ${selectedRole ? `<span class="phase-chip" style="--phase-color:${phaseColor(startPhase)}">Open Role</span>` : ""}
            </div>

            ${selectedRole?.task_preview?.length ? `
              <div class="label">Role Preview</div>
              <ul class="task-list">
                ${selectedRole.task_preview.map(task => `<li>${escapeHtml(task)}</li>`).join("")}
              </ul>
            ` : ""}

            ${openRoles.length ? `
              <form class="stack" onsubmit="submitRoleApplication(event)">
                <div>
                  <div class="label">Role</div>
                  <select id="application-role-id" onchange="openApply(this.value)">
                    ${openRoles.map(role => `<option value="${role.role_id}" ${role.role_id === selectedRoleId ? "selected" : ""}>${escapeHtml(formatRole(role.role_id))} - ${escapeHtml(role.team)}</option>`).join("")}
                  </select>
                </div>
                <div class="grid">
                  <div>
                    <div class="label">Contact email</div>
                    <input id="application-contact-email" type="email" value="${escapeHtml(roleEmail)}" placeholder="Your email" />
                  </div>
                  <div>
                    <div class="label">Phone / WhatsApp optional</div>
                    <input id="application-phone" placeholder="Best contact number" />
                  </div>
                </div>

                ${renderApplicationQuestions(formQuestions, selectedRoleId)}

                <button class="primary full" type="submit">Submit Application</button>
              </form>
            ` : `
              <p>There are no open roles right now. Check back if leadership opens more seats.</p>
            `}
          </div>
        </div>
      `;
    }

    function applicationQuestionsForRows(rows = []) {
      const roleOptions = rows.map(row => {
        const phase = row.start_phase || firstPhaseForRole(row.role_id);
        return `[${formatPhase(phase).toUpperCase()}] ${formatRole(row.role_id)}`;
      });

      return APPLICATION_QUESTIONS.map(question => question.id === "interested_roles"
        ? { ...question, options: roleOptions }
        : question);
    }

    function renderApplicationQuestions(questions, selectedRoleId) {
      let currentSection = "";
      return questions.map(question => {
        const sectionHeading = question.section !== currentSection
          ? `<div class="panel phase-panel" style="margin:12px 0 0;padding:18px;--phase-color:${sectionColor(question.section)};"><h2>${escapeHtml(question.section)}</h2>${question.section === "Positions" ? `<p>You will have priority to remain in your current position, then your committee, if a seat is available.</p>` : ""}</div>`
          : "";
        currentSection = question.section;
        return `${sectionHeading}${renderApplicationQuestion(question, selectedRoleId)}`;
      }).join("");
    }

    function renderApplicationQuestion(question, selectedRoleId) {
      const requiredMark = question.required ? " *" : "";
      const name = answerInputName(question.id);
      const selectedRoleLabel = selectedRoleId ? formatRole(selectedRoleId) : "";
      const options = question.id === "interested_roles"
        ? question.options.map(option => ({ value: option, checked: selectedRoleLabel && option.includes(selectedRoleLabel) }))
        : (question.options || []).map(option => ({ value: option, checked: false }));

      if (question.type === "text") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <input data-application-field="${question.id}" name="${name}" placeholder="Your answer" />
          </div>
        `;
      }

      if (question.type === "textarea") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <textarea data-application-field="${question.id}" name="${name}" placeholder="Your answer"></textarea>
          </div>
        `;
      }

      if (question.type === "radio") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <div class="option-list">
              ${options.map((option, index) => `
                <label class="option-row">
                  <input data-application-field="${question.id}" type="radio" name="${name}" value="${escapeHtml(option.value)}" ${index === 0 && question.options?.length === 1 ? "checked" : ""}>
                  <span>${escapeHtml(option.value)}</span>
                </label>
              `).join("")}
            </div>
          </div>
        `;
      }

      if (question.type === "checkbox") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <div class="option-list">
              ${options.map(option => `
                <label class="option-row">
                  <input data-application-field="${question.id}" type="checkbox" name="${name}" value="${escapeHtml(option.value)}" ${option.checked ? "checked" : ""}>
                  <span>${escapeHtml(option.value)}</span>
                </label>
              `).join("")}
            </div>
          </div>
        `;
      }

      return "";
    }

    function collectApplicationResponses() {
      return APPLICATION_QUESTIONS.reduce((responses, question) => {
        const fields = Array.from(document.querySelectorAll(`[data-application-field="${question.id}"]`));
        if (question.type === "checkbox") {
          responses[question.id] = fields.filter(field => field.checked).map(field => field.value);
        } else if (question.type === "radio") {
          responses[question.id] = fields.find(field => field.checked)?.value || "";
        } else {
          responses[question.id] = fields[0]?.value.trim() || "";
        }
        return responses;
      }, {});
    }

    function answerInputName(questionId) {
      return `application-${fieldKey(questionId)}`;
    }

    function sectionColor(section) {
      if (section === "Commitments") return "#f472b6";
      if (section === "About You") return "#22d3ee";
      if (section === "The Real Stuff") return "#facc15";
      if (section === "Positions") return "#34d399";
      return "#38bdf8";
    }

    function calculateTeamStats(rows, progressRows) {
      const progressByUser = groupProgressByUser(progressRows);
      const totalOrganizers = rows.length;
      const activeOrganizers = rows.filter(row => row.claimed).length;
      const teamCount = new Set(rows.map(row => row.team).filter(Boolean)).size;
      const averageProgress = totalOrganizers
        ? Math.round(rows.reduce((sum, row) => {
          const workbook = WORKBOOKS[row.role_id] || WORKBOOKS.default;
          return sum + calculateOverallPercent(workbook, rowsToProgressMap(progressByUser[row.profile_id] || []));
        }, 0) / totalOrganizers)
        : 0;

      return { totalOrganizers, activeOrganizers, teamCount, averageProgress };
    }

    function groupProgressByUser(progressRows) {
      return progressRows.reduce((map, row) => {
        if (!map[row.user_id]) map[row.user_id] = [];
        map[row.user_id].push(row);
        return map;
      }, {});
    }

    function buildRoleDirectoryRows(profiles = []) {
      const profilesByRole = profiles.reduce((map, profile) => {
        if (profile.role_id && !map[profile.role_id]) map[profile.role_id] = profile;
        return map;
      }, {});

      return ROLE_OPTIONS.map(role => {
        const claim = profilesByRole[role.id];
        const workbook = WORKBOOKS[role.id] || WORKBOOKS.default;
        return {
          id: claim?.id || `role-${role.id}`,
          profile_id: claim?.id || null,
          full_name: claim?.full_name || "",
          email: claim?.email || "",
          role_id: role.id,
          team: claim?.team || role.team,
          start_phase: workbook.startPhase || firstPhaseForRole(role.id),
          task_preview: getRoleTaskPreview(role.id),
          updated_at: claim?.updated_at || null,
          claimed: !!claim
        };
      });
    }

    function firstPhaseForRole(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      return Object.keys(workbook.phases || {})[0] || "foundations";
    }

    function getRoleTaskPreview(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      const startPhase = workbook.startPhase || firstPhaseForRole(roleId);
      const phase = workbook.phases?.[startPhase] || Object.values(workbook.phases || {})[0] || {};
      const tasks = phase.responsibilities || phase.deliverables || phase.checklist || [];
      return tasks.slice(0, 3);
    }

    function rolesStartingInPhase(phaseId) {
      return ROLE_OPTIONS.filter(role => {
        const workbook = WORKBOOKS[role.id] || WORKBOOKS.default;
        return (workbook.startPhase || firstPhaseForRole(role.id)) === phaseId;
      });
    }

    function renderDashboard(user, profile, rows = [], progressRows = [], deadlines = CALENDAR_DEADLINES) {
      const signedIn = !!user;
      const hasProfile = !!profile?.role_id;
      const workbook = hasProfile ? (WORKBOOKS[profile.role_id] || WORKBOOKS.default) : WORKBOOKS.default;
      const overallPercent = hasProfile ? calculateOverallPercent(workbook, APP_STATE.progress) : 0;
      const teamStats = calculateTeamStats(rows, progressRows);

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>MIST Dallas Portal</h1>
              <p>${signedIn ? `Welcome back, ${profile?.full_name || user.email}` : "Browse the full organizer board. Sign in to claim your role and save workbook progress."}</p>
            </div>
            ${signedIn ? `<button class="ghost" onclick="logout()">Log Out</button>` : `<button class="ghost" onclick="openLogin()">Log In / Sign Up</button>`}
          </div>

          <div class="panel">
            <h2>Organizer Dashboard</h2>
            <p>${signedIn ? "Your portal is connected. You can open your role workbook or view the shared organizer board." : "All roles are visible here, even before organizers claim them. Claimed seats fill in automatically after signup."}</p>

            <div class="grid">
              <div class="stat">
                <div class="stat-title">${signedIn ? "Email" : "Portal Access"}</div>
                <div class="stat-value">${signedIn ? user.email : "Public View"}</div>
              </div>
              <div class="stat">
                <div class="stat-title">Role</div>
                <div class="stat-value">${hasProfile ? formatRole(profile.role_id) : "Not claimed"}</div>
              </div>
              <div class="stat">
                <div class="stat-title">Team</div>
                <div class="stat-value">${profile?.team || "Not set"}</div>
              </div>
              <div class="stat">
                <div class="stat-title">${signedIn ? "My Progress" : "Open Roles"}</div>
                <div class="stat-value">${signedIn ? `${overallPercent}% complete` : rows.filter(row => !row.claimed).length}</div>
                <div class="progress-track"><div class="progress-fill" style="width:${overallPercent}%"></div></div>
              </div>
              <div class="stat">
                <div class="stat-title">Claimed Roles</div>
                <div class="stat-value">${teamStats.activeOrganizers} / ${teamStats.totalOrganizers}</div>
              </div>
              <div class="stat">
                <div class="stat-title">Average Progress</div>
                <div class="stat-value">${teamStats.averageProgress}%</div>
                <div class="progress-track"><div class="progress-fill" style="width:${teamStats.averageProgress}%"></div></div>
              </div>
            </div>

            <div class="nav-grid">
              ${signedIn && hasProfile ? `<button class="nav-card" onclick="openWorkbook()">
                <strong>My Workbook</strong>
                <span>Open your role-specific planning checklist, notes, and autosave progress.</span>
              </button>` : `<button class="nav-card" onclick="openLogin()">
                <strong>Claim a Role</strong>
                <span>Log in or create an account, then choose an open organizer role.</span>
              </button>`}
              <button class="nav-card" onclick="openProgressBoard()">
                <strong>Progress Board</strong>
                <span>See each organizer's completion percentage and most recent saved activity.</span>
              </button>
              <button class="nav-card" onclick="openDirectory()">
                <strong>Directory</strong>
                <span>View the full organizer directory with names, roles, teams, and emails.</span>
              </button>
              <button class="nav-card" onclick="openTimeline()">
                <strong>Timeline</strong>
                <span>Track the season phases, deadlines, and major planning milestones.</span>
              </button>
              <button class="nav-card" onclick="openCalendar()">
                <strong>Calendar</strong>
                <span>See deadline cards by phase. Email reminders can plug into these dates later.</span>
              </button>
              ${profile?.is_admin ? `<button class="nav-card" onclick="openApplications()">
                <strong>Applications</strong>
                <span>Review open-role applications and mark them pending, approved, or declined.</span>
              </button>` : ""}
            </div>
          </div>

          ${renderUpcomingDeadlines(deadlines)}

          <div class="panel">
            <div class="phase-header">
              <div>
                <h2>Organizer Role Board</h2>
                <p>Every planned role is listed by team, with its starting phase and core responsibilities. Names and emails appear after a role is claimed.</p>
              </div>
              <button class="ghost" onclick="openDirectory()">View Directory</button>
            </div>

            ${renderTeamRoleBoard(rows)}
          </div>

          <div class="panel">
            <div class="phase-header">
              <div>
                <h2>Timeline Preview</h2>
                <p>The full timeline keeps everyone aligned on the same season rhythm.</p>
              </div>
              <button class="ghost" onclick="openTimeline()">View Timeline</button>
            </div>
            <div class="timeline">
              ${TIMELINE.map(item => renderTimelineItem(item)).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderUpcomingDeadlines(deadlines = []) {
      const upcoming = upcomingDeadlines(deadlines, 5);
      return `
        <div class="panel">
          <div class="phase-header">
            <div>
              <h2>Upcoming Deadlines</h2>
              <p>The next planning dates that need attention across the portal.</p>
            </div>
            <button class="ghost" onclick="openCalendar()">Open Calendar</button>
          </div>
          <div class="calendar-grid">
            ${upcoming.length ? upcoming.map(item => renderDeadlineCard(item)).join("") : `<p>No upcoming deadlines are currently listed.</p>`}
          </div>
        </div>
      `;
    }

    function renderWorkbook(profile) {
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const visiblePhases = Object.keys(workbook.phases);
      if (!workbook.phases[APP_STATE.activePhase]) {
        APP_STATE.activePhase = visiblePhases[0];
      }
      const phase = workbook.phases[APP_STATE.activePhase];
      const phaseMeta = PHASES[APP_STATE.activePhase] || { label: APP_STATE.activePhase, title: APP_STATE.activePhase, dates: "" };
      const phaseState = getPhaseProgress(APP_STATE.activePhase);
      const checks = phaseState.data.checks || [];
      const notes = phaseState.data.notes || "";
      const checklist = getPhaseChecklist(phase);
      const overallPercent = calculateOverallPercent(workbook, APP_STATE.progress);
      const phasePercent = calculatePhasePercent(workbook, APP_STATE.activePhase, phaseState.data);
      const activePhaseStyle = `--phase-color:${phaseColor(APP_STATE.activePhase)};--phase-gradient:${phaseGradient(APP_STATE.activePhase)}`;

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>${workbook.title}</h1>
              <p>${workbook.team} Team - ${profile.full_name || ""}</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          <div class="panel">
            <div class="phase-header">
              <div>
                <h2>Workbook</h2>
                <p>${workbook.description}</p>
              </div>
              <div class="phase-chip" style="${activePhaseStyle}">Role: ${formatRole(profile.role_id)}</div>
            </div>

            <div class="grid">
              <div class="stat">
                <div class="stat-title">Overall Progress</div>
                <div id="overall-percent" class="stat-value">${overallPercent}% complete</div>
                <div class="progress-track"><div id="overall-fill" class="progress-fill" style="width:${overallPercent}%"></div></div>
              </div>
              <div class="stat">
                <div class="stat-title">Current Phase</div>
                <div id="phase-percent" class="stat-value">${phasePercent}% complete</div>
                <div class="progress-track"><div id="phase-fill" class="progress-fill" style="width:${phasePercent}%"></div></div>
              </div>
            </div>

            <div class="tabs">
              ${visiblePhases.map(phaseId => `
                <button class="tab-btn ${APP_STATE.activePhase === phaseId ? "active" : ""}" style="--phase-color:${phaseColor(phaseId)};--phase-gradient:${phaseGradient(phaseId)}" onclick="setPhase('${phaseId}')">
                  ${(PHASES[phaseId] || { label: phaseId }).label}
                </button>
              `).join("")}
            </div>

            <div class="panel phase-panel" style="margin-bottom:0; padding:20px; ${activePhaseStyle}">
              <div class="phase-header">
                <div>
                  <h3>${phaseMeta.title}</h3>
                  <p>${phase.focus}</p>
                </div>
                <div class="phase-chip">${phaseMeta.dates}</div>
              </div>

              ${phase.responsibilities?.length ? `
                <div class="label">Key Responsibilities</div>
                <div class="stack" style="margin-top:0;margin-bottom:18px;">
                  ${phase.responsibilities.map(item => `
                    <div class="check-row">
                      <span>${escapeHtml(item)}</span>
                    </div>
                  `).join("")}
                </div>
              ` : ""}

              <div class="label">Deliverables Checklist</div>
              ${checklist.map((item, index) => `
                <label class="check-row">
                  <input type="checkbox" ${checks[index] ? "checked" : ""} onchange="updateChecklist('${APP_STATE.activePhase}', ${index}, this.checked)" />
                  <span>${escapeHtml(item)}</span>
                </label>
              `).join("")}

              ${renderPhaseFrameworks(phase)}
              ${renderWeeklyPlan(phase)}
              ${renderReflectionPrompts(phase)}
              ${renderRiskList(phase)}

              <div style="margin-top:18px;">
                <div class="label">Notes</div>
                <textarea placeholder="Write your phase notes here..." oninput="updateNotes('${APP_STATE.activePhase}', this.value)">${escapeHtml(notes)}</textarea>
              </div>
              <div id="save-status" class="save-status">Autosave is ready.</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPhaseFrameworks(phase) {
      if (!phase.frameworks?.length) return "";

      return phase.frameworks.map((framework, frameworkIndex) => {
        if (framework.type === "table") {
          return `
            <div style="margin-top:22px;">
              <div class="label">${escapeHtml(framework.title)}</div>
              <table class="list-table">
                <thead>
                  <tr>${framework.columns.map(column => `<th>${escapeHtml(column)}</th>`).join("")}</tr>
                </thead>
                <tbody>
                  ${Array.from({ length: framework.rows || 4 }, (_, rowIndex) => `
                    <tr>
                      ${framework.columns.map((_, columnIndex) => {
                        const key = fieldKey("framework", frameworkIndex, rowIndex, columnIndex);
                        return `<td><textarea style="min-height:56px;" oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea></td>`;
                      }).join("")}
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          `;
        }

        if (framework.type === "grid2") {
          const sides = [framework.left, framework.right].filter(Boolean);
          return `
            <div style="margin-top:22px;">
              <div class="label">${escapeHtml(framework.title)}</div>
              <div class="grid">
                ${sides.map((side, sideIndex) => `
                  <div class="stat">
                    <h3>${escapeHtml(side.label)}</h3>
                    <div class="stack">
                      ${(side.prompts || []).map((prompt, promptIndex) => {
                        const key = fieldKey("framework", frameworkIndex, sideIndex, promptIndex);
                        return `
                          <div>
                            <p>${escapeHtml(prompt)}</p>
                            <textarea style="min-height:74px;" oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea>
                          </div>
                        `;
                      }).join("")}
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>
          `;
        }

        return "";
      }).join("");
    }

    function renderWeeklyPlan(phase) {
      if (!phase.weeklyPlan?.length) return "";

      return `
        <div style="margin-top:22px;">
          <div class="label">Weekly Planning Grid</div>
          <div class="stack" style="margin-top:0;">
            ${phase.weeklyPlan.map((week, index) => {
              const key = fieldKey("weekly", index);
              return `
                <div class="stat">
                  <h3>${escapeHtml(week.week)}</h3>
                  <p>${escapeHtml(week.tasks)}</p>
                  <textarea style="margin-top:12px;min-height:74px;" placeholder="Your specific actions..." oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderReflectionPrompts(phase) {
      if (!phase.reflections?.length) return "";

      return `
        <div style="margin-top:22px;">
          <div class="label">Reflection Prompts</div>
          <div class="stack" style="margin-top:0;">
            ${phase.reflections.map((prompt, index) => {
              const key = fieldKey("reflection", index);
              return `
                <div>
                  <p>${escapeHtml(prompt)}</p>
                  <textarea style="margin-top:8px;min-height:86px;" placeholder="Your thoughts..." oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderRiskList(phase) {
      if (!phase.risks?.length) return "";

      return `
        <div style="margin-top:22px;">
          <div class="label">Risk Awareness</div>
          <div class="stack" style="margin-top:0;">
            ${phase.risks.map(risk => `<div class="check-row"><span>${escapeHtml(risk)}</span></div>`).join("")}
          </div>
        </div>
      `;
    }

    function renderProgressBoard(rows, progressRows) {
      const progressByUser = groupProgressByUser(progressRows);

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>Organizer Progress Board</h1>
              <p>Shared visibility across all organizers.</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          <div class="panel">
            <h2>Team Progress Snapshot</h2>
            <p>Everyone can see the shared progress view. Unclaimed roles stay visible with blank personal info.</p>

            <table class="list-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Team</th>
                  <th>Overall</th>
                  <th>Last Saved</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(row => renderProgressRow(row, progressByUser[row.profile_id] || [])).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderDirectory(rows, progressRows) {
      const progressByUser = groupProgressByUser(progressRows);
      const grouped = rows.reduce((map, row) => {
        const team = row.team || "Unassigned";
        if (!map[team]) map[team] = [];
        map[team].push(row);
        return map;
      }, {});

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>Organizer Directory</h1>
              <p>Everyone can see the team structure, roles, and contact list.</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          ${Object.keys(grouped).sort().map(team => `
            <div class="panel" style="--team-color:${teamColor(team)}">
              <div class="phase-header">
                <div>
                <h2>${escapeHtml(team)}</h2>
                  <p>${grouped[team].length} planned role${grouped[team].length === 1 ? "" : "s"}</p>
                </div>

    function downloadDeadlineIcs(deadlineId) {
      const deadline = findCurrentDeadline(deadlineId);

      downloadIcsFile([deadline], `${slugify(deadline.title || deadline.id)}.ics`);
    }

    function openGoogleCalendarForDeadline(deadlineId) {
      const deadline = findCurrentDeadline(deadlineId);
      if (!deadline) return alert("Could not find that deadline.");
      window.open(googleCalendarUrl(deadline), "_blank", "noopener,noreferrer");
    }

    function openGoogleCalendarForAllDeadlines() {
      const deadlines = APP_STATE.currentDeadlines || [];
      if (!deadlines.length) return alert("No deadlines are available to open.");
      alert("Google Calendar opens one event link at a time. Your browser may ask before opening multiple tabs.");
      deadlines.forEach((deadline, index) => {
        window.setTimeout(() => window.open(googleCalendarUrl(deadline), "_blank", "noopener,noreferrer"), index * 350);
      });
    }

    function downloadIcsFile(deadlines, filename) {
      const content = buildIcsCalendar(deadlines);
      const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function buildIcsCalendar(deadlines) {
      const now = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z");
      const events = deadlines.map(deadline => {
        const start = compactDate(deadline.due_date);
        const end = compactDate(addDaysIso(deadline.due_date, 1));
        const uid = `${deadline.id || slugify(deadline.title)}@mist-dallas-portal`;
        return [
          "BEGIN:VEVENT",
          `UID:${escapeIcs(uid)}`,
          `DTSTAMP:${now}`,
          `DTSTART;VALUE=DATE:${start}`,
          `DTEND;VALUE=DATE:${end}`,
          `SUMMARY:${escapeIcs(`MIST Dallas: ${deadline.title}`)}`,
          `DESCRIPTION:${escapeIcs(`${deadline.detail || ""}\\n\\nPhase: ${formatPhase(deadline.phase)}\\nPortal: ${window.location.href.split("?")[0]}`)}`,
          "END:VEVENT"
        ].join("\r\n");
      }).join("\r\n");

      return [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//MIST Dallas//Organizer Portal//EN",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        events,
        "END:VCALENDAR"
      ].join("\r\n");
    }

    function googleCalendarUrl(deadline) {
      const start = compactDate(deadline.due_date);
      const end = compactDate(addDaysIso(deadline.due_date, 1));
      const params = new URLSearchParams({
        action: "TEMPLATE",
        text: `MIST Dallas: ${deadline.title}`,
        dates: `${start}/${end}`,
        details: `${deadline.detail || ""}\n\nPhase: ${formatPhase(deadline.phase)}\nPortal: ${window.location.href.split("?")[0]}`
      });
      return `https://calendar.google.com/calendar/render?${params.toString()}`;
    }

    function findCurrentDeadline(deadlineId) {
      return (APP_STATE.currentDeadlines || []).find(deadline => String(deadline.id) === String(deadlineId));
    }

    function compactDate(value) {
      if (!value) return "";
      return String(value).replace(/-/g, "");
    }

    function addDaysIso(value, days) {
      const date = new Date(`${value}T12:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function escapeIcs(value) {
      return String(value || "")
        .replace(/\\/g, "\\\\")
        .replace(/\r?\n/g, "\\n")
        .replace(/,/g, "\\,")
        .replace(/;/g, "\\;");
    }

    function slugify(value) {
      return String(value || "mist-dallas-deadline")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "")
        .slice(0, 80) || "mist-dallas-deadline";
    }

    function phaseIdFromTimelineItem(item) {
      const text = `${item.phase || ""} ${item.title || ""}`.toLowerCase();
      return Object.keys(PHASES).find(phaseId => {
        const phase = PHASES[phaseId];
        return text.includes(phaseId) || text.includes(String(phase.label || "").toLowerCase());
      }) || null;
    }

    function upcomingDeadlines(deadlines, limit = 5) {
      return [...(deadlines || [])]
        .filter(item => deadlineDate(item))
        .sort((a, b) => deadlineDate(a) - deadlineDate(b))
        .filter(item => !deadlineTiming(item).isOverdue)
        .slice(0, limit);
    }

    function deadlineDate(item) {
      if (!item?.due_date) return null;
      const date = new Date(`${item.due_date}T12:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function deadlineTiming(item) {
      const due = deadlineDate(item);
      if (!due) return { label: "No date", isOverdue: false, daysAway: null };

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      due.setHours(0, 0, 0, 0);
      const daysAway = Math.round((due - today) / 86400000);

      if (daysAway < 0) return { label: `${Math.abs(daysAway)} day${Math.abs(daysAway) === 1 ? "" : "s"} overdue`, isOverdue: true, daysAway };
      if (daysAway === 0) return { label: "Due today", isOverdue: false, daysAway };
      if (daysAway === 1) return { label: "Due tomorrow", isOverdue: false, daysAway };
      return { label: `${daysAway} days away`, isOverdue: false, daysAway };
    }

    function deadlinePriority(item) {
      if (item?.priority) return item.priority;
      const text = `${item.title || ""} ${item.detail || ""}`.toLowerCase();
      if (text.includes("final") || text.includes("lock") || text.includes("event week")) return "critical";
      if (text.includes("complete") || text.includes("claimed") || text.includes("confirmed")) return "high";
      if (text.includes("review") || text.includes("check-in") || text.includes("onboarded")) return "medium";
      return "low";
    }

    function deadlineType(item) {
      if (item?.deadline_type) return item.deadline_type;
      const text = `${item.title || ""} ${item.detail || ""}`.toLowerCase();
      if (text.includes("onboard")) return "Onboarding";
      if (text.includes("review") || text.includes("check-in")) return "Review";
      if (text.includes("training")) return "Training";
      if (text.includes("schedule") || text.includes("run-of-show")) return "Planning";
      if (text.includes("event")) return "Event Week";
      return "Deadline";
    }

    function renderProgressRow(profile, progressRows) {

      const progressMap = rowsToProgressMap(progressRows);
      const overallPercent = calculateOverallPercent(workbook, progressMap);
      const latestSaved = progressRows
        .map(row => row.updated_at)

        .sort()
        .pop();

      return `

    function formatRole(roleId) {
      const role = ROLE_OPTIONS.find(r => r.id === roleId);
      return role ? role.title : (roleId || "Not set");
    }

    function formatPhase(phaseId) {
      return PHASES[phaseId]?.label || phaseId || "Not set";
    }

    function phaseColor(phaseId) {
      return PHASE_COLORS[phaseId] || "#38bdf8";
    }

    function phaseGradient(phaseId) {
      return PHASE_GRADIENTS[phaseId] || "linear-gradient(135deg, #0284c7, #22d3ee)";
    }

    function teamColor(team) {
      return TEAM_COLORS[team] || "#38bdf8";
    }

    function formatDate(value) {
      return new Date(value).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDeadlineDate(value) {
      if (!value) return "";
      const date = new Date(`${value}T12:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function fieldKey(...parts) {
      return parts.join("-").replace(/[^a-zA-Z0-9_-]/g, "-");
    }

    async function renderApp() {
      const app = document.getElementById("app");
      const user = await getUser();
      const profiles = await getAllProfiles();
      const rows = buildRoleDirectoryRows(profiles);

      if (!user && APP_STATE.view === "login") {
        app.innerHTML = renderLogin();
        return;
      }

      if (!user && !PUBLIC_VIEWS.has(APP_STATE.view)) {
        APP_STATE.view = "dashboard";
      }

      if (!user) {
        if (APP_STATE.view === "apply") {
          app.innerHTML = renderRoleApplication(null, rows);
          return;
        }

        if (APP_STATE.view === "progress") {
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderProgressBoard(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "directory") {
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderDirectory(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "timeline") {
          app.innerHTML = renderTimeline();
          return;
        }

        if (APP_STATE.view === "calendar") {
          const deadlines = await getDeadlines();
          app.innerHTML = renderCalendar(deadlines, null, null, null);
          return;
        }

        const progressRows = await getAllWorkbookProgress();
        const deadlines = await getDeadlines();
        app.innerHTML = renderDashboard(null, null, rows, progressRows, deadlines);
        return;
      }

      const profile = await getProfile(user.id);
      if (APP_STATE.view === "apply") {
        app.innerHTML = renderRoleApplication(user, rows);
        return;
      }

      if (!profile || !profile.role_id) {
        app.innerHTML = renderRoleSetup(user, rows);
        return;
      }

      APP_STATE.progress = await getWorkbookProgress(user.id);

      if (APP_STATE.view === "workbook") {
        app.innerHTML = renderWorkbook(profile);
        return;
      }

      if (APP_STATE.view === "progress") {
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderProgressBoard(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "directory") {
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderDirectory(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "timeline") {
        app.innerHTML = renderTimeline();
        return;
      }

      if (APP_STATE.view === "calendar") {
        const deadlines = await getDeadlines();
        const reminderPreference = await getReminderPreference(user.id);
        app.innerHTML = renderCalendar(deadlines, user, profile, reminderPreference);
        return;
      }

      if (APP_STATE.view === "applications") {
        if (!profile?.is_admin) {
          APP_STATE.view = "dashboard";
          app.innerHTML = renderDashboard(user, profile, rows, await getAllWorkbookProgress(), await getDeadlines());
          return;
        }

        const applications = await getRoleApplications();
        app.innerHTML = renderApplicationsAdmin(applications, rows);
        return;
      }

      const progressRows = await getAllWorkbookProgress();
      const deadlines = await getDeadlines();
      app.innerHTML = renderDashboard(user, profile, rows, progressRows, deadlines);
    }

    renderApp();
  </script>
</body>
</html>
