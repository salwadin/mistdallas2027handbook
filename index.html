<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIST Dallas Portal</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #151a22;
      --card: rgba(31, 35, 45, 0.9);
      --border: rgba(223, 228, 238, 0.18);
      --text: #f7f8fb;
      --muted: #bec7d4;
      --input: rgba(42, 47, 58, 0.94);
      --purple: #7b61ff;
      --pink: #c44f7a;
      --blue: #1f8a9b;
      --blue2: #2457a6;
      --green: #247a52;
      --gold: #c9972b;
      --red: #b13f4a;
      --ink: #18191f;
      --paper: #f4efe7;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 180px),
        radial-gradient(circle at top left, rgba(31, 138, 155, 0.24), transparent 34%),
        radial-gradient(circle at top right, rgba(123, 97, 255, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(201, 151, 43, 0.16), transparent 34%),
        var(--bg);
    }

    #app {
      min-height: 100vh;
      width: 100%;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(14px);
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 22px;
    }

    .dashboard-shell {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .panel {
      padding: 16px;
      margin-bottom: 12px;
    }

    h1, h2, h3 { margin: 0; }
    h1 {
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 18px;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    h3 { font-size: 15px; line-height: 1.25; }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 13px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.55;
    }

    input::placeholder, textarea::placeholder { color: #94a3b8; }
    input:disabled { opacity: 0.8; cursor: not-allowed; }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      font-family: inherit;
    }

    button:hover { transform: translateY(-1px); opacity: 0.96; }
    .full { width: 100%; }
    .primary { background: linear-gradient(90deg, #1f8a9b, #247a52); }
    .secondary { background: linear-gradient(90deg, #8a6f2a, #c9972b); color: #111318; }
    .ghost {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      width: auto;
      min-width: 130px;
    }

    .subtext { margin-top: 8px; font-size: 13px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .utility-panel {
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .utility-bar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .utility-search {
      display: grid;
      gap: 8px;
    }

    .utility-search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .utility-search-row input {
      padding: 9px 11px;
    }

    .utility-results {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .utility-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .utility-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .section-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px;
    }

    .stat-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .actions button { min-width: 170px; }

    .note {
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 18px 0 24px;
    }

    .tab-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid color-mix(in srgb, var(--phase-color, #94a3b8) 35%, var(--border));
      color: var(--text);
      min-width: 130px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .tab-btn.active {
      background: var(--phase-gradient, linear-gradient(90deg, rgba(124,58,237,.9), rgba(217,70,239,.9)));
      border-color: transparent;
      box-shadow:
        0 12px 26px color-mix(in srgb, var(--phase-color, #38bdf8) 25%, transparent),
        inset 0 0 0 1px rgba(255,255,255,.16);
    }

    .check-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      margin-bottom: 10px;
      cursor: pointer;
    }

    .check-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--phase-color, var(--purple));
      flex-shrink: 0;
      padding: 0;
      border-radius: 4px;
      appearance: auto;
      -webkit-appearance: checkbox;
      cursor: pointer;
    }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .phase-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--phase-color, #38bdf8) 16%, rgba(255,255,255,.055));
      border: 1px solid color-mix(in srgb, var(--phase-color, #38bdf8) 38%, var(--border));
      font-size: 12px;
      color: color-mix(in srgb, var(--phase-color, #38bdf8) 78%, #ffffff);
      font-weight: 700;
    }

    .phase-panel {
      position: relative;
      overflow: hidden;
      border-color: color-mix(in srgb, var(--phase-color, #38bdf8) 44%, var(--border));
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--phase-color, #38bdf8) 13%, transparent), rgba(255,255,255,.025)),
        var(--card);
    }

    .phase-panel::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--phase-gradient, var(--phase-color, #38bdf8));
    }

    .phase-panel > * {
      position: relative;
    }

    .muted { color: var(--muted); }

    .list-table {
      width: 100%;
      border-collapse: collapse;
    }

    .list-table th, .list-table td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .list-table-wrap {
      width: 100%;
      overflow-x: auto;
      margin-top: 10px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
    }

    .save-status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .phase-progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .phase-mini {
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--phase-color, #38bdf8) 35%, var(--border));
      border-radius: 14px;
      background: color-mix(in srgb, var(--phase-color, #38bdf8) 10%, rgba(255,255,255,.03));
    }

    .phase-mini strong {
      display: block;
      margin-bottom: 4px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .nav-section {
      margin-top: 16px;
    }

    .nav-section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .nav-section-head strong {
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--section-color, var(--blue)) 72%, #ffffff);
    }

    .nav-section-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .nav-card {
      min-height: 92px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      text-align: left;
      border-top: 3px solid var(--section-color, var(--blue));
    }

    .nav-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .nav-card span {
      display: block;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.35;
      font-size: 12px;
    }

    .roadmap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .roadmap-card {
      border: 1px solid color-mix(in srgb, var(--roadmap-color, var(--blue)) 38%, var(--border));
      border-left: 5px solid var(--roadmap-color, var(--blue));
      border-radius: 12px;
      padding: 13px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--roadmap-color, var(--blue)) 12%, transparent), rgba(255,255,255,.026));
    }

    .roadmap-status {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 8px;
      padding: 5px 9px;
      border-radius: 999px;
      color: #111318;
      background: var(--roadmap-color, var(--blue));
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .knowledge-search {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    .knowledge-result {
      border: 1px solid color-mix(in srgb, var(--knowledge-color, var(--blue)) 34%, var(--border));
      border-left: 5px solid var(--knowledge-color, var(--blue));
      border-radius: 12px;
      padding: 13px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--knowledge-color, var(--blue)) 11%, transparent), rgba(255,255,255,.026));
    }

    .runbook-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .runbook-card {
      border: 1px solid var(--border);
      border-top: 4px solid var(--runbook-color, var(--blue));
      border-radius: 12px;
      padding: 13px;
      background: color-mix(in srgb, var(--runbook-color, var(--blue)) 8%, rgba(255,255,255,.026));
    }

    .log-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .log-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px;
      background: rgba(255,255,255,.028);
    }

    .feedback-card {
      border: 1px solid color-mix(in srgb, var(--feedback-color, var(--blue)) 36%, var(--border));
      border-left: 5px solid var(--feedback-color, var(--blue));
      border-radius: 12px;
      padding: 13px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--feedback-color, var(--blue)) 10%, transparent), rgba(255,255,255,.026));
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .directory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .person-card {
      min-height: 120px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.035);
      border-top: 3px solid var(--team-color, var(--blue));
    }

    .person-card.unclaimed {
      border-style: dashed;
      background: rgba(255,255,255,.02);
    }

    .person-card h3 {
      margin-bottom: 8px;
      word-break: break-word;
    }

    .role-meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 9px 0;
    }

    .task-list {
      margin: 9px 0 0;
      padding-left: 16px;
      color: var(--muted);
      line-height: 1.45;
    }

    .task-list li {
      margin-bottom: 6px;
    }

    .team-board {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .team-board-section {
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 13px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--team-color, var(--blue)) 10%, transparent), rgba(255,255,255,.018));
      border-top: 3px solid var(--team-color, var(--blue));
    }

    .team-board-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .timeline {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--phase-color, var(--blue)) 12%, transparent), rgba(255,255,255,.028));
      border-left: 6px solid var(--phase-color, var(--blue));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--phase-color, var(--blue)) 10%, transparent);
    }

    .timeline-date {
      color: color-mix(in srgb, var(--phase-color, #bfdbfe) 78%, #ffffff);
      font-weight: 800;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .onboarding-roles {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .deadline-card {
      border: 1px solid color-mix(in srgb, var(--phase-color, var(--blue)) 36%, var(--border));
      border-top: 6px solid var(--phase-color, var(--blue));
      border-radius: 12px;
      padding: 13px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--phase-color, var(--blue)) 13%, transparent), rgba(255,255,255,.03));
    }

    .deadline-date {
      color: color-mix(in srgb, var(--phase-color, #e0f2fe) 76%, #ffffff);
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .deadline-card.overdue {
      border-color: color-mix(in srgb, var(--red) 55%, var(--border));
      border-top-color: var(--red);
    }

    .deadline-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .console-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 10px;
      margin-top: 12px;
    }

    .console-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .console-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.028);
    }

    .console-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 13px;
      background: linear-gradient(135deg, var(--blue), var(--green));
    }

    .console-kicker {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
    }

    .console-title {
      margin-top: 2px;
      font-weight: 800;
      font-size: 13px;
    }

    .readiness-list {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .readiness-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.028);
    }

    .readiness-row.warning {
      border-color: color-mix(in srgb, var(--gold) 55%, var(--border));
      background: color-mix(in srgb, var(--gold) 9%, rgba(255,255,255,.025));
    }

    .readiness-row.urgent {
      border-color: color-mix(in srgb, var(--red) 55%, var(--border));
      background: color-mix(in srgb, var(--red) 9%, rgba(255,255,255,.025));
    }

    .priority-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      text-transform: capitalize;
    }

    .priority-pill.high,
    .priority-pill.critical {
      border-color: color-mix(in srgb, var(--red) 55%, var(--border));
      color: #fecdd3;
    }

    .priority-pill.medium {
      border-color: color-mix(in srgb, var(--gold) 55%, var(--border));
      color: #fde68a;
    }

    .priority-pill.low {
      border-color: color-mix(in srgb, var(--green) 45%, var(--border));
      color: #bbf7d0;
    }

    .admin-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .admin-form textarea {
      min-height: 78px;
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .inline-actions button {
      width: auto;
      min-width: 120px;
    }

    .danger {
      background: linear-gradient(90deg, #e11d48, #f97316);
    }

    .success {
      background: linear-gradient(90deg, #059669, #34d399);
    }

    .ops-flow {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .ops-step {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--ops-color, var(--blue)) 14%, transparent), rgba(255,255,255,.025));
      border-top: 4px solid var(--ops-color, var(--blue));
    }

    .ops-step-number {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--ops-color, var(--blue));
      color: #111318;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 12px;

      border-color: color-mix(in srgb, var(--gold) 45%, var(--border));
      color: #fde68a;
    }

      border-color: color-mix(in srgb, var(--green) 45%, var(--border));
      color: #bbf7d0;
    }

    .status-pill.declined {
      border-color: color-mix(in srgb, var(--red) 45%, var(--border));
      color: #fecdd3;
    }

    .application-question {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
    }

    .option-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .option-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.025);
      cursor: pointer;
    }

      width: 18px;
      height: 18px;
      padding: 0;
      margin-top: 1px;
      accent-color: var(--purple);
      appearance: auto;
      -webkit-appearance: auto;
      flex-shrink: 0;
    }

    .answer-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 16px;
      background: rgba(255,255,255,.024);
      margin-top: 12px;
    }

      background: rgba(6, 8, 12, 0.72);

      align-items: center;
      justify-content: center;

    async function updateApplicationStatus(applicationId, status) {
      const user = await getUser();
      const profile = user ? await getProfile(user.id) : null;
      if (!profile?.is_admin) return alert("Only admins can review applications.");

      const reviewNotes = document.getElementById(`review-notes-${applicationId}`)?.value.trim() || "";
      const { data: application, error: fetchError } = await supabaseClient
        .from("role_applications")
        .select("*")
        .eq("id", applicationId)
        .maybeSingle();

      if (fetchError || !application) {
        console.error("Application fetch error:", fetchError);
        return alert("Could not find that application.");
      }

      if (status === "approved") {
        const applicationEmail = String(application.email || "").trim();
        const { data: existingClaim, error: claimError } = await supabaseClient
          .from("profiles")
          .select("id,full_name,email")
          .eq("role_id", application.role_id)
          .maybeSingle();

        if (claimError) {
          console.error("Role claim check error:", claimError);
          return alert("Could not check whether that role is already claimed.");
        }

        if (existingClaim && normalizeEmail(existingClaim.email) !== normalizeEmail(applicationEmail)) {
          return alert(`This role is already claimed by ${existingClaim.full_name || existingClaim.email}.`);
        }

        const { data: applicantProfile, error: applicantError } = await supabaseClient
          .from("profiles")
          .select("*")
          .ilike("email", applicationEmail)
          .maybeSingle();

        if (applicantError) {
          console.error("Applicant profile lookup error:", applicantError);
          return alert("Could not look up the applicant profile.");
        }

        if (!applicantProfile) {
          return alert("Application approved, but this person has not created an account yet. Ask them to sign up with the same email first, then approve again to assign the role.");
        }

        const selectedRole = ROLE_OPTIONS.find(role => role.id === application.role_id);
        const { data: assignedProfile, error: assignError } = await supabaseClient
          .from("profiles")
          .update({
            full_name: applicantProfile.full_name || application.full_name,
            role_id: application.role_id,
            team: selectedRole ? selectedRole.team : null,
            updated_at: new Date().toISOString()
          })
          .eq("id", applicantProfile.id)
          .select("id,email,role_id,team")
          .maybeSingle();

        if (assignError) {
          console.error("Role assignment error:", assignError);
          return alert(assignError.message);
        }

        if (!assignedProfile || assignedProfile.role_id !== application.role_id) {
          return alert("The application was found, but the role was not assigned. Re-run the Supabase admin profile policy, then try Approve again.");
        }
      }

      const { error } = await supabaseClient
        .from("role_applications")
        .update({
          status,
          review_notes: reviewNotes,
          reviewed_by: user.id,
          reviewed_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq("id", applicationId);

      if (error) {
        console.error("Application review error:", error);
        return alert(error.message);
      }

      if (status === "approved") {
        alert("Application approved and role assigned.");
      }

      renderApp();
    }

    async function functionErrorDetail(error) {
      const response = error?.context;
      if (!response) return error?.message || "";

      try {
        const json = await response.clone().json();
        return json.error || JSON.stringify(json);
      } catch (_) {
        try {
          return await response.clone().text();
        } catch (textError) {
          return error?.message || "";
        }
      }
    }

    async function importStudentsCsv(event) {
      event.preventDefault();
      const profile = await getProfile((await getUser()).id);
      if (!profile?.is_admin) return alert("Only admins can import student registrations.");

      const file = document.getElementById("tm-student-csv-file")?.files?.[0];
      const pasted = document.getElementById("tm-student-csv")?.value.trim();
      const text = file ? await file.text() : pasted;
      if (!text) return alert("Choose a CSV file or paste CSV rows first.");

      const rows = parseCsv(text);
      if (rows.length < 2) return alert("CSV needs a header row and at least one student row.");

      const headers = rows[0].map(header => header.trim().toLowerCase());
      const records = rows.slice(1).map(row => Object.fromEntries(headers.map((header, index) => [header, row[index] || ""])));
      const students = records
        .filter(record => record.full_name || record.name)
        .map(record => {
          const competitions = String(record.competitions || "")
            .split("|")
            .map(item => item.trim())
            .filter(Boolean);
          return {
            external_student_id: record.external_student_id || record.student_id || null,
            full_name: record.full_name || record.name,
            email: record.email || "",
            school: record.school || "",
            grade_level: record.grade_level || record.grade || "",
            gender_label: record.gender_label || record.gender || "",
            nfc_uid: record.nfc_uid || record.nfc || null,
            registration_data: { competitions },
            updated_at: new Date().toISOString()
          };
        });

      if (!students.length) return alert("No valid students found. Include a full_name column.");

      const { data, error } = await supabaseClient
        .from("student_registrations")
        .upsert(students, { onConflict: "external_student_id" })
        .select("id,external_student_id,registration_data");

      if (error) return alert(error.message);

      const entries = (data || []).flatMap(student => {
        const competitions = student.registration_data?.competitions || [];
        return competitions.map(name => ({
          student_id: student.id,
          competition_name: name,
          registration_status: "registered"
        }));
      });

      if (entries.length) {
        const { error: entryError } = await supabaseClient.from("student_competition_entries").upsert(entries);
        if (entryError) return alert(entryError.message);
      }

      alert(`${students.length} student record${students.length === 1 ? "" : "s"} imported.`);
      renderApp();
    }

    async function startNfcRead(inputId = "tm-scan-nfc") {
      const input = document.getElementById(inputId);
      if (!input) return alert("NFC input field was not found.");

      if (!("NDEFReader" in window)) {
        return alert("This browser does not support Web NFC. Use a USB/Bluetooth NFC reader that types the tag value, or type the UID manually.");
      }

      if (window.location.protocol !== "https:" && window.location.protocol !== "http:" && window.location.protocol !== "file:") {
        return alert("NFC scanning requires a secure browser context.");
      }

      try {
        const reader = new NDEFReader();
        await reader.scan();
        setNfcStatus("Ready. Hold an NFC tag near the device.", "saving");

        reader.onreadingerror = () => {
          setNfcStatus("Could not read that tag. Try again.", "offline");
        };

        reader.onreading = event => {
          const tagValue = event.serialNumber || firstNdefRecordText(event.message) || "";
          if (!tagValue) {
            setNfcStatus("Tag read, but no serial/text value was available.", "offline");
            return;
          }

          input.value = tagValue;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          setNfcStatus(`Tag captured: ${tagValue}`, "saved");
        };
      } catch (error) {
        console.error("NFC read error:", error);
        setNfcStatus(error.message || "Could not start NFC reader.", "offline");
      }
    }

    function firstNdefRecordText(message) {
      const record = message?.records?.[0];
      if (!record?.data) return "";

      try {
        return new TextDecoder(record.encoding || "utf-8").decode(record.data);
      } catch (_) {
        return "";
      }
    }

    function setNfcStatus(message, mode = "saved") {
      const target = document.getElementById("tm-nfc-status");
      if (!target) return;
      target.textContent = message;
      target.className = `save-status ${mode}`;
    }

    function rowsToProgressMap(rows) {
      return rows.reduce((map, row) => {
        map[row.phase] = {
          data: row.data || { checks: [], notes: "" },
          percent_complete: row.percent_complete || 0,
          updated_at: row.updated_at
        };
        return map;
      }, {});
    }

    function getPhaseProgress(phaseId) {
      return APP_STATE.progress[phaseId] || {
        data: { checks: [], notes: "" },
        percent_complete: 0,
        updated_at: null
      };
    }

    function calculatePhasePercent(workbook, phaseId, phaseData) {
      const checklist = getPhaseChecklist(workbook.phases[phaseId]);
      if (!checklist.length) return 0;
      const checks = phaseData.checks || [];
      const completed = checklist.filter((_, index) => checks[index]).length;
      return Math.round((completed / checklist.length) * 100);
    }

    function getPhaseChecklist(phase) {
      return phase?.checklist || phase?.deliverables || [];
    }

    function calculateOverallPercent(workbook, progressMap) {
      const phaseIds = Object.keys(workbook.phases);
      if (!phaseIds.length) return 0;

      const total = phaseIds.reduce((sum, phaseId) => {
        const stored = progressMap[phaseId] || { data: { checks: [] } };
        return sum + calculatePhasePercent(workbook, phaseId, stored.data || {});
      }, 0);

      return Math.round(total / phaseIds.length);
    }

    function setSaveStatus(message) {
      const status = document.getElementById("save-status");
      if (status) status.textContent = message;
    }

    async function saveWorkbookPhase(phaseId) {
      const user = await getUser();
      const profile = await getProfile(user.id);
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const phaseState = getPhaseProgress(phaseId);
      const percent = calculatePhasePercent(workbook, phaseId, phaseState.data);

      setSaveStatus("Saving...");

      const { error } = await supabaseClient
        .from("workbook_progress")
        .upsert({
          user_id: user.id,
          phase: phaseId,
          data: phaseState.data,
          percent_complete: percent,
          updated_at: new Date().toISOString()
        }, { onConflict: "user_id,phase" });

      if (error) {
        console.error("Progress save error:", error);
        setSaveStatus("Could not save. Check Supabase table setup.");
        return;
      }

      APP_STATE.progress[phaseId].percent_complete = percent;
      APP_STATE.progress[phaseId].updated_at = new Date().toISOString();
      updateVisibleProgress(workbook);
      setSaveStatus("Saved");
    }

    function queueSave(phaseId) {
      clearTimeout(APP_STATE.saveTimers[phaseId]);
      setSaveStatus("Saving...");
      APP_STATE.saveTimers[phaseId] = setTimeout(() => saveWorkbookPhase(phaseId), 650);
    }

    function updateChecklist(phaseId, index, checked) {
      const phaseState = getPhaseProgress(phaseId);
      const checks = [...(phaseState.data.checks || [])];
      checks[index] = checked;
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, checks }
      };
      queueSave(phaseId);
    }

    function updateNotes(phaseId, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, notes: value }
      };
      queueSave(phaseId);
    }

    function updateField(phaseId, key, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: {
          ...phaseState.data,
          fields: {
            ...(phaseState.data.fields || {}),
            [key]: value
          }
        }
      };
      queueSave(phaseId);
    }

    function savedField(phaseId, key) {
      return getPhaseProgress(phaseId).data.fields?.[key] || "";
    }

    function updateVisibleProgress(workbook) {
      const overall = calculateOverallPercent(workbook, APP_STATE.progress);
      const overallText = document.getElementById("overall-percent");
      const overallFill = document.getElementById("overall-fill");
      const phaseText = document.getElementById("phase-percent");
      const phaseFill = document.getElementById("phase-fill");
      const phaseState = getPhaseProgress(APP_STATE.activePhase);

      if (overallText) overallText.textContent = `${overall}% complete`;
      if (overallFill) overallFill.style.width = `${overall}%`;
      if (phaseText) phaseText.textContent = `${phaseState.percent_complete || 0}% complete`;
      if (phaseFill) phaseFill.style.width = `${phaseState.percent_complete || 0}%`;
    }

    function renderApplicationQuestions(questions, selectedRoleId) {
      let currentSection = "";
      return questions.map(question => {
        const sectionHeading = question.section !== currentSection
          ? `<div class="panel phase-panel" style="margin:12px 0 0;padding:18px;--phase-color:${sectionColor(question.section)};"><h2>${escapeHtml(question.section)}</h2>${question.section === "Positions" ? `<p>You will have priority to remain in your current position, then your committee, if a seat is available.</p>` : ""}</div>`
          : "";
        currentSection = question.section;
        return `${sectionHeading}${renderApplicationQuestion(question, selectedRoleId)}`;
      }).join("");
    }

    function renderApplicationQuestion(question, selectedRoleId) {
      const requiredMark = question.required ? " *" : "";
      const name = answerInputName(question.id);
      const selectedRoleLabel = selectedRoleId ? formatRole(selectedRoleId) : "";
      const options = question.id === "interested_roles"
        ? question.options.map(option => ({ value: option, checked: selectedRoleLabel && option.includes(selectedRoleLabel) }))
        : (question.options || []).map(option => ({ value: option, checked: false }));

      if (question.type === "text") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <input data-application-field="${question.id}" name="${name}" placeholder="Your answer" />
          </div>
        `;
      }

      if (question.type === "textarea") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <textarea data-application-field="${question.id}" name="${name}" placeholder="Your answer"></textarea>
          </div>
        `;
      }

      if (question.type === "radio") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <div class="option-list">
              ${options.map((option, index) => `
                <label class="option-row">
                  <input data-application-field="${question.id}" type="radio" name="${name}" value="${escapeHtml(option.value)}" ${index === 0 && question.options?.length === 1 ? "checked" : ""}>
                  <span>${escapeHtml(option.value)}</span>
                </label>
              `).join("")}
            </div>
          </div>
        `;
      }

      if (question.type === "checkbox") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <div class="option-list">
              ${options.map(option => `
                <label class="option-row">
                  <input data-application-field="${question.id}" type="checkbox" name="${name}" value="${escapeHtml(option.value)}" ${option.checked ? "checked" : ""}>
                  <span>${escapeHtml(option.value)}</span>
                </label>
              `).join("")}
            </div>
          </div>
        `;
      }

      return "";
    }

    function collectApplicationResponses() {
      return APPLICATION_QUESTIONS.reduce((responses, question) => {
        const fields = Array.from(document.querySelectorAll(`[data-application-field="${question.id}"]`));
        if (question.type === "checkbox") {
          responses[question.id] = fields.filter(field => field.checked).map(field => field.value);
        } else if (question.type === "radio") {
          responses[question.id] = fields.find(field => field.checked)?.value || "";
        } else {
          responses[question.id] = fields[0]?.value.trim() || "";
        }
        return responses;
      }, {});
    }

    function answerInputName(questionId) {
      return `application-${fieldKey(questionId)}`;
    }

    function sectionColor(section) {
      if (section === "Commitments") return "#f472b6";
      if (section === "About You") return "#22d3ee";
      if (section === "The Real Stuff") return "#facc15";
      if (section === "Positions") return "#34d399";
      return "#38bdf8";
    }

    function calculateTeamStats(rows, progressRows) {
      const progressByUser = groupProgressByUser(progressRows);
      const totalOrganizers = rows.length;
      const activeOrganizers = rows.filter(row => row.claimed).length;
      const teamCount = new Set(rows.map(row => row.team).filter(Boolean)).size;
      const averageProgress = totalOrganizers
        ? Math.round(rows.reduce((sum, row) => {
          const workbook = WORKBOOKS[row.role_id] || WORKBOOKS.default;
          return sum + calculateOverallPercent(workbook, rowsToProgressMap(progressByUser[row.profile_id] || []));
        }, 0) / totalOrganizers)
        : 0;

      return { totalOrganizers, activeOrganizers, teamCount, averageProgress };
    }

    function groupProgressByUser(progressRows) {
      return progressRows.reduce((map, row) => {
        if (!map[row.user_id]) map[row.user_id] = [];
        map[row.user_id].push(row);
        return map;
      }, {});
    }

    function buildRoleDirectoryRows(profiles = []) {
      const profilesByRole = profiles.reduce((map, profile) => {
        if (profile.role_id && !map[profile.role_id]) map[profile.role_id] = profile;
        return map;
      }, {});

      return ROLE_OPTIONS.map(role => {
        const claim = profilesByRole[role.id];
        const workbook = WORKBOOKS[role.id] || WORKBOOKS.default;
        return {
          id: claim?.id || `role-${role.id}`,
          profile_id: claim?.id || null,
          full_name: claim?.full_name || "",
          email: claim?.email || "",
          role_id: role.id,
          team: claim?.team || role.team,
          start_phase: workbook.startPhase || firstPhaseForRole(role.id),
          task_preview: getRoleTaskPreview(role.id),
          updated_at: claim?.updated_at || null,
          claimed: !!claim
        };
      });
    }

    function firstPhaseForRole(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      return Object.keys(workbook.phases || {})[0] || "foundations";
    }

    function getRoleTaskPreview(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      const startPhase = workbook.startPhase || firstPhaseForRole(roleId);
      const phase = workbook.phases?.[startPhase] || Object.values(workbook.phases || {})[0] || {};
      const tasks = phase.responsibilities || phase.deliverables || phase.checklist || [];
      return tasks.slice(0, 3);
    }

      });
    }

    function renderWorkbook(profile) {
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const visiblePhases = Object.keys(workbook.phases);
      if (!workbook.phases[APP_STATE.activePhase]) {
        APP_STATE.activePhase = visiblePhases[0];
      }
      const phase = workbook.phases[APP_STATE.activePhase];
      const phaseMeta = PHASES[APP_STATE.activePhase] || { label: APP_STATE.activePhase, title: APP_STATE.activePhase, dates: "" };
      const phaseState = getPhaseProgress(APP_STATE.activePhase);
      const checks = phaseState.data.checks || [];
      const notes = phaseState.data.notes || "";
      const checklist = getPhaseChecklist(phase);
      const overallPercent = calculateOverallPercent(workbook, APP_STATE.progress);
      const phasePercent = calculatePhasePercent(workbook, APP_STATE.activePhase, phaseState.data);
      const activePhaseStyle = `--phase-color:${phaseColor(APP_STATE.activePhase)};--phase-gradient:${phaseGradient(APP_STATE.activePhase)}`;

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>${workbook.title}</h1>
              <p>${workbook.team} Team - ${profile.full_name || ""}</p>

          ${renderPortalUtilityBar("workbook")}

          <div class="panel">
            <div class="phase-header">
              <div>
                <h2>Workbook</h2>
                <p>${workbook.description}</p>
              </div>
              <div class="phase-chip" style="${activePhaseStyle}">Role: ${formatRole(profile.role_id)}</div>
            </div>

            <div class="grid">
              <div class="stat">
                <div class="stat-title">Overall Progress</div>
                <div id="overall-percent" class="stat-value">${overallPercent}% complete</div>
                <div class="progress-track"><div id="overall-fill" class="progress-fill" style="width:${overallPercent}%"></div></div>
              </div>
              <div class="stat">
                <div class="stat-title">Current Phase</div>
                <div id="phase-percent" class="stat-value">${phasePercent}% complete</div>
                <div class="progress-track"><div id="phase-fill" class="progress-fill" style="width:${phasePercent}%"></div></div>
              </div>
            </div>

            <div class="tabs">
              ${visiblePhases.map(phaseId => `
                <button class="tab-btn ${APP_STATE.activePhase === phaseId ? "active" : ""}" style="--phase-color:${phaseColor(phaseId)};--phase-gradient:${phaseGradient(phaseId)}" onclick="setPhase('${phaseId}')">
                  ${(PHASES[phaseId] || { label: phaseId }).label}
                </button>
              `).join("")}
            </div>

            <div class="panel phase-panel" style="margin-bottom:0; padding:20px; ${activePhaseStyle}">
              <div class="phase-header">
                <div>
                  <h3>${phaseMeta.title}</h3>
                  <p>${phase.focus}</p>
                </div>
                <div class="phase-chip">${phaseMeta.dates}</div>
              </div>

              ${phase.responsibilities?.length ? `
                <div class="label">Key Responsibilities</div>
                <div class="stack" style="margin-top:0;margin-bottom:18px;">
                  ${phase.responsibilities.map(item => `
                    <div class="check-row">
                      <span>${escapeHtml(item)}</span>
                    </div>
                  `).join("")}
                </div>
              ` : ""}

              <div class="label">Deliverables Checklist</div>
              ${checklist.map((item, index) => `
                <label class="check-row">
                  <input type="checkbox" ${checks[index] ? "checked" : ""} onchange="updateChecklist('${APP_STATE.activePhase}', ${index}, this.checked)" />
                  <span>${escapeHtml(item)}</span>
                </label>
              `).join("")}

              ${renderPhaseFrameworks(phase)}
              ${renderWeeklyPlan(phase)}
              ${renderReflectionPrompts(phase)}

              <div style="margin-top:18px;">

    function renderPhaseFrameworks(phase) {
      if (!phase.frameworks?.length) return "";

      return phase.frameworks.map((framework, frameworkIndex) => {
        if (framework.type === "table") {
          return `
            <div style="margin-top:22px;">
              <div class="label">${escapeHtml(framework.title)}</div>
              <table class="list-table">
                <thead>
                  <tr>${framework.columns.map(column => `<th>${escapeHtml(column)}</th>`).join("")}</tr>
                </thead>
                <tbody>
                  ${Array.from({ length: framework.rows || 4 }, (_, rowIndex) => `
                    <tr>
                      ${framework.columns.map((_, columnIndex) => {
                        const key = fieldKey("framework", frameworkIndex, rowIndex, columnIndex);
                        return `<td><textarea style="min-height:56px;" oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea></td>`;
                      }).join("")}
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          `;
        }

        if (framework.type === "grid2") {
          const sides = [framework.left, framework.right].filter(Boolean);
          return `
            <div style="margin-top:22px;">
              <div class="label">${escapeHtml(framework.title)}</div>
              <div class="grid">
                ${sides.map((side, sideIndex) => `
                  <div class="stat">
                    <h3>${escapeHtml(side.label)}</h3>
                    <div class="stack">
                      ${(side.prompts || []).map((prompt, promptIndex) => {
                        const key = fieldKey("framework", frameworkIndex, sideIndex, promptIndex);
                        return `
                          <div>
                            <p>${escapeHtml(prompt)}</p>
                            <textarea style="min-height:74px;" oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea>
                          </div>
                        `;
                      }).join("")}

    function buildTeamReadinessRows(rows, progressByUser) {
      return Object.entries(groupRowsByTeam(rows)).map(([team, teamRows]) => {
        const claimed = teamRows.filter(row => row.claimed).length;
        const open = teamRows.length - claimed;
        const progress = calculateTeamProgress(teamRows, progressByUser);
        return {
          name: team,
          total: teamRows.length,
          claimed,
          open,
          progress,
          starts: teamStartSummary(teamRows)
        };
      }).sort((a, b) => {
        if (b.open !== a.open) return b.open - a.open;
        return a.progress - b.progress;
      });
    }

    function groupRowsByTeam(rows) {
      return rows.reduce((map, row) => {
        const team = row.team || "Unassigned";
        if (!map[team]) map[team] = [];
        map[team].push(row);
        return map;
      }, {});
    }

    function teamStartSummary(rows) {
      const phases = [...new Set(rows.map(row => row.start_phase || firstPhaseForRole(row.role_id)))];
      return phases.map(formatPhase).join(", ");
    }

    function calculateTeamProgress(rows, progressByUser) {
      if (!rows.length) return 0;
      return Math.round(rows.reduce((sum, row) => {
        const workbook = WORKBOOKS[row.role_id] || WORKBOOKS.default;
        return sum + calculateOverallPercent(workbook, rowsToProgressMap(progressByUser[row.profile_id] || []));
      }, 0) / rows.length);
    }

    function teamRelevantDeadlines(team) {
      return (APP_STATE.currentDeadlines || CALENDAR_DEADLINES).filter(deadline => {
        const owner = String(deadline.owner_label || "All Teams").toLowerCase();
        return owner === "all teams" || owner.includes(String(team || "").toLowerCase());
      });
    }

      return `

            return `

    function downloadIcsFile(deadlines, filename) {
      const content = buildIcsCalendar(deadlines);
      const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function buildIcsCalendar(deadlines) {
      const now = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z");
      const events = deadlines.map(deadline => {
        const start = compactDate(deadline.due_date);
        const end = compactDate(addDaysIso(deadline.due_date, 1));
        const uid = `${deadline.id || slugify(deadline.title)}@mist-dallas-portal`;
        return [
          "BEGIN:VEVENT",
          `UID:${escapeIcs(uid)}`,
          `DTSTAMP:${now}`,
          `DTSTART;VALUE=DATE:${start}`,
          `DTEND;VALUE=DATE:${end}`,
          `SUMMARY:${escapeIcs(`MIST Dallas: ${deadline.title}`)}`,
          `DESCRIPTION:${escapeIcs(`${deadline.detail || ""}\\n\\nPhase: ${formatPhase(deadline.phase)}\\nPortal: ${window.location.href.split("?")[0]}`)}`,
          "END:VEVENT"
        ].join("\r\n");
      }).join("\r\n");

      return [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//MIST Dallas//Organizer Portal//EN",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        events,
        "END:VCALENDAR"
      ].join("\r\n");
    }

    function googleCalendarUrl(deadline) {
      const start = compactDate(deadline.due_date);
      const end = compactDate(addDaysIso(deadline.due_date, 1));
      const params = new URLSearchParams({
        action: "TEMPLATE",
        text: `MIST Dallas: ${deadline.title}`,
        dates: `${start}/${end}`,
        details: `${deadline.detail || ""}\n\nPhase: ${formatPhase(deadline.phase)}\nPortal: ${window.location.href.split("?")[0]}`
      });
      return `https://calendar.google.com/calendar/render?${params.toString()}`;
    }

    function findCurrentDeadline(deadlineId) {
      return (APP_STATE.currentDeadlines || []).find(deadline => String(deadline.id) === String(deadlineId));
    }

    function compactDate(value) {
      if (!value) return "";
      return String(value).replace(/-/g, "");
    }

    function addDaysIso(value, days) {
      const date = new Date(`${value}T12:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function escapeIcs(value) {
      return String(value || "")
        .replace(/\\/g, "\\\\")
        .replace(/\r?\n/g, "\\n")
        .replace(/,/g, "\\,")
        .replace(/;/g, "\\;");
    }

    function slugify(value) {
      return String(value || "mist-dallas-deadline")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "")
        .slice(0, 80) || "mist-dallas-deadline";
    }

    function renderTimelineItem(item) {
      const phaseId = phaseIdFromTimelineItem(item);
      const onboardingRoles = phaseId ? rolesStartingInPhase(phaseId) : [];

      return `
        <div class="timeline-item" style="--phase-color:${phaseColor(phaseId)};--phase-gradient:${phaseGradient(phaseId)}">
          <div>
            <div class="timeline-date">${escapeHtml(item.date)}</div>
            <div class="muted">${escapeHtml(item.phase)}</div>
          </div>
          <div>
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.description)}</p>
            <div class="pill-row">
              ${(item.owners || []).map(owner => `<span class="phase-chip">${escapeHtml(owner)}</span>`).join("")}
            </div>
            ${onboardingRoles.length ? `
              <div class="onboarding-roles">
                <div class="label">Roles onboarding in this phase</div>
                <div class="pill-row">
                  ${onboardingRoles.map(role => `<span class="phase-chip">${escapeHtml(role.title)} · ${escapeHtml(role.team)}</span>`).join("")}
                </div>
              </div>
            ` : ""}
          </div>
        </div>
      `;
    }

    function phaseIdFromTimelineItem(item) {
      const text = `${item.phase || ""} ${item.title || ""}`.toLowerCase();
      return Object.keys(PHASES).find(phaseId => {
        const phase = PHASES[phaseId];
        return text.includes(phaseId) || text.includes(String(phase.label || "").toLowerCase());
      }) || null;
    }

    function upcomingDeadlines(deadlines, limit = 5) {
      return [...(deadlines || [])]
        .filter(item => deadlineDate(item))
        .sort((a, b) => deadlineDate(a) - deadlineDate(b))
        .filter(item => !deadlineTiming(item).isOverdue)
        .slice(0, limit);
    }

    function deadlineDate(item) {
      if (!item?.due_date) return null;
      const date = new Date(`${item.due_date}T12:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function deadlineTiming(item) {
      const due = deadlineDate(item);
      if (!due) return { label: "No date", isOverdue: false, daysAway: null };

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      due.setHours(0, 0, 0, 0);
      const daysAway = Math.round((due - today) / 86400000);

      if (daysAway < 0) return { label: `${Math.abs(daysAway)} day${Math.abs(daysAway) === 1 ? "" : "s"} overdue`, isOverdue: true, daysAway };
      if (daysAway === 0) return { label: "Due today", isOverdue: false, daysAway };
      if (daysAway === 1) return { label: "Due tomorrow", isOverdue: false, daysAway };
      return { label: `${daysAway} days away`, isOverdue: false, daysAway };
    }

    function deadlinePriority(item) {
      if (item?.priority) return item.priority;
      const text = `${item.title || ""} ${item.detail || ""}`.toLowerCase();
      if (text.includes("final") || text.includes("lock") || text.includes("event week")) return "critical";
      if (text.includes("complete") || text.includes("claimed") || text.includes("confirmed")) return "high";
      if (text.includes("review") || text.includes("check-in") || text.includes("onboarded")) return "medium";
      return "low";
    }

    function deadlineType(item) {
      if (item?.deadline_type) return item.deadline_type;
      const text = `${item.title || ""} ${item.detail || ""}`.toLowerCase();
      if (text.includes("onboard")) return "Onboarding";
      if (text.includes("review") || text.includes("check-in")) return "Review";
      if (text.includes("training")) return "Training";
      if (text.includes("schedule") || text.includes("run-of-show")) return "Planning";
      if (text.includes("event")) return "Event Week";
      return "Deadline";
    }

    function renderProgressRow(profile, progressRows) {
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const progressMap = rowsToProgressMap(progressRows);
      const overallPercent = calculateOverallPercent(workbook, progressMap);
      const latestSaved = progressRows
        .map(row => row.updated_at)
        .filter(Boolean)
        .sort()
        .pop();

      return `
        <tr>
          <td>${escapeHtml(profile.full_name || "")}</td>

            <div class="progress-track"><div class="progress-fill" style="width:${overallPercent}%"></div></div>
          </td>

    function formatRole(roleId) {
      const role = ROLE_OPTIONS.find(r => r.id === roleId);
      return role ? role.title : (roleId || "Not set");
    }

    function formatPhase(phaseId) {
      return PHASES[phaseId]?.label || phaseId || "Not set";
    }

    function phaseColor(phaseId) {
      return PHASE_COLORS[phaseId] || "#1f8a9b";
    }

    function phaseGradient(phaseId) {
      return PHASE_GRADIENTS[phaseId] || "linear-gradient(135deg, #0f5f6b, #1f8a9b)";
    }

    function teamColor(team) {
      return TEAM_COLORS[team] || "#1f8a9b";
    }

    function formatDate(value) {
      return new Date(value).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDeadlineDate(value) {
      if (!value) return "";
      const date = new Date(`${value}T12:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    function formatBlockTime(block) {
      if (!block) return "";
      const date = block.block_date ? formatDeadlineDate(block.block_date) : "No date";
      const start = String(block.starts_at || "").slice(0, 5);
      const end = String(block.ends_at || "").slice(0, 5);
      return `${date} ${start}${end ? `-${end}` : ""}`.trim();
    }

    function detectTournamentConflicts(rooms, availability, blocks, assignments) {
      const conflicts = [];

      blocks.forEach(block => {
        const room = rooms.find(item => item.id === block.room_id);
        const blockAssignments = assignments.filter(item => item.competition_block_id === block.id);

        if (!block.room_id) {
          conflicts.push({
            type: "room",
            severity: "medium",
            title: `${block.competition_name} has no room`,
            detail: `${formatBlockTime(block)} needs a room assignment.`
          });
        }

        if (room && Number(block.capacity || 0) > Number(room.capacity || 0) && Number(room.capacity || 0) > 0) {
          conflicts.push({
            type: "capacity",
            severity: "high",
            title: `${block.competition_name} exceeds room capacity`,
            detail: `${room.room_name} holds ${room.capacity}; block capacity is ${block.capacity}.`
          });
        }

        if (Number(block.capacity || 0) > 0 && blockAssignments.length > Number(block.capacity || 0)) {
          conflicts.push({
            type: "roster",
            severity: "high",
            title: `${block.competition_name} roster exceeds block capacity`,
            detail: `${blockAssignments.length} assigned; capacity is ${block.capacity}.`
          });
        }

        const matchingWindows = availability.filter(item =>
          item.room_id === block.room_id
            && item.available_date === block.block_date
            && String(item.starts_at).slice(0,5) <= String(block.starts_at).slice(0,5)
            && String(item.ends_at).slice(0,5) >= String(block.ends_at).slice(0,5)
        );

        if (block.room_id && !matchingWindows.length) {
          conflicts.push({
            type: "availability",
            severity: "medium",
            title: `${block.competition_name} is outside room availability`,
            detail: `${formatBlockTime(block)} does not match a saved availability window.`
          });
        }
      });

      blocks.forEach((block, index) => {
        blocks.slice(index + 1).forEach(other => {
          if (!block.room_id || block.room_id !== other.room_id || block.block_date !== other.block_date) return;
          if (timeRangesOverlap(block.starts_at, block.ends_at, other.starts_at, other.ends_at)) {
            const room = rooms.find(item => item.id === block.room_id);
            conflicts.push({
              type: "double-booked",
              severity: "high",
              title: `${room?.room_name || "Room"} double-booked`,
              detail: `${block.competition_name} overlaps ${other.competition_name} on ${formatBlockTime(block)}.`
            });
          }
        });
      });

      return conflicts;
    }

    function timeRangesOverlap(startA, endA, startB, endB) {
      const aStart = minutesFromTime(startA);
      const aEnd = minutesFromTime(endA);
      const bStart = minutesFromTime(startB);
      const bEnd = minutesFromTime(endB);
      return aStart < bEnd && bStart < aEnd;
    }

    function minutesFromTime(value) {
      const [hours, minutes] = String(value || "00:00").split(":").map(Number);
      return (hours || 0) * 60 + (minutes || 0);
    }

    function parseFeedbackText(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      const firstLine = trimmed.split(/\r?\n/).find(line => line.trim()) || "";
      const rows = firstLine.includes("\t") ? parseDelimited(trimmed, "\t") : parseCsv(trimmed);
      if (rows.length < 2) return [];
      const headers = rows[0].map(header => String(header || "").trim());

      return rows.slice(1)
        .map(row => sanitizeFeedbackRow(headers, row))
        .filter(Boolean);
    }

    function parseDelimited(text, delimiter) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === '"' && insideQuotes && next === '"') {
          value += '"';
          index += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === delimiter && !insideQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(value);
          if (row.some(cell => String(cell || "").trim())) rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      row.push(value);
      if (row.some(cell => String(cell || "").trim())) rows.push(row);
      return rows;
    }

    function sanitizeFeedbackRow(headers, row) {
      const byHeader = {};
      headers.forEach((header, index) => {
        byHeader[header] = row[index] || "";
        byHeader[normalizeHeader(header)] = row[index] || "";
      });

      const timestamp = feedbackValue(byHeader, ["Timestamp"]);
      const year = feedbackYear(timestamp);
      const role = feedbackValue(byHeader, ["Role"]) || "Unknown";
      const scores = {};

      FEEDBACK_NUMERIC_FIELDS.forEach(field => {
        const score = toFeedbackScore(feedbackValue(byHeader, field.headers));
        if (score !== null) scores[field.key] = score;
      });

      const openText = FEEDBACK_TEXT_FIELDS
        .map(field => feedbackValue(byHeader, [field]))
        .filter(Boolean)
        .join(" ");
      const themes = detectFeedbackThemes(openText);
      const hasSignal = timestamp || role !== "Unknown" || Object.keys(scores).length || Object.keys(themes).length;

      if (!hasSignal) return null;
      return {
        timestamp: timestamp || "",
        year,
        role: cleanFeedbackLabel(role, "Unknown"),
        scores,
        themes
      };
    }

    function feedbackValue(row, labels) {
      for (const label of labels) {
        if (row[label] !== undefined && String(row[label]).trim()) return String(row[label]).trim();
        const normalized = normalizeHeader(label);
        if (row[normalized] !== undefined && String(row[normalized]).trim()) return String(row[normalized]).trim();
      }
      return "";
    }

    function feedbackYear(value) {
      const text = String(value || "").trim();
      const match = text.match(/\b(20\d{2})\b/);
      if (match) return match[1];
      const date = new Date(text);
      return Number.isFinite(date.getTime()) ? String(date.getFullYear()) : "Unknown";
    }

    function cleanFeedbackLabel(value, fallback = "Unknown") {
      const text = String(value || "").trim();
      if (!text) return fallback;
      return text.slice(0, 60);
    }

    function toFeedbackScore(value) {
      const text = String(value || "").trim();
      if (!text) return null;
      const match = text.match(/-?\d+(\.\d+)?/);
      if (!match) return null;
      const number = Number(match[0]);
      if (!Number.isFinite(number) || number < 0 || number > 5) return null;
      return number;
    }

    function detectFeedbackThemes(text) {
      const lowered = String(text || "").toLowerCase();
      const themes = {};
      if (!lowered.trim()) return themes;

      FEEDBACK_THEME_KEYWORDS.forEach(theme => {
        const matched = theme.words.some(word => lowered.includes(word.toLowerCase()));
        if (matched) themes[theme.id] = 1;
      });

      return themes;
    }

    function buildFeedbackAnalytics(records) {
      const safeRecords = Array.isArray(records) ? records : [];
      const roleCounts = {};
      const yearBuckets = {};
      const categoryAverages = [];
      const themeCounts = FEEDBACK_THEME_KEYWORDS.map(theme => ({ ...theme, count: 0 }));
      let lowScoreCount = 0;

      safeRecords.forEach(record => {
        const role = cleanFeedbackLabel(record.role, "Unknown");
        roleCounts[role] = (roleCounts[role] || 0) + 1;

        const year = record.year || "Unknown";
        if (!yearBuckets[year]) yearBuckets[year] = { count: 0, overallScores: [] };
        yearBuckets[year].count += 1;
        if (record.scores?.overall !== undefined) {
          yearBuckets[year].overallScores.push(record.scores.overall);
          if (record.scores.overall <= 2) lowScoreCount += 1;
        }

        themeCounts.forEach(theme => {
          if (record.themes?.[theme.id]) theme.count += 1;
        });
      });

      FEEDBACK_NUMERIC_FIELDS.forEach(field => {
        const values = safeRecords
          .map(record => record.scores?.[field.key])
          .filter(value => Number.isFinite(value));
        if (values.length) {
          categoryAverages.push({
            key: field.key,
            label: field.label,
            average: average(values),
            count: values.length
          });
        }
      });

      const yearStats = Object.fromEntries(Object.entries(yearBuckets).map(([year, item]) => [
        year,
        {
          count: item.count,
          averageOverall: average(item.overallScores)
        }
      ]));
      const years = Object.keys(yearStats).filter(year => year !== "Unknown").sort();
      const communicationValues = [
        ...safeRecords.map(record => record.scores?.comm_before).filter(Number.isFinite),
        ...safeRecords.map(record => record.scores?.comm_during).filter(Number.isFinite)
      ];

      return {
        responseCount: safeRecords.length,
        avgOverall: average(safeRecords.map(record => record.scores?.overall).filter(Number.isFinite)),
        avgRecommend: average(safeRecords.map(record => record.scores?.recommend).filter(Number.isFinite)),
        avgCommunication: average(communicationValues),
        lowScoreCount,
        roleCounts,
        yearStats,
        yearRange: years.length ? `${years[0]}-${years[years.length - 1]}` : "",
        categoryAverages: categoryAverages.sort((a, b) => a.average - b.average),
        themeCounts: themeCounts.sort((a, b) => b.count - a.count)
      };
    }

    function average(values) {
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function formatScore(value) {
      return Number.isFinite(value) ? `${value.toFixed(2)} / 5` : "No data";
    }

    function formatMiniScore(value) {
      return Number.isFinite(value) ? value.toFixed(2) : "—";
    }

    function formatDelta(value) {
      if (!Number.isFinite(value)) return "—";
      const prefix = value > 0 ? "+" : "";
      return `${prefix}${value.toFixed(2)}`;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === '"' && insideQuotes && next === '"') {
          value += '"';
          index += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(value);
          if (row.some(cell => cell.trim())) rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      row.push(value);
      if (row.some(cell => cell.trim())) rows.push(row);
      return rows;
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function downloadCsv(filename, rows) {
      const content = rows.map(row => row.map(csvEscape).join(",")).join("\n");
      const blob = new Blob([content], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function convertFeedbackThemeToAction(themeId, source = "starter") {
      const base = source === "custom"
        ? getLocalRecords("mist_feedback_addressal").find(item => item.id === themeId)
        : FEEDBACK_THEMES.find(item => item.id === themeId);
      if (!base) return alert("Could not find that feedback theme.");

      const records = trackedActions();
      if (records.some(item => item.source_id === themeId)) return alert("That feedback theme is already a tracked action item.");

      records.unshift({

    function showModal({ title, body, confirmLabel = "Confirm", cancelLabel = "Cancel", onConfirm }) {
      const existing = document.getElementById("portal-modal");
      if (existing) existing.remove();
      const modal = document.createElement("div");
      modal.id = "portal-modal";
      modal.className = "modal-backdrop";
      modal.innerHTML = `
        <div class="modal-card">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(body)}</p>
          <div class="inline-actions">
            <button class="danger" id="portal-modal-confirm">${escapeHtml(confirmLabel)}</button>
            <button class="ghost" id="portal-modal-cancel">${escapeHtml(cancelLabel)}</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const close = result => {
        modal.remove();
        if (result && typeof onConfirm === "function") onConfirm();
      };
      modal.querySelector("#portal-modal-confirm").onclick = () => close(true);
      modal.querySelector("#portal-modal-cancel").onclick = () => close(false);
    }

    function requestConfirmation({ title, body, confirmLabel }) {
      return new Promise(resolve => {
        showModal({
          title,
          body,
          confirmLabel,
          onConfirm: () => resolve(true)
        });
        document.getElementById("portal-modal-cancel").onclick = () => {
          document.getElementById("portal-modal")?.remove();
          resolve(false);
        };
      });
    }

      rows.push(["summary", "low_overall_scores", analytics.lowScoreCount, "", ""]);

      analytics.categoryAverages.forEach(item => {
        rows.push(["score", item.label, formatScore(item.average), item.count, ""]);
      });

      Object.entries(analytics.yearStats).forEach(([year, item]) => {
        rows.push(["year", year, formatScore(item.averageOverall), item.count, ""]);
      });

      Object.entries(analytics.roleCounts).forEach(([role, count]) => {

      });

    function searchRulebook(query) {
      const needle = String(query || "").trim().toLowerCase();
      if (!needle) return RULEBOOK_ENTRIES;

      return RULEBOOK_ENTRIES.filter(entry => {
        const text = [
          entry.category,
          entry.question,
          entry.answer,
          ...(entry.keywords || [])
        ].join(" ").toLowerCase();
        return needle.split(/\s+/).every(part => text.includes(part));
      });
    }

    function updateKnowledgeSearch(value) {
      APP_STATE.knowledgeQuery = value;
      const resultsPanel = document.querySelector(".log-list");
      if (!resultsPanel) return;
      const results = searchRulebook(value);
      resultsPanel.innerHTML = results.map(entry => `
        <div class="knowledge-result" style="--knowledge-color:${entry.color}">
          <div class="stat-title">${escapeHtml(entry.category)} • ${escapeHtml(entry.version || PORTAL_RULEBOOK_VERSION)} • ${escapeHtml(entry.updated_at || "Latest")}</div>
          <h3>${escapeHtml(entry.question)}</h3>
          <p>${escapeHtml(entry.answer)}</p>
          <div class="inline-actions">
            ${entry.page ? `<button class="ghost" onclick="openRulebookPage('${escapeHtml(entry.page)}')">Open ${escapeHtml(entry.page_label || "related page")}</button>` : ""}
          </div>
        </div>
      `).join("") || `<p>No answer found yet. Add this question to the official rulebook source.</p>`;
    }
