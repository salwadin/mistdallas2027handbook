<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIST Dallas 2027 · Organizer Portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2318798a'/><text x='16' y='23' font-family='system-ui,sans-serif' font-size='19' font-weight='900' fill='white' text-anchor='middle'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ==============================================
       MIST DALLAS 2027 — DESIGN SYSTEM
       Warm · Light · Human
       ============================================== */

    :root {
      /* — Base — */
      --bg:          #ede8df;
      --surface:     #ffffff;
      --surface2:    #f7f3ee;
      --border:      #e2d9ce;
      --border-lt:   #ede8e0;
      --text:        #1c1914;
      --muted:       #78706a;
      --faint:       #b0a89f;

      /* — Brand — */
      --teal:        #18798a;
      --teal-dim:    #e4f2f4;
      --green:       #1c6b43;
      --green-dim:   #e3f0ea;
      --gold:        #b88216;
      --gold-dim:    #fdf1d0;
      --purple:      #6950e4;
      --purple-dim:  #ece8fc;
      --red:         #a5364a;
      --red-dim:     #fce3e7;
      --pink:        #b23d6c;
      --pink-dim:    #fce2ee;
      --blue:        #1e86a0;
      --blue2:       #2255a2;

      /* — Legacy aliases (JS uses these names) — */
      --ink:   #1c1914;
      --paper: #ede8df;
      --input: #f7f3ee;
      --card:  #ffffff;

      /* — Elevation — */
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 3px 10px rgba(0,0,0,0.05);
      --shadow:    0 1px 4px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.07);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.07), 0 14px 36px rgba(0,0,0,0.09);

      /* — Radius — */
      --r-sm:   8px;
      --r-md:   12px;
      --r-lg:   16px;
      --r-xl:   20px;
      --r-pill: 999px;
    }

    /* ==============================================
       RESET + BASE
       ============================================== */

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: "Plus Jakarta Sans", Inter, system-ui, -apple-system,
                   BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ==============================================
       GLOBAL NAV
       ============================================== */

    #global-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-xs);
    }

    .nav-bar {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-wordmark {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      white-space: nowrap;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px 8px 6px 4px;
      border-radius: var(--r-md);
      font-family: inherit;
      transition: background 0.12s;
      flex-shrink: 0;
      margin-right: 8px;
    }

    .nav-wordmark:hover { background: var(--surface2); transform: none; box-shadow: none; }

    .nav-wordmark-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--teal), var(--green));
      display: grid;
      place-items: center;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
      font-weight: 900;
    }

    .nav-wordmark-year {
      font-size: 12px;
      font-weight: 600;
      color: var(--faint);
      padding: 2px 6px;
      background: var(--surface2);
      border-radius: var(--r-pill);
      border: 1px solid var(--border-lt);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-links::-webkit-scrollbar { display: none; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: var(--r-md);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
      font-family: inherit;
    }

    .nav-link:hover { background: var(--surface2); color: var(--text); transform: none; box-shadow: none; }

    .nav-link.active {
      background: var(--teal-dim);
      color: var(--teal);
      font-weight: 700;
    }

    .nav-end {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .nav-user-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 10px 4px 4px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s;
      font-family: inherit;
    }

    .nav-user-pill:hover { background: var(--border-lt); transform: none; box-shadow: none; }

    .nav-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--purple));
      color: white;
      font-size: 11px;
      font-weight: 800;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    /* ==============================================
       APP SHELL
       ============================================== */

    #app {
      width: 100%;
      min-height: calc(100vh - 56px);
      padding: 28px 20px 64px;
    }

    .dashboard-shell {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    /* ==============================================
       SURFACES
       ============================================== */

    .card, .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
    }

    .card {
      width: 100%;
      max-width: 440px;
      padding: 32px;
      margin: 48px auto 0;
    }

    .panel {
      padding: 22px 24px;
      margin-bottom: 14px;
    }

    /* ==============================================
       TYPOGRAPHY
       ============================================== */

    h1, h2, h3 { margin: 0; font-weight: 700; line-height: 1.15; }

    h1 {
      font-size: 26px;
      letter-spacing: -0.025em;
      margin-bottom: 6px;
    }

    h2 {
      font-size: 18px;
      letter-spacing: -0.015em;
      margin-bottom: 6px;
    }

    h3 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--faint);
      margin-bottom: 6px;
    }

    .muted { color: var(--muted); }
    .faint { color: var(--faint); }

    .subtext {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .note {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ==============================================
       LAYOUT HELPERS
       ============================================== */

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .actions button { min-width: 150px; }

    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .inline-actions button { width: auto; min-width: 100px; }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    /* ==============================================
       FORMS
       ============================================== */

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: var(--r-md);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(24, 121, 138, 0.12);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }

    input::placeholder, textarea::placeholder { color: var(--faint); }
    input:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ==============================================
       BUTTONS
       ============================================== */

    button {
      border: none;
      border-radius: var(--r-md);
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      font-family: inherit;
      line-height: 1;
    }

    button:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    button:active { transform: translateY(0); }

    .full { width: 100%; }

    .primary {
      background: var(--teal);
      color: white;
    }

    .primary:hover { background: #1a8899; }

    .secondary {
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(184, 130, 22, 0.22);
    }

    .secondary:hover { background: #fce8a8; }

    .ghost {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: auto;
      min-width: 100px;
    }

    .ghost:hover { background: var(--border-lt); }

    .danger { background: var(--red); color: white; }
    .success { background: var(--green); color: white; }

    /* ==============================================
       TABS
       ============================================== */

    .tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin: 18px 0 22px;
      padding: 4px;
      background: var(--surface2);
      border: 1px solid var(--border-lt);
      border-radius: var(--r-lg);
      width: fit-content;
      max-width: 100%;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      min-width: 110px;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: var(--r-md);
      box-shadow: none;
    }

    .tab-btn:hover { background: var(--border-lt); color: var(--text); transform: none; box-shadow: none; }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-xs);
      border: 1px solid var(--border);
      font-weight: 700;
    }

    /* ==============================================
       STATS
       ============================================== */

    .stat {
      background: var(--surface2);
      border: 1px solid var(--border-lt);
      border-radius: var(--r-lg);
      padding: 18px;
    }

    .stat-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--faint);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    /* ==============================================
       PROGRESS
       ============================================== */

    .progress-track {
      width: 100%;
      height: 6px;
      overflow: hidden;
      border-radius: var(--r-pill);
      background: var(--border);
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: var(--r-pill);
      background: var(--teal);
      transition: width 0.4s ease;
    }

    .save-status {
      min-height: 20px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ==============================================
       PHASE SYSTEM
       ============================================== */

    .phase-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .phase-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: var(--r-pill);
      background: color-mix(in srgb, var(--phase-color, var(--teal)) 10%, var(--surface2));
      border: 1px solid color-mix(in srgb, var(--phase-color, var(--teal)) 22%, var(--border));
      font-size: 12px;
      color: color-mix(in srgb, var(--phase-color, var(--teal)) 85%, #000000);
      font-weight: 700;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .phase-panel {
      position: relative;
      overflow: hidden;
      border-color: color-mix(in srgb, var(--phase-color, var(--teal)) 25%, var(--border));
      background: color-mix(in srgb, var(--phase-color, var(--teal)) 4%, var(--surface));
    }

    .phase-panel::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--phase-color, var(--teal));
      border-radius: 4px 0 0 4px;
    }

    .phase-panel > * { position: relative; }

    .phase-progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .phase-mini {
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--phase-color, var(--teal)) 20%, var(--border));
      border-radius: var(--r-md);
      background: color-mix(in srgb, var(--phase-color, var(--teal)) 5%, var(--surface));
    }

    .phase-mini strong { display: block; margin-bottom: 4px; }

    /* ==============================================
       NAV CARDS
       ============================================== */

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .nav-section { margin-top: 28px; }

    .nav-section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2px;
    }

    .nav-section-head::after {
      content: "";
      flex: 1;
      height: 1px;
      background: color-mix(in srgb, var(--section-color, var(--teal)) 25%, var(--border));
    }

    .nav-section-head strong {
      font-size: 11px;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--section-color, var(--teal)) 75%, #000000);
      font-weight: 800;
      white-space: nowrap;
    }

    .nav-section-head span { color: var(--faint); font-size: 12px; }

    .nav-card {
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-top: 3px solid var(--section-color, var(--teal));
      border-radius: var(--r-md);
      background: var(--surface);
      color: var(--text);
      text-align: left;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s, box-shadow 0.15s, transform 0.15s;
      width: 100%;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .nav-card:hover {
      background: color-mix(in srgb, var(--section-color, var(--teal)) 5%, var(--surface));
      box-shadow: var(--shadow);
      transform: translateY(-2px);
      opacity: 1;
    }

    .nav-card strong { font-size: 14px; font-weight: 700; color: var(--text); }
    .nav-card span { display: none; }

    /* ==============================================
       BADGES
       ============================================== */

    .priority-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      text-transform: capitalize;
    }

    .priority-pill.high, .priority-pill.critical {
      background: var(--red-dim);
      border-color: rgba(165, 54, 74, 0.2);
      color: var(--red);
    }

    .priority-pill.medium {
      background: var(--gold-dim);
      border-color: rgba(184, 130, 22, 0.2);
      color: var(--gold);
    }

    .priority-pill.low {
      background: var(--green-dim);
      border-color: rgba(28, 107, 67, 0.2);
      color: var(--green);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      text-transform: capitalize;
    }

    .status-pill.pending {
      background: var(--gold-dim);
      border-color: rgba(184, 130, 22, 0.2);
      color: var(--gold);
    }

    .status-pill.approved {
      background: var(--green-dim);
      border-color: rgba(28, 107, 67, 0.2);
      color: var(--green);
    }

    .status-pill.declined {
      background: var(--red-dim);
      border-color: rgba(165, 54, 74, 0.2);
      color: var(--red);
    }

    /* ==============================================
       TABLES
       ============================================== */

    .list-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .list-table th, .list-table td {
      text-align: left;
      padding: 11px 12px;
      border-bottom: 1px solid var(--border-lt);
      font-size: 13px;
    }

    .list-table th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--faint);
      background: var(--surface2);
    }

    /* ==============================================
       CARD VARIANTS
       ============================================== */

    .roadmap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .roadmap-card {
      border: 1px solid color-mix(in srgb, var(--roadmap-color, var(--teal)) 18%, var(--border));
      border-left: 4px solid var(--roadmap-color, var(--teal));
      border-radius: var(--r-md);
      padding: 16px;
      background: color-mix(in srgb, var(--roadmap-color, var(--teal)) 5%, var(--surface));
    }

    .roadmap-status {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 8px;
      padding: 3px 8px;
      border-radius: var(--r-pill);
      color: color-mix(in srgb, var(--roadmap-color, var(--teal)) 75%, #000000);
      background: color-mix(in srgb, var(--roadmap-color, var(--teal)) 12%, var(--surface2));
      border: 1px solid color-mix(in srgb, var(--roadmap-color, var(--teal)) 22%, var(--border));
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .knowledge-search {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    .knowledge-result {
      border: 1px solid color-mix(in srgb, var(--knowledge-color, var(--teal)) 20%, var(--border));
      border-left: 4px solid var(--knowledge-color, var(--teal));
      border-radius: var(--r-md);
      padding: 16px;
      background: color-mix(in srgb, var(--knowledge-color, var(--teal)) 5%, var(--surface));
    }

    .runbook-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .runbook-card {
      border: 1px solid var(--border);
      border-top: 4px solid var(--runbook-color, var(--teal));
      border-radius: var(--r-md);
      padding: 16px;
      background: color-mix(in srgb, var(--runbook-color, var(--teal)) 5%, var(--surface));
    }

    .log-list { display: grid; gap: 10px; margin-top: 12px; }

    .log-card {
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      background: var(--surface);
    }

    .feedback-card {
      border: 1px solid color-mix(in srgb, var(--feedback-color, var(--teal)) 20%, var(--border));
      border-left: 4px solid var(--feedback-color, var(--teal));
      border-radius: var(--r-md);
      padding: 16px;
      background: color-mix(in srgb, var(--feedback-color, var(--teal)) 5%, var(--surface));
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    /* ==============================================
       DIRECTORY + PEOPLE
       ============================================== */

    .directory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .person-card {
      min-height: 110px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      border-top: 3px solid var(--team-color, var(--teal));
      transition: box-shadow 0.12s;
    }

    .person-card.unclaimed {
      border-style: dashed;
      background: var(--surface2);
      opacity: 0.75;
    }

    .person-card h3 { margin-bottom: 6px; word-break: break-word; }

    .role-meta-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .task-list {
      margin: 8px 0 0;
      padding-left: 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .task-list li { margin-bottom: 5px; font-size: 13px; }

    /* ==============================================
       TEAM BOARDS
       ============================================== */

    .team-board { display: grid; gap: 14px; margin-top: 14px; }

    .team-board-section {
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      background: color-mix(in srgb, var(--team-color, var(--teal)) 4%, var(--surface));
      border-top: 3px solid var(--team-color, var(--teal));
    }

    .team-board-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    /* ==============================================
       TIMELINE
       ============================================== */

    .timeline { display: grid; gap: 10px; margin-top: 14px; }

    .timeline-item {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      border-left: 5px solid var(--phase-color, var(--teal));
    }

    .timeline-date {
      color: color-mix(in srgb, var(--phase-color, var(--teal)) 80%, #000000);
      font-weight: 800;
      font-size: 13px;
    }

    /* ==============================================
       CALENDAR + DEADLINES
       ============================================== */

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .deadline-card {
      border: 1px solid color-mix(in srgb, var(--phase-color, var(--teal)) 20%, var(--border));
      border-top: 5px solid var(--phase-color, var(--teal));
      border-radius: var(--r-md);
      padding: 14px;
      background: var(--surface);
    }

    .deadline-date {
      color: color-mix(in srgb, var(--phase-color, var(--teal)) 80%, #000000);
      font-weight: 800;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .deadline-card.overdue {
      border-color: rgba(165, 54, 74, 0.3);
      border-top-color: var(--red);
    }

    .deadline-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

    /* ==============================================
       COMMAND CENTER / CONSOLE
       ============================================== */

    .console-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 12px;
      margin-top: 14px;
    }

    .console-list { display: grid; gap: 8px; margin-top: 10px; }

    .console-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      transition: box-shadow 0.12s;
    }

    .console-item:hover { box-shadow: var(--shadow-sm); }

    .console-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 14px;
      background: linear-gradient(135deg, var(--teal), var(--green));
      color: white;
      flex-shrink: 0;
    }

    .console-kicker {
      font-size: 11px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
    }

    .console-title {
      margin-top: 2px;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    .readiness-list { display: grid; gap: 8px; margin-top: 12px; }

    .readiness-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
    }

    .readiness-row.warning {
      border-color: rgba(184, 130, 22, 0.3);
      background: var(--gold-dim);
    }

    .readiness-row.urgent {
      border-color: rgba(165, 54, 74, 0.3);
      background: var(--red-dim);
    }

    /* ==============================================
       FORMS — ADMIN
       ============================================== */

    .admin-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .admin-form textarea { min-height: 78px; }

    /* ==============================================
       CHECKLIST + OPTIONS
       ============================================== */

    .check-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .check-row:hover { background: var(--surface2); }

    .check-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--phase-color, var(--teal));
      flex-shrink: 0;
      padding: 0;
      border-radius: 4px;
      appearance: auto;
      -webkit-appearance: checkbox;
      cursor: pointer;
    }

    .application-question {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      background: var(--surface);
    }

    .option-list { display: grid; gap: 6px; margin-top: 10px; }

    .option-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface2);
      cursor: pointer;
      transition: background 0.1s;
    }

    .option-row:hover { background: var(--border-lt); }

    .option-row input {
      width: 16px;
      height: 16px;
      padding: 0;
      margin-top: 2px;
      accent-color: var(--purple);
      appearance: auto;
      -webkit-appearance: auto;
      flex-shrink: 0;
    }

    .answer-list { display: grid; gap: 12px; margin-top: 14px; }

    /* ==============================================
       OPS FLOW
       ============================================== */

    .ops-flow {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .ops-step {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: color-mix(in srgb, var(--ops-color, var(--teal)) 5%, var(--surface));
      border-top: 4px solid var(--ops-color, var(--teal));
    }

    .ops-step-number {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: var(--r-sm);
      background: var(--ops-color, var(--teal));
      color: white;
      font-weight: 900;
      margin-bottom: 10px;
      font-size: 13px;
    }

    /* ==============================================
       ROOMS + CODE
       ============================================== */

    .room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .room-card {
      border: 1px solid var(--border);
      border-left: 4px solid var(--ops-color, var(--teal));
      border-radius: var(--r-md);
      padding: 14px;
      background: var(--surface);
    }

    .code-card {
      border: 1px dashed color-mix(in srgb, var(--gold) 40%, var(--border));
      border-radius: var(--r-md);
      padding: 14px;
      background: var(--gold-dim);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
      color: var(--gold);
    }

    .conflict-list { display: grid; gap: 8px; margin-top: 12px; }

    /* ==============================================
       MISC
       ============================================== */

    .onboarding-roles {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ==============================================
       FOCUS RINGS (accessibility)
       ============================================== */

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 2px;
    }

    /* ==============================================
       PHASE-TINTED ACTIVE TAB
       ============================================== */

    .tab-btn.active {
      background: color-mix(in srgb, var(--phase-color, var(--teal)) 9%, var(--surface));
      color: color-mix(in srgb, var(--phase-color, var(--teal)) 88%, #000000);
      box-shadow: var(--shadow-xs);
      border: 1px solid color-mix(in srgb, var(--phase-color, var(--teal)) 28%, var(--border));
      font-weight: 700;
    }

    /* ==============================================
       SKELETON LOADER
       ============================================== */

    @keyframes sk-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-page {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .sk {
      border-radius: var(--r-lg);
      background: linear-gradient(
        90deg,
        var(--border-lt) 25%,
        var(--border)    50%,
        var(--border-lt) 75%
      );
      background-size: 200% 100%;
      animation: sk-shimmer 1.4s ease-in-out infinite;
    }

    .sk-bar  { height: 52px; }
    .sk-panel { height: 180px; }
    .sk-row  { height: 80px; }
    .sk-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .sk-card { height: 110px; border-radius: var(--r-lg); }

    /* ==============================================
       MOBILE DRAWER
       ============================================== */

    .nav-hamburger {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--r-md);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s;
      box-shadow: none;
    }

    .nav-hamburger:hover { background: var(--border-lt); transform: none; }

    .nav-mobile-drawer {
      display: none;
      flex-direction: column;
      gap: 2px;
      padding: 8px 12px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .nav-mobile-drawer.open { display: flex; }

    .nav-mobile-link {
      display: flex;
      align-items: center;
      padding: 11px 12px;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
      width: 100%;
    }

    .nav-mobile-link:hover { background: var(--surface2); color: var(--text); transform: none; box-shadow: none; }
    .nav-mobile-link.active { color: var(--teal); background: var(--teal-dim); font-weight: 700; }

    /* ==============================================
       RESPONSIVE
       ============================================== */

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      #app { padding: 20px 16px 52px; }
      .card { padding: 24px; margin-top: 16px; }
      .panel { padding: 18px; }
      h1 { font-size: 22px; }
      h2 { font-size: 17px; }
      .topbar { flex-direction: column; }
      .actions { flex-direction: column; }
      .actions button, .ghost, .tab-btn { width: 100%; }
      .timeline-item { grid-template-columns: 1fr; }
      .console-grid { grid-template-columns: 1fr; }
      .console-item { grid-template-columns: auto 1fr; }
      .console-item .inline-actions { grid-column: 1 / -1; }
    }

    @media (max-width: 480px) {
      .tabs { width: 100%; }
      .tab-btn { min-width: auto; flex: 1; text-align: center; }
    }

    /* ==============================================
       ONBOARDING — SPACE THEME
       ============================================== */

    .ob-shell {
      position: relative;
      margin: -28px -20px 0;
      min-height: calc(100vh - 56px);
      padding: 72px 40px 96px;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 15% 40%, rgba(99,51,188,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(6,78,120,0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(139,27,80,0.25) 0%, transparent 45%),
        linear-gradient(160deg, #04040f 0%, #080820 50%, #0a0618 100%);
    }

    .ob-stars {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .ob-content {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 0 auto;
    }

    .ob-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(160,200,255,0.7);
      margin-bottom: 20px;
    }

    .ob-eyebrow-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #60a5fa;
      box-shadow: 0 0 8px #60a5fa;
    }

    .ob-step {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(160,200,255,0.5);
      margin-bottom: 10px;
    }

    .ob-title {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin: 0 0 18px;
      background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ob-subtitle {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(200,210,240,0.75);
      max-width: 540px;
      margin: 0 0 40px;
    }

    .ob-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(160,200,255,0.45);
      margin-bottom: 14px;
    }

    .ob-phases {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .ob-phase-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 3px solid var(--ob-color);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }

    .ob-phase-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 0% 50%, var(--ob-color) 0%, transparent 70%);
      opacity: 0.07;
      pointer-events: none;
    }

    .ob-phase-card:hover {
      background: rgba(255,255,255,0.07);
    }

    .ob-phase-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .ob-phase-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--ob-gradient);
      color: white;
      font-size: 12px;
      font-weight: 800;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--ob-color);
    }

    .ob-phase-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .ob-phase-dates {
      font-size: 11px;
      font-weight: 600;
      color: var(--ob-color);
      margin-left: auto;
      flex-shrink: 0;
    }

    .ob-phase-desc {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(200,210,240,0.65);
      margin: 0;
    }

    .ob-callout {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--r-lg);
      padding: 20px 24px;
      margin-bottom: 40px;
      backdrop-filter: blur(6px);
    }

    .ob-callout-title {
      font-size: 14px;
      font-weight: 700;
      color: rgba(230,240,255,0.9);
      margin-bottom: 6px;
    }

    .ob-callout-body {
      font-size: 13px;
      line-height: 1.65;
      color: rgba(180,200,240,0.65);
      margin: 0;
    }

    .ob-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .ob-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: var(--r-pill);
      border: none;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(124,58,237,0.5), 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: -0.01em;
    }

    .ob-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 36px rgba(124,58,237,0.7), 0 8px 24px rgba(0,0,0,0.4);
    }

    .ob-btn-primary:active { transform: translateY(0); }

    .ob-btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 13px 22px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(200,220,255,0.8);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s;
      letter-spacing: -0.01em;
    }

    .ob-btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
      color: white;
      transform: none;
      box-shadow: none;
      opacity: 1;
    }

    @media (max-width: 600px) {
      .ob-shell { padding: 48px 24px 72px; }
      .ob-actions { flex-direction: column-reverse; align-items: stretch; }
      .ob-btn-primary, .ob-btn-ghost { justify-content: center; }
    }

    /* ==============================================
       MESSAGING / CHAT
       ============================================== */

    .chat-shell {
      display: flex;
      height: calc(100vh - 56px - 56px);
      min-height: 480px;
      max-width: 1120px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .chat-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .chat-sidebar-head {
      padding: 16px 14px 10px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
      border-bottom: 1px solid var(--border-lt);
      flex-shrink: 0;
    }

    .chat-sidebar-section {
      padding: 12px 10px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--faint);
    }

    .chat-channel-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      padding: 7px 12px;
      border: none;
      background: none;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
      margin: 1px 4px;
      width: calc(100% - 8px);
    }

    .chat-channel-btn:hover { background: var(--border-lt); color: var(--text); }

    .chat-channel-btn.active {
      background: var(--teal-dim);
      color: var(--teal);
      font-weight: 700;
    }

    .chat-channel-hash {
      font-size: 15px;
      color: var(--faint);
      flex-shrink: 0;
      line-height: 1;
    }

    .chat-channel-btn.active .chat-channel-hash { color: var(--teal); }

    .chat-unread {
      margin-left: auto;
      background: var(--teal);
      color: white;
      font-size: 10px;
      font-weight: 700;
      border-radius: var(--r-pill);
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .chat-header-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .chat-header-desc {
      font-size: 13px;
      color: var(--muted);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    .chat-day-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 10px;
      color: var(--faint);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-lt);
    }

    .chat-message {
      display: flex;
      gap: 10px;
      padding: 4px 6px;
      border-radius: var(--r-md);
      transition: background 0.1s;
    }

    .chat-message:hover { background: var(--surface2); }

    .chat-message.grouped { padding-top: 1px; }
    .chat-message.grouped .chat-msg-avatar { visibility: hidden; }

    .chat-msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--purple));
      color: white;
      font-size: 12px;
      font-weight: 800;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .chat-msg-body { flex: 1; min-width: 0; }

    .chat-msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }

    .chat-msg-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .chat-msg-time {
      font-size: 11px;
      color: var(--faint);
    }

    .chat-msg-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--faint);
      padding: 40px;
    }

    .chat-empty-icon {
      font-size: 40px;
      line-height: 1;
    }

    .chat-empty-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .chat-empty-sub {
      font-size: 13px;
      color: var(--faint);
    }

    .chat-input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-box {
      display: flex;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 8px 8px 8px 14px;
      align-items: flex-end;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .chat-input-box:focus-within {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(24, 121, 138, 0.12);
    }

    .chat-input-box textarea {
      flex: 1;
      border: none;
      background: none;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      outline: none;
      box-shadow: none;
      padding: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      font-family: inherit;
    }

    .chat-input-box textarea:focus {
      border: none;
      box-shadow: none;
    }

    .chat-send-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--r-md);
      background: var(--teal);
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background 0.12s, transform 0.1s;
      padding: 0;
      line-height: 1;
    }

    .chat-send-btn:hover { background: #136273; }
    .chat-send-btn:active { transform: scale(0.92); }
    .chat-send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .chat-input-hint {
      font-size: 11px;
      color: var(--faint);
      margin-top: 5px;
      padding-left: 2px;
    }

    .chat-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px;
      color: var(--faint);
      font-size: 13px;
    }

    .chat-nav-badge {

      align-items: center;
      justify-content: center;
      background: var(--red);

      height: 16px;
      padding: 0 4px;
      margin-left: 3px;

      .chat-channel-btn { flex-shrink: 0; width: auto; white-space: nowrap; margin: 0 2px; }
      .chat-header-desc { display: none; }
    }

    async function saveProfile() {
      const user = await getUser();
      if (!user) return alert("No user found.");

      const fullName = document.getElementById("full-name").value.trim();
      const roleId = document.getElementById("role-id").value;
      if (!fullName || !roleId) return alert("Please fill out your name and choose your role.");

      const selectedRole = ROLE_OPTIONS.find(role => role.id === roleId);
      const { data: existingClaim, error: claimError } = await supabaseClient
        .from("profiles")
        .select("id,full_name,email")
        .eq("role_id", roleId)
        .neq("id", user.id)
        .maybeSingle();

      if (claimError) {
        console.error("Role claim check error:", claimError);
        return alert("Could not check that role. Try again.");
      }

      if (existingClaim) {
        return alert(`That role is already claimed by ${existingClaim.full_name || existingClaim.email || "another organizer"}.`);
      }

      const { error } = await supabaseClient
        .from("profiles")
        .upsert({
          id: user.id,
          full_name: fullName,
          email: user.email,
          role_id: roleId,
          team: selectedRole ? selectedRole.team : null,
          updated_at: new Date().toISOString()
        });

      if (error) {
        console.error("Profile save error:", error);
        return alert(error.message);
      }

      location.reload();
    }

    async function submitRoleApplication(event) {
      event.preventDefault();
      const roleId = document.getElementById("application-role-id").value;
      const contactEmail = document.getElementById("application-contact-email").value.trim();
      const phone = document.getElementById("application-phone").value.trim();
      const responses = collectApplicationResponses();
      const fullName = String(responses.name || "").trim();
      const experience = String(responses.build_case || responses.delivered_well || "").trim();
      const availability = String(responses.weekly_commitments || responses.peak_weeks || "").trim();
      const selectedRoles = Array.isArray(responses.interested_roles) ? responses.interested_roles : [];
      const missingRequired = APPLICATION_QUESTIONS.filter(question => {
        if (!question.required) return false;
        const answer = responses[question.id];
        return Array.isArray(answer) ? answer.length === 0 : !String(answer || "").trim();
      });

      if (!roleId || !contactEmail || !fullName || missingRequired.length) {
        return alert("Please fill out all required application questions.");
      }

      const { error } = await supabaseClient
        .from("role_applications")
        .insert({
          role_id: roleId,
          full_name: fullName,
          email: contactEmail,
          phone,
          experience,
          availability,
          selected_roles: selectedRoles,
          responses,
          status: "pending"
        });

      if (error) {
        console.error("Application submit error:", error);
        return alert(error.message);
      }

      alert("Application submitted. Leadership will review it.");
      APP_STATE.applicationRoleId = null;
      APP_STATE.view = "dashboard";
      renderApp();
    }

    async function updateApplicationStatus(applicationId, status) {
      const user = await getUser();
      const profile = user ? await getProfile(user.id) : null;
      if (!profile?.is_admin) return alert("Only admins can review applications.");

      const reviewNotes = document.getElementById(`review-notes-${applicationId}`)?.value.trim() || "";
      const { data: application, error: fetchError } = await supabaseClient
        .from("role_applications")
        .select("*")
        .eq("id", applicationId)
        .maybeSingle();

      if (fetchError || !application) {
        console.error("Application fetch error:", fetchError);
        return alert("Could not find that application.");
      }

      if (status === "approved") {
        const applicationEmail = String(application.email || "").trim();
        const { data: existingClaim, error: claimError } = await supabaseClient
          .from("profiles")
          .select("id,full_name,email")
          .eq("role_id", application.role_id)
          .maybeSingle();

        if (claimError) {
          console.error("Role claim check error:", claimError);
          return alert("Could not check whether that role is already claimed.");
        }

        if (existingClaim && normalizeEmail(existingClaim.email) !== normalizeEmail(applicationEmail)) {
          return alert(`This role is already claimed by ${existingClaim.full_name || existingClaim.email}.`);
        }

        const { data: applicantProfile, error: applicantError } = await supabaseClient
          .from("profiles")
          .select("*")
          .ilike("email", applicationEmail)
          .maybeSingle();

        if (applicantError) {
          console.error("Applicant profile lookup error:", applicantError);
          return alert("Could not look up the applicant profile.");
        }

        if (!applicantProfile) {
          return alert("Application approved, but this person has not created an account yet. Ask them to sign up with the same email first, then approve again to assign the role.");
        }

        const selectedRole = ROLE_OPTIONS.find(role => role.id === application.role_id);
        const { data: assignedProfile, error: assignError } = await supabaseClient
          .from("profiles")
          .update({
            full_name: applicantProfile.full_name || application.full_name,
            role_id: application.role_id,
            team: selectedRole ? selectedRole.team : null,
            updated_at: new Date().toISOString()
          })
          .eq("id", applicantProfile.id)
          .select("id,email,role_id,team")
          .maybeSingle();

        if (assignError) {
          console.error("Role assignment error:", assignError);
          return alert(assignError.message);
        }

        if (!assignedProfile || assignedProfile.role_id !== application.role_id) {
          return alert("The application was found, but the role was not assigned. Re-run the Supabase admin profile policy, then try Approve again.");
        }
      }

      const { error } = await supabaseClient
        .from("role_applications")
        .update({
          status,
          review_notes: reviewNotes,
          reviewed_by: user.id,
          reviewed_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq("id", applicationId);

      if (error) {
        console.error("Application review error:", error);
        return alert(error.message);
      }

      if (status === "approved") {
        alert("Application approved and role assigned.");
      }

      renderApp();
    }

    async function functionErrorDetail(error) {
      const response = error?.context;
      if (!response) return error?.message || "";

      try {

        return json.error || JSON.stringify(json);

        }
      }

    async function startNfcRead(inputId = "tm-scan-nfc") {
      const input = document.getElementById(inputId);
      if (!input) return alert("NFC input field was not found.");

      if (!("NDEFReader" in window)) {
        return alert("This browser does not support Web NFC. Use a USB/Bluetooth NFC reader that types the tag value, or type the UID manually.");
      }

      if (window.location.protocol !== "https:" && window.location.protocol !== "http:" && window.location.protocol !== "file:") {
        return alert("NFC scanning requires a secure browser context.");
      }

      try {
        const reader = new NDEFReader();
        await reader.scan();
        setNfcStatus("Ready. Hold an NFC tag near the device.", "saving");

        reader.onreadingerror = () => {
          setNfcStatus("Could not read that tag. Try again.", "offline");
        };

        reader.onreading = event => {
          const tagValue = event.serialNumber || firstNdefRecordText(event.message) || "";
          if (!tagValue) {
            setNfcStatus("Tag read, but no serial/text value was available.", "offline");
            return;
          }

          input.value = tagValue;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          setNfcStatus(`Tag captured: ${tagValue}`, "saved");
        };
      } catch (error) {
        console.error("NFC read error:", error);
        setNfcStatus(error.message || "Could not start NFC reader.", "offline");
      }
    }

    function firstNdefRecordText(message) {
      const record = message?.records?.[0];
      if (!record?.data) return "";

      try {
        return new TextDecoder(record.encoding || "utf-8").decode(record.data);
      } catch (_) {
        return "";
      }
    }

    function setNfcStatus(message, mode = "saved") {
      const target = document.getElementById("tm-nfc-status");
      if (!target) return;
      target.textContent = message;
      target.className = `save-status ${mode}`;
    }

    function rowsToProgressMap(rows) {
      return rows.reduce((map, row) => {
        map[row.phase] = {
          data: row.data || { checks: [], notes: "" },
          percent_complete: row.percent_complete || 0,
          updated_at: row.updated_at
        };
        return map;
      }, {});
    }

    function getPhaseProgress(phaseId) {
      return APP_STATE.progress[phaseId] || {
        data: { checks: [], notes: "" },
        percent_complete: 0,
        updated_at: null
      };
    }

    function calculatePhasePercent(workbook, phaseId, phaseData) {
      const checklist = getPhaseChecklist(workbook.phases[phaseId]);
      if (!checklist.length) return 0;
      const checks = phaseData.checks || [];
      const completed = checklist.filter((_, index) => checks[index]).length;
      return Math.round((completed / checklist.length) * 100);
    }

    function getPhaseChecklist(phase) {
      return phase?.checklist || phase?.deliverables || [];
    }

    function calculateOverallPercent(workbook, progressMap) {
      const phaseIds = Object.keys(workbook.phases);
      if (!phaseIds.length) return 0;

      const total = phaseIds.reduce((sum, phaseId) => {
        const stored = progressMap[phaseId] || { data: { checks: [] } };
        return sum + calculatePhasePercent(workbook, phaseId, stored.data || {});
      }, 0);

      return Math.round(total / phaseIds.length);
    }

      const profile = await getProfile(user.id);
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const phaseState = getPhaseProgress(phaseId);
      const percent = calculatePhasePercent(workbook, phaseId, phaseState.data);

      setSaveStatus("Saving...");

      const { error } = await supabaseClient
        .from("workbook_progress")
        .upsert({
          user_id: user.id,
          phase: phaseId,
          data: phaseState.data,
          percent_complete: percent,
          updated_at: new Date().toISOString()
        }, { onConflict: "user_id,phase" });

      if (error) {
        console.error("Progress save error:", error);
        setSaveStatus("Could not save. Check Supabase table setup.");
        return;
      }

      APP_STATE.progress[phaseId].percent_complete = percent;
      APP_STATE.progress[phaseId].updated_at = new Date().toISOString();
      updateVisibleProgress(workbook);
      setSaveStatus("Saved");
    }

    function queueSave(phaseId) {
      clearTimeout(APP_STATE.saveTimers[phaseId]);
      setSaveStatus("Saving...");
      APP_STATE.saveTimers[phaseId] = setTimeout(() => saveWorkbookPhase(phaseId), 650);
    }

    function updateChecklist(phaseId, index, checked) {
      const phaseState = getPhaseProgress(phaseId);
      const checks = [...(phaseState.data.checks || [])];
      checks[index] = checked;
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, checks }
      };
      queueSave(phaseId);
    }

    function updateNotes(phaseId, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: { ...phaseState.data, notes: value }
      };
      queueSave(phaseId);
    }

    function updateField(phaseId, key, value) {
      const phaseState = getPhaseProgress(phaseId);
      APP_STATE.progress[phaseId] = {
        ...phaseState,
        data: {
          ...phaseState.data,
          fields: {
            ...(phaseState.data.fields || {}),
            [key]: value
          }
        }
      };
      queueSave(phaseId);
    }

    function savedField(phaseId, key) {
      return getPhaseProgress(phaseId).data.fields?.[key] || "";
    }

    function updateVisibleProgress(workbook) {
      const overall = calculateOverallPercent(workbook, APP_STATE.progress);
      const overallText = document.getElementById("overall-percent");
      const overallFill = document.getElementById("overall-fill");
      const phaseText = document.getElementById("phase-percent");
      const phaseFill = document.getElementById("phase-fill");
      const phaseState = getPhaseProgress(APP_STATE.activePhase);

      if (overallText) overallText.textContent = `${overall}% complete`;
      if (overallFill) overallFill.style.width = `${overall}%`;
      if (phaseText) phaseText.textContent = `${phaseState.percent_complete || 0}% complete`;
      if (phaseFill) phaseFill.style.width = `${phaseState.percent_complete || 0}%`;
    }

    function applicationQuestionsForRows(rows = []) {

    function renderApplicationQuestions(questions, selectedRoleId) {
      let currentSection = "";
      return questions.map(question => {
        const sectionHeading = question.section !== currentSection
          ? `<div class="panel phase-panel" style="margin:12px 0 0;padding:18px;--phase-color:${sectionColor(question.section)};"><h2>${escapeHtml(question.section)}</h2>${question.section === "Positions" ? `<p>You will have priority to remain in your current position, then your committee, if a seat is available.</p>` : ""}</div>`
          : "";
        currentSection = question.section;
        return `${sectionHeading}${renderApplicationQuestion(question, selectedRoleId)}`;
      }).join("");
    }

    function renderApplicationQuestion(question, selectedRoleId) {
      const requiredMark = question.required ? " *" : "";
      const name = answerInputName(question.id);
      const selectedRoleLabel = selectedRoleId ? formatRole(selectedRoleId) : "";
      const options = question.id === "interested_roles"
        ? question.options.map(option => ({ value: option, checked: selectedRoleLabel && option.includes(selectedRoleLabel) }))
        : (question.options || []).map(option => ({ value: option, checked: false }));

      if (question.type === "text") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <input data-application-field="${question.id}" name="${name}" placeholder="Your answer" />
          </div>
        `;
      }

      if (question.type === "textarea") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <textarea data-application-field="${question.id}" name="${name}" placeholder="Your answer"></textarea>
          </div>
        `;
      }

      if (question.type === "radio") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <div class="option-list">
              ${options.map((option, index) => `
                <label class="option-row">
                  <input data-application-field="${question.id}" type="radio" name="${name}" value="${escapeHtml(option.value)}" ${index === 0 && question.options?.length === 1 ? "checked" : ""}>
                  <span>${escapeHtml(option.value)}</span>
                </label>
              `).join("")}
            </div>
          </div>
        `;
      }

      if (question.type === "checkbox") {
        return `
          <div class="application-question">
            <div class="label">${escapeHtml(question.label)}${requiredMark}</div>
            <div class="option-list">
              ${options.map(option => `
                <label class="option-row">
                  <input data-application-field="${question.id}" type="checkbox" name="${name}" value="${escapeHtml(option.value)}" ${option.checked ? "checked" : ""}>
                  <span>${escapeHtml(option.value)}</span>
                </label>
              `).join("")}
            </div>
          </div>
        `;
      }

      return "";
    }

    function collectApplicationResponses() {
      return APPLICATION_QUESTIONS.reduce((responses, question) => {
        const fields = Array.from(document.querySelectorAll(`[data-application-field="${question.id}"]`));
        if (question.type === "checkbox") {
          responses[question.id] = fields.filter(field => field.checked).map(field => field.value);
        } else if (question.type === "radio") {
          responses[question.id] = fields.find(field => field.checked)?.value || "";
        } else {
          responses[question.id] = fields[0]?.value.trim() || "";
        }
        return responses;
      }, {});
    }

    function answerInputName(questionId) {
      return `application-${fieldKey(questionId)}`;

    function sectionColor(section) {
      if (section === "Commitments") return "#f472b6";
      if (section === "About You") return "#22d3ee";
      if (section === "The Real Stuff") return "#facc15";
      if (section === "Positions") return "#34d399";
      return "#38bdf8";

    function calculateTeamStats(rows, progressRows) {
      const progressByUser = groupProgressByUser(progressRows);
      const totalOrganizers = rows.length;
      const activeOrganizers = rows.filter(row => row.claimed).length;
      const teamCount = new Set(rows.map(row => row.team).filter(Boolean)).size;
      const averageProgress = totalOrganizers
        ? Math.round(rows.reduce((sum, row) => {
          const workbook = WORKBOOKS[row.role_id] || WORKBOOKS.default;
          return sum + calculateOverallPercent(workbook, rowsToProgressMap(progressByUser[row.profile_id] || []));
        }, 0) / totalOrganizers)
        : 0;

      return { totalOrganizers, activeOrganizers, teamCount, averageProgress };
    }

    function groupProgressByUser(progressRows) {
      return progressRows.reduce((map, row) => {
        if (!map[row.user_id]) map[row.user_id] = [];
        map[row.user_id].push(row);
        return map;
      }, {});
    }

    function buildRoleDirectoryRows(profiles = []) {
      const profilesByRole = profiles.reduce((map, profile) => {
        if (profile.role_id && !map[profile.role_id]) map[profile.role_id] = profile;
        return map;
      }, {});

      return ROLE_OPTIONS.map(role => {
        const claim = profilesByRole[role.id];
        const workbook = WORKBOOKS[role.id] || WORKBOOKS.default;
        return {
          id: claim?.id || `role-${role.id}`,
          profile_id: claim?.id || null,
          full_name: claim?.full_name || "",
          email: claim?.email || "",
          role_id: role.id,
          team: claim?.team || role.team,
          start_phase: workbook.startPhase || firstPhaseForRole(role.id),
          task_preview: getRoleTaskPreview(role.id),
          updated_at: claim?.updated_at || null,
          claimed: !!claim
        };
      });
    }

    function firstPhaseForRole(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      return Object.keys(workbook.phases || {})[0] || "foundations";
    }

    function getRoleTaskPreview(roleId) {
      const workbook = WORKBOOKS[roleId] || WORKBOOKS.default;
      const startPhase = workbook.startPhase || firstPhaseForRole(roleId);
      const phase = workbook.phases?.[startPhase] || Object.values(workbook.phases || {})[0] || {};
      const tasks = phase.responsibilities || phase.deliverables || phase.checklist || [];
      return tasks.slice(0, 3);
    }

    function rolesStartingInPhase(phaseId) {
      return ROLE_OPTIONS.filter(role => {
        const workbook = WORKBOOKS[role.id] || WORKBOOKS.default;
        return (workbook.startPhase || firstPhaseForRole(role.id)) === phaseId;
      });
    }

    function generateStars(count) {
      const stars = [];
      for (let i = 0; i < count; i++) {
        const x = (Math.random() * 100).toFixed(2);
        const y = (Math.random() * 100).toFixed(2);
        const r = Math.random() < 0.7 ? 0.8 : Math.random() < 0.5 ? 1.3 : 1.8;
        const op = (0.25 + Math.random() * 0.75).toFixed(2);
        stars.push(`<circle cx="${x}%" cy="${y}%" r="${r}" fill="white" opacity="${op}"/>`);
      }
      // A few colored stars
      const colors = ["#93c5fd","#c4b5fd","#fde68a","#6ee7b7"];
      for (let i = 0; i < 12; i++) {
        const x = (Math.random() * 100).toFixed(2);
        const y = (Math.random() * 100).toFixed(2);
        const c = colors[Math.floor(Math.random() * colors.length)];
        stars.push(`<circle cx="${x}%" cy="${y}%" r="1.5" fill="${c}" opacity="0.9"/>`);
      }
      return stars.join("");
    }

        ];

        return [
          { label: "Profile", title: "Apply for a role", body: "Submit an application for an open organizer role to unlock your dashboard, workbook, and team tools.", cta: "Apply for a Role", onclick: "openApply()", primary: true },
          { label: "Explore", title: "Review team pages", body: "Use team pages to understand open seats, start phases, and expectations.", cta: "View Team Pages", onclick: "openTeamPages()" },

        { label: "Workbook", title: overall >= 100 ? "Workbook complete" : "Update your workbook", body: overall >= 100 ? "Your workbook is fully checked off. Keep notes fresh as planning changes." : `Your workbook is ${overall}% complete. Add notes and check off current phase deliverables.`, cta: "Open Workbook", onclick: "openWorkbook()", primary: true },

        actions.push({
          label: "Deadline",
          title: nextDeadline.title,
          body: `${deadlineTiming(nextDeadline).label}. Owner: ${nextDeadline.owner_label || "All Teams"}.`,

          onclick: "openCalendar()"

      return actions;

    function renderWorkbook(profile) {
      const workbook = WORKBOOKS[profile.role_id] || WORKBOOKS.default;
      const visiblePhases = Object.keys(workbook.phases);
      if (!workbook.phases[APP_STATE.activePhase]) {
        APP_STATE.activePhase = visiblePhases[0];
      }
      const phase = workbook.phases[APP_STATE.activePhase];
      const phaseMeta = PHASES[APP_STATE.activePhase] || { label: APP_STATE.activePhase, title: APP_STATE.activePhase, dates: "" };
      const phaseState = getPhaseProgress(APP_STATE.activePhase);
      const checks = phaseState.data.checks || [];
      const notes = phaseState.data.notes || "";
      const checklist = getPhaseChecklist(phase);
      const overallPercent = calculateOverallPercent(workbook, APP_STATE.progress);
      const phasePercent = calculatePhasePercent(workbook, APP_STATE.activePhase, phaseState.data);
      const activePhaseStyle = `--phase-color:${phaseColor(APP_STATE.activePhase)};--phase-gradient:${phaseGradient(APP_STATE.activePhase)}`;

      return `
        <div class="dashboard-shell">
          <div class="topbar">
            <div>
              <h1>${workbook.title}</h1>
              <p>${workbook.team} Team - ${profile.full_name || ""}</p>
            </div>
            <button class="ghost" onclick="goDashboard()">Back to Dashboard</button>
          </div>

          <div class="panel">
            <div class="phase-header">
              <div>
                <h2>Workbook</h2>
                <p>${workbook.description}</p>
              </div>
              <div class="phase-chip" style="${activePhaseStyle}">Role: ${formatRole(profile.role_id)}</div>
            </div>

            <div class="grid">
              <div class="stat">
                <div class="stat-title">Overall Progress</div>
                <div id="overall-percent" class="stat-value">${overallPercent}% complete</div>
                <div class="progress-track"><div id="overall-fill" class="progress-fill" style="width:${overallPercent}%"></div></div>
              </div>
              <div class="stat">
                <div class="stat-title">Current Phase</div>
                <div id="phase-percent" class="stat-value">${phasePercent}% complete</div>
                <div class="progress-track"><div id="phase-fill" class="progress-fill" style="width:${phasePercent}%"></div></div>
              </div>
            </div>

            <div class="tabs">
              ${visiblePhases.map(phaseId => `
                <button class="tab-btn ${APP_STATE.activePhase === phaseId ? "active" : ""}" style="--phase-color:${phaseColor(phaseId)};--phase-gradient:${phaseGradient(phaseId)}" onclick="setPhase('${phaseId}')">
                  ${(PHASES[phaseId] || { label: phaseId }).label}
                </button>
              `).join("")}
            </div>

            <div class="panel phase-panel" style="margin-bottom:0; padding:20px; ${activePhaseStyle}">
              <div class="phase-header">
                <div>
                  <h3>${phaseMeta.title}</h3>
                  <p>${phase.focus}</p>
                </div>
                <div class="phase-chip">${phaseMeta.dates}</div>
              </div>

              ${phase.responsibilities?.length ? `
                <div class="label">Key Responsibilities</div>
                <div class="stack" style="margin-top:0;margin-bottom:18px;">
                  ${phase.responsibilities.map(item => `
                    <div class="check-row">
                      <span>${escapeHtml(item)}</span>
                    </div>
                  `).join("")}
                </div>
              ` : ""}

              <div class="label">Deliverables Checklist</div>
              ${checklist.map((item, index) => `
                <label class="check-row">
                  <input type="checkbox" ${checks[index] ? "checked" : ""} onchange="updateChecklist('${APP_STATE.activePhase}', ${index}, this.checked)" />
                  <span>${escapeHtml(item)}</span>
                </label>
              `).join("")}

              ${renderPhaseFrameworks(phase)}
              ${renderWeeklyPlan(phase)}
              ${renderReflectionPrompts(phase)}
              ${renderRiskList(phase)}

              <div style="margin-top:18px;">
                <div class="label">Notes</div>
                <textarea placeholder="Write your phase notes here..." oninput="updateNotes('${APP_STATE.activePhase}', this.value)">${escapeHtml(notes)}</textarea>
              </div>
              <div id="save-status" class="save-status">Autosave is ready.</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPhaseFrameworks(phase) {
      if (!phase.frameworks?.length) return "";

      return phase.frameworks.map((framework, frameworkIndex) => {
        if (framework.type === "table") {
          return `
            <div style="margin-top:22px;">
              <div class="label">${escapeHtml(framework.title)}</div>
              <table class="list-table">
                <thead>
                  <tr>${framework.columns.map(column => `<th>${escapeHtml(column)}</th>`).join("")}</tr>
                </thead>
                <tbody>
                  ${Array.from({ length: framework.rows || 4 }, (_, rowIndex) => `
                    <tr>
                      ${framework.columns.map((_, columnIndex) => {
                        const key = fieldKey("framework", frameworkIndex, rowIndex, columnIndex);
                        return `<td><textarea style="min-height:56px;" oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea></td>`;
                      }).join("")}
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          `;
        }

        if (framework.type === "grid2") {
          const sides = [framework.left, framework.right].filter(Boolean);
          return `
            <div style="margin-top:22px;">
              <div class="label">${escapeHtml(framework.title)}</div>
              <div class="grid">
                ${sides.map((side, sideIndex) => `
                  <div class="stat">
                    <h3>${escapeHtml(side.label)}</h3>
                    <div class="stack">
                      ${(side.prompts || []).map((prompt, promptIndex) => {
                        const key = fieldKey("framework", frameworkIndex, sideIndex, promptIndex);
                        return `
                          <div>
                            <p>${escapeHtml(prompt)}</p>
                            <textarea style="min-height:74px;" oninput="updateField('${APP_STATE.activePhase}', '${key}', this.value)">${escapeHtml(savedField(APP_STATE.activePhase, key))}</textarea>
                          </div>
                        `;
                      }).join("")}
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>
          `;
        }

        return "";
      }).join("");
    }

    function renderWeeklyPlan(phase) {
      if (!phase.weeklyPlan?.length) return "";

      return `
        <div style="margin-top:22px;">
          <div class="label">Weekly Planning Grid</div>
          <div class="stack" style="margin-top:0;">

    function buildTeamReadinessRows(rows, progressByUser) {
      return Object.entries(groupRowsByTeam(rows)).map(([team, teamRows]) => {
        const claimed = teamRows.filter(row => row.claimed).length;
        const open = teamRows.length - claimed;
        const progress = calculateTeamProgress(teamRows, progressByUser);
        return {
          name: team,
          total: teamRows.length,
          claimed,
          open,
          progress,
          starts: teamStartSummary(teamRows)
        };
      }).sort((a, b) => {
        if (b.open !== a.open) return b.open - a.open;
        return a.progress - b.progress;
      });
    }
