    function groupRowsByTeam(rows) {
      return rows.reduce((map, row) => {
        const team = row.team || "Unassigned";
        if (!map[team]) map[team] = [];
        map[team].push(row);
        return map;
      }, {});
    }

    function teamStartSummary(rows) {
      const phases = [...new Set(rows.map(row => row.start_phase || firstPhaseForRole(row.role_id)))];
      return phases.map(formatPhase).join(", ");
    }

    function calculateTeamProgress(rows, progressByUser) {
      if (!rows.length) return 0;
      return Math.round(rows.reduce((sum, row) => {
        const workbook = WORKBOOKS[row.role_id] || WORKBOOKS.default;
        return sum + calculateOverallPercent(workbook, rowsToProgressMap(progressByUser[row.profile_id] || []));
      }, 0) / rows.length);
    }

    function teamRelevantDeadlines(team) {
      return (APP_STATE.currentDeadlines || CALENDAR_DEADLINES).filter(deadline => {
        const owner = String(deadline.owner_label || "All Teams").toLowerCase();
        return owner === "all teams" || owner.includes(String(team || "").toLowerCase());
      });
    }

    function downloadIcsFile(deadlines, filename) {
      const content = buildIcsCalendar(deadlines);
      const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function buildIcsCalendar(deadlines) {
      const now = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z");
      const events = deadlines.map(deadline => {
        const start = compactDate(deadline.due_date);
        const end = compactDate(addDaysIso(deadline.due_date, 1));
        const uid = `${deadline.id || slugify(deadline.title)}@mist-dallas-portal`;
        return [
          "BEGIN:VEVENT",
          `UID:${escapeIcs(uid)}`,
          `DTSTAMP:${now}`,
          `DTSTART;VALUE=DATE:${start}`,
          `DTEND;VALUE=DATE:${end}`,
          `SUMMARY:${escapeIcs(`MIST Dallas: ${deadline.title}`)}`,
          `DESCRIPTION:${escapeIcs(`${deadline.detail || ""}\\n\\nPhase: ${formatPhase(deadline.phase)}\\nPortal: ${window.location.href.split("?")[0]}`)}`,
          "END:VEVENT"
        ].join("\r\n");
      }).join("\r\n");

      return [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//MIST Dallas//Organizer Portal//EN",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        events,
        "END:VCALENDAR"
      ].join("\r\n");
    }

    function googleCalendarUrl(deadline) {
      const start = compactDate(deadline.due_date);
      const end = compactDate(addDaysIso(deadline.due_date, 1));
      const params = new URLSearchParams({
        action: "TEMPLATE",
        text: `MIST Dallas: ${deadline.title}`,
        dates: `${start}/${end}`,
        details: `${deadline.detail || ""}\n\nPhase: ${formatPhase(deadline.phase)}\nPortal: ${window.location.href.split("?")[0]}`
      });
      return `https://calendar.google.com/calendar/render?${params.toString()}`;
    }

    function findCurrentDeadline(deadlineId) {
      return (APP_STATE.currentDeadlines || []).find(deadline => String(deadline.id) === String(deadlineId));
    }

    function compactDate(value) {
      if (!value) return "";
      return String(value).replace(/-/g, "");
    }

    function addDaysIso(value, days) {
      const date = new Date(`${value}T12:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function escapeIcs(value) {
      return String(value || "")
        .replace(/\\/g, "\\\\")
        .replace(/\r?\n/g, "\\n")
        .replace(/,/g, "\\,")
        .replace(/;/g, "\\;");
    }

    function slugify(value) {
      return String(value || "mist-dallas-deadline")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "")
        .slice(0, 80) || "mist-dallas-deadline";
    }

    function upcomingDeadlines(deadlines, limit = 5) {
      return [...(deadlines || [])]
        .filter(item => deadlineDate(item))

    function deadlineDate(item) {
      if (!item?.due_date) return null;
      const date = new Date(`${item.due_date}T12:00:00`);

    function deadlineTiming(item) {
      const due = deadlineDate(item);
      if (!due) return { label: "No date", isOverdue: false, daysAway: null };

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      due.setHours(0, 0, 0, 0);
      const daysAway = Math.round((due - today) / 86400000);

      if (daysAway < 0) return { label: `${Math.abs(daysAway)} day${Math.abs(daysAway) === 1 ? "" : "s"} overdue`, isOverdue: true, daysAway };
      if (daysAway === 0) return { label: "Due today", isOverdue: false, daysAway };
      if (daysAway === 1) return { label: "Due tomorrow", isOverdue: false, daysAway };
      return { label: `${daysAway} days away`, isOverdue: false, daysAway };

    function formatBlockTime(block) {
      if (!block) return "";
      const date = block.block_date ? formatDeadlineDate(block.block_date) : "No date";
      const start = String(block.starts_at || "").slice(0, 5);
      const end = String(block.ends_at || "").slice(0, 5);
      return `${date} ${start}${end ? `-${end}` : ""}`.trim();
    }

    function detectTournamentConflicts(rooms, availability, blocks, assignments) {
      const conflicts = [];

      blocks.forEach(block => {
        const room = rooms.find(item => item.id === block.room_id);
        const blockAssignments = assignments.filter(item => item.competition_block_id === block.id);

        if (!block.room_id) {
          conflicts.push({
            type: "room",
            severity: "medium",
            title: `${block.competition_name} has no room`,
            detail: `${formatBlockTime(block)} needs a room assignment.`
          });
        }

        if (room && Number(block.capacity || 0) > Number(room.capacity || 0) && Number(room.capacity || 0) > 0) {
          conflicts.push({
            type: "capacity",
            severity: "high",
            title: `${block.competition_name} exceeds room capacity`,
            detail: `${room.room_name} holds ${room.capacity}; block capacity is ${block.capacity}.`
          });
        }

        if (Number(block.capacity || 0) > 0 && blockAssignments.length > Number(block.capacity || 0)) {
          conflicts.push({
            type: "roster",
            severity: "high",
            title: `${block.competition_name} roster exceeds block capacity`,
            detail: `${blockAssignments.length} assigned; capacity is ${block.capacity}.`
          });
        }

        const matchingWindows = availability.filter(item =>
          item.room_id === block.room_id
            && item.available_date === block.block_date
            && String(item.starts_at).slice(0,5) <= String(block.starts_at).slice(0,5)
            && String(item.ends_at).slice(0,5) >= String(block.ends_at).slice(0,5)
        );

        if (block.room_id && !matchingWindows.length) {
          conflicts.push({
            type: "availability",
            severity: "medium",
            title: `${block.competition_name} is outside room availability`,
            detail: `${formatBlockTime(block)} does not match a saved availability window.`
          });
        }
      });

      blocks.forEach((block, index) => {
        blocks.slice(index + 1).forEach(other => {
          if (!block.room_id || block.room_id !== other.room_id || block.block_date !== other.block_date) return;
          if (timeRangesOverlap(block.starts_at, block.ends_at, other.starts_at, other.ends_at)) {
            const room = rooms.find(item => item.id === block.room_id);
            conflicts.push({
              type: "double-booked",
              severity: "high",
              title: `${room?.room_name || "Room"} double-booked`,
              detail: `${block.competition_name} overlaps ${other.competition_name} on ${formatBlockTime(block)}.`
            });
          }
        });
      });

      return conflicts;
    }

    function timeRangesOverlap(startA, endA, startB, endB) {
      const aStart = minutesFromTime(startA);
      const aEnd = minutesFromTime(endA);
      const bStart = minutesFromTime(startB);
      const bEnd = minutesFromTime(endB);
      return aStart < bEnd && bStart < aEnd;
    }

    function minutesFromTime(value) {
      const [hours, minutes] = String(value || "00:00").split(":").map(Number);
      return (hours || 0) * 60 + (minutes || 0);
    }

    function parseFeedbackText(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      const firstLine = trimmed.split(/\r?\n/).find(line => line.trim()) || "";
      const rows = firstLine.includes("\t") ? parseDelimited(trimmed, "\t") : parseCsv(trimmed);
      if (rows.length < 2) return [];
      const headers = rows[0].map(header => String(header || "").trim());

      return rows.slice(1)
        .map(row => sanitizeFeedbackRow(headers, row))
        .filter(Boolean);
    }

    function parseDelimited(text, delimiter) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === '"' && insideQuotes && next === '"') {
          value += '"';
          index += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === delimiter && !insideQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(value);
          if (row.some(cell => String(cell || "").trim())) rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      row.push(value);
      if (row.some(cell => String(cell || "").trim())) rows.push(row);
      return rows;
    }

    function sanitizeFeedbackRow(headers, row) {
      const byHeader = {};
      headers.forEach((header, index) => {
        byHeader[header] = row[index] || "";
        byHeader[normalizeHeader(header)] = row[index] || "";
      });

      const timestamp = feedbackValue(byHeader, ["Timestamp"]);
      const year = feedbackYear(timestamp);
      const role = feedbackValue(byHeader, ["Role"]) || "Unknown";
      const scores = {};

      FEEDBACK_NUMERIC_FIELDS.forEach(field => {
        const score = toFeedbackScore(feedbackValue(byHeader, field.headers));
        if (score !== null) scores[field.key] = score;
      });

      const openText = FEEDBACK_TEXT_FIELDS
        .map(field => feedbackValue(byHeader, [field]))
        .filter(Boolean)
        .join(" ");
      const themes = detectFeedbackThemes(openText);
      const hasSignal = timestamp || role !== "Unknown" || Object.keys(scores).length || Object.keys(themes).length;

      if (!hasSignal) return null;
      return {
        timestamp: timestamp || "",
        year,
        role: cleanFeedbackLabel(role, "Unknown"),
        scores,
        themes
      };
    }

    function feedbackValue(row, labels) {
      for (const label of labels) {
        if (row[label] !== undefined && String(row[label]).trim()) return String(row[label]).trim();
        const normalized = normalizeHeader(label);
        if (row[normalized] !== undefined && String(row[normalized]).trim()) return String(row[normalized]).trim();
      }
      return "";
    }

    function feedbackYear(value) {
      const text = String(value || "").trim();
      const match = text.match(/\b(20\d{2})\b/);
      if (match) return match[1];
      const date = new Date(text);
      return Number.isFinite(date.getTime()) ? String(date.getFullYear()) : "Unknown";
    }

    function cleanFeedbackLabel(value, fallback = "Unknown") {
      const text = String(value || "").trim();
      if (!text) return fallback;
      return text.slice(0, 60);
    }

    function toFeedbackScore(value) {
      const text = String(value || "").trim();
      if (!text) return null;
      const match = text.match(/-?\d+(\.\d+)?/);
      if (!match) return null;
      const number = Number(match[0]);
      if (!Number.isFinite(number) || number < 0 || number > 5) return null;
      return number;
    }

    function detectFeedbackThemes(text) {
      const lowered = String(text || "").toLowerCase();
      const themes = {};
      if (!lowered.trim()) return themes;

      FEEDBACK_THEME_KEYWORDS.forEach(theme => {
        const matched = theme.words.some(word => lowered.includes(word.toLowerCase()));
        if (matched) themes[theme.id] = 1;
      });

      return themes;
    }

    function buildFeedbackAnalytics(records) {
      const safeRecords = Array.isArray(records) ? records : [];
      const roleCounts = {};
      const yearBuckets = {};
      const categoryAverages = [];
      const themeCounts = FEEDBACK_THEME_KEYWORDS.map(theme => ({ ...theme, count: 0 }));
      let lowScoreCount = 0;

      safeRecords.forEach(record => {
        const role = cleanFeedbackLabel(record.role, "Unknown");
        roleCounts[role] = (roleCounts[role] || 0) + 1;

        const year = record.year || "Unknown";
        if (!yearBuckets[year]) yearBuckets[year] = { count: 0, overallScores: [] };
        yearBuckets[year].count += 1;
        if (record.scores?.overall !== undefined) {
          yearBuckets[year].overallScores.push(record.scores.overall);
          if (record.scores.overall <= 2) lowScoreCount += 1;
        }

        themeCounts.forEach(theme => {
          if (record.themes?.[theme.id]) theme.count += 1;
        });
      });

      FEEDBACK_NUMERIC_FIELDS.forEach(field => {
        const values = safeRecords
          .map(record => record.scores?.[field.key])
          .filter(value => Number.isFinite(value));
        if (values.length) {
          categoryAverages.push({
            key: field.key,
            label: field.label,
            average: average(values),
            count: values.length
          });
        }
      });

      const yearStats = Object.fromEntries(Object.entries(yearBuckets).map(([year, item]) => [
        year,
        {
          count: item.count,
          averageOverall: average(item.overallScores)
        }
      ]));
      const years = Object.keys(yearStats).filter(year => year !== "Unknown").sort();
      const communicationValues = [
        ...safeRecords.map(record => record.scores?.comm_before).filter(Number.isFinite),
        ...safeRecords.map(record => record.scores?.comm_during).filter(Number.isFinite)
      ];

      return {
        responseCount: safeRecords.length,
        avgOverall: average(safeRecords.map(record => record.scores?.overall).filter(Number.isFinite)),
        avgRecommend: average(safeRecords.map(record => record.scores?.recommend).filter(Number.isFinite)),
        avgCommunication: average(communicationValues),
        lowScoreCount,
        roleCounts,
        yearStats,
        yearRange: years.length ? `${years[0]}-${years[years.length - 1]}` : "",
        categoryAverages: categoryAverages.sort((a, b) => a.average - b.average),
        themeCounts: themeCounts.sort((a, b) => b.count - a.count)
      };
    }

    function average(values) {
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function formatScore(value) {
      return Number.isFinite(value) ? `${value.toFixed(2)} / 5` : "No data";
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === '"' && insideQuotes && next === '"') {
          value += '"';
          index += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(value);
          if (row.some(cell => cell.trim())) rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      row.push(value);
      if (row.some(cell => cell.trim())) rows.push(row);
      return rows;
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function downloadCsv(filename, rows) {
      const content = rows.map(row => row.map(csvEscape).join(",")).join("\n");
      const blob = new Blob([content], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function loadMessages(channel) {
      const { data, error } = await supabaseClient
        .from("messages")
        .select("*")
        .eq("channel", channel)
        .order("created_at", { ascending: true })
        .limit(200);
      if (error) {
        console.error("loadMessages:", error);
        MSG_STATE.tableError = true;
        return [];
      }
      MSG_STATE.tableError = false;
      return data || [];
    }

    async function sendMessage() {
      const ta = document.getElementById("chat-input");
      if (!ta) return;
      const body = ta.value.trim();
      if (!body) return;

      const user = MSG_STATE.currentUser;
      const profile = MSG_STATE.currentProfile;
      if (!user) return;

      const userName = profile?.full_name || user.email?.split("@")[0] || "Organizer";

      ta.value = "";
      ta.style.height = "auto";
      updateSendBtn();

      const { error } = await supabaseClient.from("messages").insert({
        channel: MSG_STATE.channel,
        user_id: user.id,
        user_name: userName,
        body,
      });

      if (error) {
        alert("Failed to send: " + (error.message || "unknown error"));
        ta.value = body;
        updateSendBtn();
      }
    }

    function subscribeMessages(channel, onNew) {
      if (MSG_STATE.subscription) {
        supabaseClient.removeChannel(MSG_STATE.subscription);
        MSG_STATE.subscription = null;
      }
      const sub = supabaseClient
        .channel("chat-" + channel)
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "messages", filter: `channel=eq.${channel}` },
          (payload) => { onNew(payload.new); }
        )
        .subscribe((status, err) => {
          if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || err) {
            const banner = document.getElementById("chat-realtime-banner");
            if (banner) {
              banner.style.display = "flex";
              banner.textContent = "⚠️ Live updates unavailable — the messages table may not be set up yet. Run the SQL setup in your Supabase dashboard, then refresh.";
            }
          }
        });
      MSG_STATE.subscription = sub;
    }

    function formatMsgTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diffMs = now - d;
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffDays === 0) {
        return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      } else if (diffDays === 1) {
        return "Yesterday " + d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      } else {
        return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
               d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      }
    }

    function getMsgDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const diffDays = Math.round((today - msgDay) / 86400000);
      if (diffDays === 0) return "Today";
      if (diffDays === 1) return "Yesterday";
      return d.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
    }

    function getAvatarColor(name) {
      const colors = [
        "linear-gradient(135deg,#18798a,#1c6b43)",
        "linear-gradient(135deg,#6950e4,#18798a)",
        "linear-gradient(135deg,#b88216,#a5364a)",
        "linear-gradient(135deg,#1c6b43,#6950e4)",
        "linear-gradient(135deg,#a5364a,#b23d6c)",
        "linear-gradient(135deg,#1e86a0,#2255a2)",
      ];
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) | 0;
      return colors[Math.abs(hash) % colors.length];
    }

    function renderChatMessage(msg, prevMsg) {
      const isSameAuthor = prevMsg && prevMsg.user_name === msg.user_name &&
        (new Date(msg.created_at) - new Date(prevMsg.created_at)) < 5 * 60 * 1000;
      const initial = (msg.user_name || "?")[0].toUpperCase();
      const avatarGrad = getAvatarColor(msg.user_name || "");
      const grouped = isSameAuthor;

      return `
        <div class="chat-message${grouped ? " grouped" : ""}" data-msg-id="${escapeHtml(msg.id || "")}">
          <div class="chat-msg-avatar" style="background:${avatarGrad}">${grouped ? "" : escapeHtml(initial)}</div>
          <div class="chat-msg-body">
            ${grouped ? "" : `
              <div class="chat-msg-meta">
                <span class="chat-msg-name">${escapeHtml(msg.user_name || "Organizer")}</span>
                <span class="chat-msg-time">${formatMsgTime(msg.created_at)}</span>
              </div>
            `}
            <div class="chat-msg-text">${escapeHtml(msg.body || "")}</div>
          </div>
        </div>
      `;
    }

    function renderMessagesHTML(messages) {
      if (!messages.length) {
        return `
          <div class="chat-empty">
            <div class="chat-empty-icon">💬</div>
            <div class="chat-empty-text">No messages yet</div>
            <div class="chat-empty-sub">Be the first to say something in #${escapeHtml(MSG_STATE.channel)}</div>
          </div>
        `;
      }

      let html = "";
      let lastDate = null;

      messages.forEach((msg, i) => {
        const msgDate = getMsgDate(msg.created_at);
        if (msgDate !== lastDate) {
          html += `<div class="chat-day-divider">${escapeHtml(msgDate)}</div>`;
          lastDate = msgDate;
        }
        html += renderChatMessage(msg, i > 0 ? messages[i - 1] : null);
      });

      return html;
    }

    function updateSendBtn() {
      const ta = document.getElementById("chat-input");
      const btn = document.getElementById("chat-send-btn");
      if (ta && btn) btn.disabled = !ta.value.trim();
    }

    function initChatInput() {
      const ta = document.getElementById("chat-input");
      if (!ta) return;
      ta.addEventListener("input", () => {
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
        updateSendBtn();
      });
      ta.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }

    function switchChannel(channel) {
      MSG_STATE.channel = channel;
      renderApp();
    }

    async function renderMessaging(user, profile) {
      MSG_STATE.currentUser = user;
      MSG_STATE.currentProfile = profile;

      const channelMeta = CHAT_CHANNELS.find(c => c.id === MSG_STATE.channel) || CHAT_CHANNELS[0];

      // Start loading messages (non-blocking for initial render)
      MSG_STATE.loading = true;
      const messages = await loadMessages(MSG_STATE.channel);
      MSG_STATE.messages = messages;
      MSG_STATE.loading = false;

      // Subscribe to real-time new messages
      subscribeMessages(MSG_STATE.channel, (newMsg) => {
        if (newMsg.channel !== MSG_STATE.channel) return;
        const prev = MSG_STATE.messages[MSG_STATE.messages.length - 1] || null;
        MSG_STATE.messages.push(newMsg);
        // Remove empty state if present
        const emptyEl = document.querySelector(".chat-empty");
        if (emptyEl) emptyEl.remove();
        appendMessageToDOM(newMsg, prev);
      });

      const sidebarHTML = `
        <div class="chat-sidebar">
          <div class="chat-sidebar-head">MIST Dallas 2027</div>
          <div class="chat-sidebar-section">Channels</div>
          ${CHAT_CHANNELS.map(ch => `
            <button class="chat-channel-btn ${ch.id === MSG_STATE.channel ? "active" : ""}"
                    onclick="switchChannel('${ch.id}')">
              <span class="chat-channel-hash">#</span>
              ${escapeHtml(ch.label)}
            </button>
          `).join("")}
        </div>
      `;

      const messagesHTML = MSG_STATE.tableError
        ? `<div class="chat-empty">
             <div class="chat-empty-icon">🛠️</div>
             <div class="chat-empty-text">Messages table not set up yet</div>
             <div class="chat-empty-sub">Run the SQL setup in your Supabase dashboard to enable chat.</div>
             <details style="margin-top:12px;font-size:12px;color:var(--faint);max-width:380px;text-align:left">
               <summary style="cursor:pointer;font-weight:600;color:var(--muted)">Show SQL</summary>
               <pre style="margin-top:8px;background:var(--surface2);padding:12px;border-radius:8px;overflow:auto;font-size:11px;line-height:1.5">create table messages (
  id uuid primary key default gen_random_uuid(),
  channel text not null default 'general',
  user_id uuid references auth.users(id) on delete cascade,
  user_name text not null,
  body text not null,
  created_at timestamptz default now()
);
alter table messages enable row level security;
create policy "Read messages" on messages for select using (auth.role() = 'authenticated');
create policy "Insert own messages" on messages for insert with check (auth.uid() = user_id);
alter publication supabase_realtime add table messages;</pre>
             </details>
           </div>`
        : renderMessagesHTML(messages);

      const mainHTML = `
        <div class="chat-main">
          <div id="chat-realtime-banner" style="display:none;padding:8px 16px;background:#fef3c7;border-bottom:1px solid #fde68a;font-size:12px;color:#92400e;gap:8px;align-items:center;"></div>
          <div class="chat-header">
            <span style="font-size:18px;color:var(--faint)">#</span>
            <div>
              <div class="chat-header-name">${escapeHtml(channelMeta.label)}</div>
              <div class="chat-header-desc">${escapeHtml(channelMeta.desc)}</div>
            </div>
          </div>
          <div class="chat-messages" id="chat-messages-list">
            ${messagesHTML}
          </div>
          <div class="chat-input-area">
            <div class="chat-input-box">
              <textarea id="chat-input" placeholder="Message #${escapeHtml(channelMeta.label)}" rows="1"></textarea>
              <button class="chat-send-btn" id="chat-send-btn" onclick="sendMessage()" disabled title="Send">
                ↑
              </button>
            </div>
            <div class="chat-input-hint">Enter to send · Shift+Enter for new line</div>
          </div>
        </div>
      `;

      return `
        <div style="padding: 0; margin: -28px -20px 0;">
          <div class="chat-shell">
            ${sidebarHTML}
            ${mainHTML}
          </div>
        </div>
      `;
    }

    /* ==============================================
       MESSAGING — END
       ============================================== */

    function renderGlobalNav(user, profile) {
      const v = APP_STATE.view;
      const hasRole = !!profile?.role_id;

      const links = [
        { label: "Dashboard",  action: "goDashboard()",         view: "dashboard" },
        { label: "Workbook",   action: "openWorkbook()",         view: "workbook",  hidden: !hasRole },
        { label: "Teams",      action: "openTeamPages()",        view: "teams" },
        { label: "Chat",       action: "openMessaging()",        view: "messaging", hidden: !user },
        { label: "Command",    action: "openCommandCenter()",    view: "command" },
        { label: "Calendar",   action: "openCalendar()",         view: "calendar" },
        { label: "Timeline",   action: "openTimeline()",         view: "timeline" },
        { label: "Directory",  action: "openDirectory()",        view: "directory" },
        { label: "Feedback",   action: "openFeedback()",         view: "feedback" },
      ];

      const visibleLinks = links.filter(l => !l.hidden);

      const userArea = user
        ? `<button class="nav-user-pill" onclick="logout()" title="Log out">
             <div class="nav-avatar">${escapeHtml((profile?.full_name || user.email || "U")[0].toUpperCase())}</div>
             ${escapeHtml(profile?.full_name ? profile.full_name.split(" ")[0] : "Account")}
           </button>`
        : `<button class="ghost" onclick="openLogin()" style="min-width:0;padding:7px 14px;font-size:13px;">Log In</button>`;

      return `
        <div class="nav-bar">
          <button class="nav-wordmark" onclick="goDashboard()">
            <div class="nav-wordmark-icon">M</div>
            MIST Dallas
            <span class="nav-wordmark-year">2027</span>
            <span style="font-size:10px;font-weight:700;background:var(--gold-dim);color:var(--gold);border:1px solid color-mix(in srgb,var(--gold) 25%,transparent);border-radius:var(--r-pill);padding:1px 7px;letter-spacing:0.04em;">beta</span>
          </button>
          <div class="nav-links">
            ${visibleLinks.map(l => `
              <button class="nav-link ${v === l.view ? "active" : ""}" onclick="${l.action}">${escapeHtml(l.label)}</button>
            `).join("")}
          </div>
          <div class="nav-end">
            ${userArea}
            <button class="nav-hamburger" onclick="toggleMobileNav()" aria-label="Open menu" title="Menu">☰</button>
          </div>
        </div>
        <div class="nav-mobile-drawer" id="nav-mobile-drawer">
          ${visibleLinks.map(l => `
            <button class="nav-mobile-link ${v === l.view ? "active" : ""}"
                    onclick="${l.action}; document.getElementById('nav-mobile-drawer').classList.remove('open')">
              ${escapeHtml(l.label)}
            </button>
          `).join("")}
          ${user
            ? `<button class="nav-mobile-link" style="color:var(--red);margin-top:6px;border-top:1px solid var(--border);border-radius:0;padding-top:14px;" onclick="logout()">Log Out</button>`
            : `<button class="nav-mobile-link" style="color:var(--teal);margin-top:6px;border-top:1px solid var(--border);border-radius:0;padding-top:14px;" onclick="openLogin()">Log In / Sign Up</button>`
          }
        </div>
      `;
    }

    function setNav(user, profile) {
      const navEl = document.getElementById("global-nav");
      if (navEl) navEl.innerHTML = renderGlobalNav(user, profile);
    }

    function renderSkeleton() {
      return `
        <div class="skeleton-page">
          <div class="sk sk-bar" style="max-width:320px;"></div>
          <div class="sk sk-panel"></div>
          <div class="sk-grid">
            <div class="sk sk-card"></div>
            <div class="sk sk-card"></div>
            <div class="sk sk-card"></div>
            <div class="sk sk-card"></div>
          </div>
          <div class="sk sk-row"></div>
          <div class="sk sk-row"></div>
        </div>
      `;
    }

    async function renderApp() {
      const app = document.getElementById("app");

      // Show shimmer immediately — before any network calls
      app.innerHTML = renderSkeleton();

      const user = await getUser();
      const profiles = await getAllProfiles();
      const rows = buildRoleDirectoryRows(profiles);

      // Render nav immediately with auth state (profile may be null for public views)
      setNav(user, null);

      if (!user && APP_STATE.view === "login") {
        app.innerHTML = renderLogin();
        return;
      }

      if (!user && !PUBLIC_VIEWS.has(APP_STATE.view)) {
        APP_STATE.view = "dashboard";
      }

      if (!user) {
        if (APP_STATE.view === "apply") {
          app.innerHTML = renderRoleApplication(null, rows);
          return;
        }

        if (APP_STATE.view === "progress") {
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderProgressBoard(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "command") {
          const progressRows = await getAllWorkbookProgress();
          const deadlines = await getDeadlines();
          app.innerHTML = renderCommandCenter(rows, progressRows, deadlines, null, null);
          return;
        }

        if (APP_STATE.view === "integrations") {
          app.innerHTML = renderMyMistIntegration(APP_STATE.mymist, null, null);
          return;
        }

        if (APP_STATE.view === "tournament") {
          const deadlines = await getDeadlines();
          const tournamentData = await getTournamentData(false);
          APP_STATE.tournament = tournamentData;
          app.innerHTML = renderTournamentManager(rows, deadlines, tournamentData, null, null);
          return;
        }

        if (APP_STATE.view === "directory") {
          const progressRows = await getAllWorkbookProgress();
          app.innerHTML = renderDirectory(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "teams") {
          const progressRows = await getAllWorkbookProgress();
          APP_STATE.currentDeadlines = await getDeadlines();
          app.innerHTML = renderTeamPages(rows, progressRows);
          return;
        }

        if (APP_STATE.view === "timeline") {
          app.innerHTML = renderTimeline();
          return;
        }

        if (APP_STATE.view === "meetings") {
          app.innerHTML = renderMeetingHub(null, null);
          return;
        }

        if (APP_STATE.view === "knowledge") {
          app.innerHTML = renderKnowledgeBase();
          return;
        }

        if (APP_STATE.view === "feedback") {
          app.innerHTML = renderFeedbackAddressal(null, null);
          return;
        }

        if (APP_STATE.view === "calendar") {
          const deadlines = await getDeadlines();
          app.innerHTML = renderCalendar(deadlines, null, null, null);
          return;
        }

        if (APP_STATE.view === "application-status") {
          app.innerHTML = renderApplicationStatus();
          return;
        }

        const progressRows = await getAllWorkbookProgress();
        const deadlines = await getDeadlines();
        APP_STATE.announcements = await getAnnouncements();
        app.innerHTML = renderDashboard(null, null, rows, progressRows, deadlines);
        return;
      }

      const profile = await getProfile(user.id);
      // Re-render nav now that we have profile (workbook link, user name, etc.)
      setNav(user, profile);

      if (APP_STATE.view === "apply") {
        app.innerHTML = renderRoleApplication(user, rows);
        return;
      }

      if (!profile || !profile.role_id) {
        APP_STATE.view = "apply";
        app.innerHTML = renderRoleApplication(user, rows);
        return;
      }

      APP_STATE.progress = await getWorkbookProgress(user.id);

      if (APP_STATE.view === "workbook") {
        app.innerHTML = renderWorkbook(profile);
        return;
      }

      if (APP_STATE.view === "progress") {
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderProgressBoard(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "command") {
        const progressRows = await getAllWorkbookProgress();
        const deadlines = await getDeadlines();
        app.innerHTML = renderCommandCenter(rows, progressRows, deadlines, user, profile);
        return;
      }

      if (APP_STATE.view === "integrations") {
        const mymist = await getMyMistData(!!profile?.is_admin);
        APP_STATE.mymist = mymist;
        app.innerHTML = renderMyMistIntegration(mymist, user, profile);
        return;
      }

      if (APP_STATE.view === "tournament") {
        const deadlines = await getDeadlines();
        const tournamentData = await getTournamentData(!!profile?.is_admin);
        APP_STATE.tournament = tournamentData;
        app.innerHTML = renderTournamentManager(rows, deadlines, tournamentData, user, profile);
        return;
      }

      if (APP_STATE.view === "directory") {
        const progressRows = await getAllWorkbookProgress();
        app.innerHTML = renderDirectory(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "teams") {
        const progressRows = await getAllWorkbookProgress();
        APP_STATE.currentDeadlines = await getDeadlines();
        app.innerHTML = renderTeamPages(rows, progressRows);
        return;
      }

      if (APP_STATE.view === "timeline") {
        app.innerHTML = renderTimeline();
        return;
      }

      if (APP_STATE.view === "meetings") {
        app.innerHTML = renderMeetingHub(user, profile);
        return;
      }

      if (APP_STATE.view === "runbook") {
        app.innerHTML = renderRunbook();
        return;
      }

      if (APP_STATE.view === "knowledge") {
        app.innerHTML = renderKnowledgeBase();
        return;
      }

      if (APP_STATE.view === "feedback") {
        app.innerHTML = renderFeedbackAddressal(user, profile);
        return;
      }

      if (APP_STATE.view === "calendar") {
        const deadlines = await getDeadlines();
        const reminderPreference = await getReminderPreference(user.id);
        app.innerHTML = renderCalendar(deadlines, user, profile, reminderPreference);
        return;
      }

      if (APP_STATE.view === "application-status") {
        app.innerHTML = renderApplicationStatus();
        return;
      }

      if (APP_STATE.view === "applications") {
        if (!profile?.is_admin) {
          APP_STATE.view = "dashboard";
          app.innerHTML = renderDashboard(user, profile, rows, await getAllWorkbookProgress(), await getDeadlines());
          return;
        }

        const applications = await getRoleApplications();
        app.innerHTML = renderApplicationsAdmin(applications, rows);
        return;
      }

      if (APP_STATE.view === "messaging") {
        app.innerHTML = await renderMessaging(user, profile);
        setTimeout(() => {
          const list = document.getElementById("chat-messages-list");
          if (list) list.scrollTop = list.scrollHeight;
          initChatInput();
        }, 0);
        return;
      }

      const progressRows = await getAllWorkbookProgress();
      const deadlines = await getDeadlines();
      APP_STATE.announcements = await getAnnouncements();
      app.innerHTML = renderDashboard(user, profile, rows, progressRows, deadlines);
    }

    renderApp();
  </script>
</body>
</html>
